metadata:
  name: azure-container-webapp
  title: Container Web App
  description: Deploy an Archie-branded congratulations page as a containerized web app on Azure App Service.
  category: compute
  cloud: azure
  version: latest
  author: InnovativeApps
  tags:
  - azure
  - app-service
  - container
  - docker
  - webapp
  base_cost: $15/month
  complexity: low
  deployment_time: 5-7 minutes
  marketplace_group: WEBSITES
  pillars:
  - title: Operational Excellence
    score: excellent
    score_color: '#10b981'
    description: Fully managed platform with automated container orchestration.
    practices:
    - Infrastructure as Code with Pulumi for repeatable deployments
    - Azure App Service manages OS patching and runtime updates
    - Docker container packaging for consistent deployments
    - Built-in deployment slots for zero-downtime updates
    - Resource Group tagging for organization and tracking
  - title: Security
    score: good
    score_color: '#f59e0b'
    description: HTTPS-only with managed platform security controls.
    practices:
    - HTTPS-only enforcement on App Service
    - Azure-managed TLS certificates for custom domains
    - App Service sandbox isolation for container workloads
    - Environment variables for secure configuration injection
  - title: Reliability
    score: good
    score_color: '#f59e0b'
    description: Managed platform with built-in health monitoring.
    practices:
    - Azure App Service 99.95% SLA for paid tiers
    - Automatic container restart on failure
    - Built-in health check and diagnostics
    - Deployment slots enable rollback on failed releases
  - title: Performance Efficiency
    score: good
    score_color: '#f59e0b'
    description: Lightweight nginx container with efficient resource usage.
    practices:
    - Alpine-based nginx container minimizes resource overhead
    - App Service Plan right-sizing from Free to Premium tiers
    - Built-in auto-scaling for traffic spikes
    - Azure global network for low-latency content delivery
  - title: Cost Optimization
    score: good
    score_color: '#f59e0b'
    description: Scalable pricing from free tier to production workloads.
    practices:
    - Free tier App Service Plan available for development
    - Scale up or down based on actual workload requirements
    - No separate container registry costs with Docker Hub images
    - Shared infrastructure reduces per-app hosting costs
  - title: Sustainability
    score: good
    score_color: '#f59e0b'
    description: Managed platform with efficient resource sharing.
    practices:
    - Shared App Service infrastructure reduces per-app footprint
    - Azure commitment to 100% renewable energy by 2025
    - Container-based deployment avoids full VM overhead
    - Auto-scaling prevents over-provisioning during low traffic
  architecture:
    summary: Azure App Service Container Web App Template - Pattern B Implementation
  action_name: azure-container-webapp
  environment: prod
  tier: template
  use_cases:
  - Production workloads
  - Mission-critical applications
  - Enterprise-grade infrastructure
resources:
  index-html:
    type: aws:s3:BucketObject
    name: index-html
    always_created: true
    description: Archie-branded congratulations page (index.html)
    smart_defaults:
      key: index.html
      content_type: text/html
      tags:
        Name: archie-index-html-{environment}
        ManagedBy: Archie
  styles-css:
    type: aws:s3:BucketObject
    name: styles-css
    always_created: true
    description: Styles with dark/light theme support (styles.css)
    smart_defaults:
      key: styles.css
      content_type: text/css
      tags:
        Name: archie-styles-css-{environment}
        ManagedBy: Archie
  '{project_name}-rg':
    type: azure-native:resources:ResourceGroup
    name: '{project_name}-rg'
    always_created: true
    description: ResourceGroup resource
    smart_defaults:
      location: eastus
      tags:
        ManagedBy: Archie
  '{project_name}-plan':
    type: azure-native:web:AppServicePlan
    name: '{project_name}-plan'
    always_created: true
    description: AppServicePlan resource
    smart_defaults:
      name: plan-{safe_project}-{random_suffix}
      resource_group_name: '{config_name}'
      location: eastus
      kind: Linux
      reserved: true
      sku:
        name: F1
        tier: Free
      tags:
        ManagedBy: Archie
  '{project_name}-app':
    type: azure-native:web:WebApp
    name: '{project_name}-app'
    always_created: true
    description: WebApp resource
    smart_defaults:
      name: '{safe_project}-app-{random_suffix}'
      resource_group_name: '{config_name}'
      location: eastus
      server_farm_id: '{config_id}'
      https_only: true
      site_config: '{computed}'
      tags:
        ManagedBy: Archie
configuration:
  properties:
    appName:
      type: string
      title: App Name
      default: my-azure-app
    resourceGroup:
      type: string
      title: Resource Group
    location:
      type: string
      title: Azure Region
      default: eastus
  required:
  - appName
  - resourceGroup
outputs:
- name: website_url
  description: 'Output: website_url'
