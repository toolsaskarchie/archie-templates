metadata:
  name: azure-static-website
  title: Demo Static Website
  description: Deploy an Archie-branded congratulations page on Azure Storage - perfect for your first Azure deployment!
  category: website
  cloud: azure
  version: latest
  author: InnovativeApps
  tags:
  - azure
  - storage
  - website
  - static
  - free
  base_cost: $0.00/month
  complexity: low
  deployment_time: 3-5 minutes
  marketplace_group: WEBSITES
  pillars:
  - title: Operational Excellence
    score: good
    score_color: '#f59e0b'
    description: Managed static hosting with automated content deployment.
    practices:
    - Infrastructure as Code with Pulumi for repeatable deployments
    - Automated content upload from versioned source bucket
    - Resource Group tagging for organization and tracking
    - Storage Account static website feature for zero-server hosting
  - title: Security
    score: good
    score_color: '#f59e0b'
    description: HTTPS-only access with Azure Storage security defaults.
    practices:
    - HTTPS traffic only enforced on Storage Account
    - Azure Storage encryption at rest by default
    - No server-side code execution surface to attack
    - Resource Group isolation for access control
  - title: Reliability
    score: excellent
    score_color: '#10b981'
    description: Azure Storage provides highly durable and available hosting.
    practices:
    - Azure Storage 99.9% availability SLA for LRS
    - Triple replication within the storage stamp
    - Automatic failover within storage infrastructure
    - Embedded fallback content if source bucket is unavailable
  - title: Performance Efficiency
    score: good
    score_color: '#f59e0b'
    description: Serverless static hosting with Azure global infrastructure.
    practices:
    - Direct blob serving with no compute overhead
    - Azure global network for low-latency content delivery
    - Lightweight HTML/CSS assets for fast page loads
    - No cold start or server provisioning delays
  - title: Cost Optimization
    score: excellent
    score_color: '#10b981'
    description: Near-zero cost for static website hosting on Azure Storage.
    practices:
    - No compute instances or server costs
    - Standard_LRS tier for lowest storage pricing
    - Pay only for storage and egress bandwidth
    - No idle resources consuming budget
  - title: Sustainability
    score: excellent
    score_color: '#10b981'
    description: Serverless architecture with minimal resource consumption.
    practices:
    - No always-on compute instances
    - Azure commitment to 100% renewable energy by 2025
    - Efficient object storage with no over-provisioning
    - Minimal resource footprint for static content delivery
  architecture:
    summary: Azure Static Website Template - Pattern B Implementation
  action_name: azure-static-website
  environment: prod
  tier: template
  use_cases:
  - Production workloads
  - Mission-critical applications
  - Enterprise-grade infrastructure
resources:
  index-azure-html:
    type: aws:s3:BucketObject
    name: index-azure-html
    always_created: true
    description: Archie-branded congratulations page (index-azure.html)
    smart_defaults:
      key: index-azure.html
      content_type: text/html
      tags:
        Name: archie-index-azure-html-{environment}
        ManagedBy: Archie
  styles-css:
    type: aws:s3:BucketObject
    name: styles-css
    always_created: true
    description: Styles with dark/light theme support (styles.css)
    smart_defaults:
      key: styles.css
      content_type: text/css
      tags:
        Name: archie-styles-css-{environment}
        ManagedBy: Archie
  '{project_name}-rg':
    type: azure-native:resources:ResourceGroup
    name: '{project_name}-rg'
    always_created: true
    description: ResourceGroup resource
    smart_defaults:
      resource_group_name: '{rg_name}'
      location: eastus
      tags:
        ManagedBy: Archie
        Template: azure-static-website
  '{project_name}-storage':
    type: azure-native:storage:StorageAccount
    name: '{project_name}-storage'
    always_created: true
    description: StorageAccount resource
    smart_defaults:
      account_name: '{sa_name}'
      resource_group_name: '{config_name}'
      location: eastus
      sku:
        name: Standard_LRS
      kind: StorageV2
      enable_https_traffic_only: true
      tags:
        ManagedBy: Archie
      opts: '{computed}'
  '{project_name}-static':
    type: azure-native:storage:StorageAccountStaticWebsite
    name: '{project_name}-static'
    always_created: true
    description: StorageAccountStaticWebsite resource
    smart_defaults:
      account_name: '{config_name}'
      resource_group_name: '{config_name}'
      index_document: index.html
      error404_document: index.html
  '{project_name}-':
    type: azure-native:storage:Blob
    name: '{project_name}-'
    always_created: true
    description: Blob resource
    smart_defaults:
      account_name: '{config_name}'
      resource_group_name: '{config_name}'
      container_name: $web
      blob_name: '{file_key}'
      source: '{computed}'
      content_type: '{content_type}'
      type: Block
      opts: '{computed}'
configuration:
  properties:
    websiteName:
      type: string
      title: Website Name
      default: my-azure-site
    resourceGroup:
      type: string
      title: Resource Group
      description: Optional — auto-generated if not provided
    location:
      type: string
      title: Azure Region
      default: eastus
  required:
  - websiteName
outputs:
- name: website_name
  description: 'Output: website_name'
- name: resource_group
  description: 'Output: resource_group'
- name: storage_account_name
  description: 'Output: storage_account_name'
- name: website_url
  description: 'Output: website_url'
