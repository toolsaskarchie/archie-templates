metadata:
  name: aws-rds-postgres-nonprod
  title: PostgreSQL Database
  description: Cost-optimized managed PostgreSQL deployment for development and staging.
  category: database
  version: latest
  author: InnovativeApps
  cloud: aws
  environment: nonprod
  base_cost: $20/month
  features:
  - GP3 Storage with Auto-Scaling
  - Secrets Manager Password Integration
  - Automated Backups
  - VPC Isolation
  - Performance Insights
  tags:
  - rds
  - postgres
  - database
  - nonprod
  deployment_time: 10-15 minutes
  complexity: medium
  pillars:
  - title: Efficiency
    score: excellent
    score_color: '#10b981'
    description: GP3 and burstable instances minimize costs.
  architecture:
    optional_features:
    - Performance Insights (optional)
    summary: RDS PostgreSQL Non-Production Template
  action_name: aws-rds-postgres-nonprod
  tier: template
  use_cases:
  - Development and testing environments
  - Staging infrastructure
  - Non-production workloads
resources:
  '{project_name}-password':
    type: aws:secretsmanager:Secret
    name: '{project_name}-password'
    always_created: true
    description: Secret resource - {project_name}-password
  '{project_name}-password-version':
    type: aws:secretsmanager:SecretVersion
    name: '{project_name}-password-version'
    always_created: true
    description: SecretVersion resource - {project_name}-password-version
  '{namer_rds}':
    type: aws:rds:Instance
    name: '{namer_rds}'
    always_created: true
    description: Instance resource
    smart_defaults:
      engine: postgres
      engine_version: '{config_engine_version}'
      instance_class: '{config_db_instance_class}'
      allocated_storage: '{config_allocated_storage}'
      max_allocated_storage: '{config_max_allocated_storage}'
      username: '{config_db_username}'
      password: '{db_password}'
      db_subnet_group_name: '{config_name}'
      vpc_security_group_ids:
      - '{sg_id}'
      db_name: '{config_db_name}'
      storage_type: gp3
      storage_encrypted: '{config_storage_encrypted}'
      publicly_accessible: '{config_publicly_accessible}'
      multi_az: '{config_multi_az}'
      backup_retention_period: '{config_backup_retention_days}'
      skip_final_snapshot: '{config_skip_final_snapshot}'
      deletion_protection: <deletion_protection_enabled>
      performance_insights_enabled: '{config_enable_performance_insights}'
      tags:
        Name: '{db_identifier}'
  secg-db-{project}-{environment}-{region_short}:
    type: aws:ec2:SecurityGroup
    name: secg-db-{project}-{environment}-{region_short}
    always_created: true
    description: Security group for database tier
    smart_defaults:
      vpc_id: '{config_id}'
      description: Security group for database tier
      ingress:
      - protocol: tcp
        from_port: 3306
        to_port: 3306
        security_groups:
        - '{security_group_app}'
        description: MySQL from app tier
      - protocol: tcp
        from_port: 5432
        to_port: 5432
        security_groups:
        - '{security_group_app}'
        description: PostgreSQL from app tier
      - protocol: tcp
        from_port: 1433
        to_port: 1433
        security_groups:
        - '{security_group_app}'
        description: SQL Server from app tier
      egress:
      - protocol: '-1'
        from_port: 0
        to_port: 0
        cidr_blocks:
        - 0.0.0.0/0
        description: Allow all outbound
  '{namer_resource}':
    type: aws:rds:SubnetGroup
    name: '{namer_resource}'
    always_created: true
    description: SubnetGroup resource
    smart_defaults:
      subnet_ids: '{config_subnet_ids}'
      description: Subnet group for {db_identifier}
      tags:
        Name: '{sng_name}'
  vpc-{project}-{environment}-{region_short}-{network_num}:
    type: aws:ec2:Vpc
    name: vpc-{project}-{environment}-{region_short}-{network_num}
    always_created: true
    description: Virtual Private Cloud with CIDR {config_custom_cidr_block}, DNS support enabled
    smart_defaults:
      cidr_block: '{config_custom_cidr_block}'
      enable_dns_support: true
      enable_dns_hostnames: true
      instance_tenancy: default
      tags:
        Name: '{vpc_name}'
  igw-main-{project}-{environment}-{region_short}:
    type: aws:ec2:InternetGateway
    name: igw-main-{project}-{environment}-{region_short}
    always_created: true
    description: Internet Gateway providing public internet connectivity for the VPC
    smart_defaults:
      vpc_id: '{config_id}'
      tags:
        Name: '{igw_name}'
  rt-public-{project}-{environment}-{region_short}:
    type: aws:ec2:RouteTable
    name: rt-public-{project}-{environment}-{region_short}
    always_created: true
    description: Route table for public tier network traffic routing
    smart_defaults:
      vpc_id: '{config_id}'
      tags:
        Name: '{public_rt_name}'
        Tier: public
  rt-private-{project}-{environment}-{region_short}:
    type: aws:ec2:RouteTable
    name: rt-private-{project}-{environment}-{region_short}
    always_created: true
    description: Route table for private tier network traffic routing
    smart_defaults:
      vpc_id: '{config_id}'
      tags:
        Name: '{private_rt_name}'
        Tier: private
  vpce-s3-{project}-{environment}-{region_short}-gw:
    type: aws:ec2:VpcEndpoint
    name: vpce-s3-{project}-{environment}-{region_short}-gw
    always_created: true
    description: S3 Gateway VPC Endpoint for private S3 service access
    smart_defaults:
      vpc_id: '{config_id}'
      service_name: com.amazonaws.{config_region}.s3
      vpc_endpoint_type: Gateway
      tags:
        Name: '{s3_endpoint_name}'
  vpce-dynamodb-{project}-{environment}-{region_short}-gw:
    type: aws:ec2:VpcEndpoint
    name: vpce-dynamodb-{project}-{environment}-{region_short}-gw
    always_created: true
    description: DYNAMODB Gateway VPC Endpoint for private DYNAMODB service access
    smart_defaults:
      vpc_id: '{config_id}'
      service_name: com.amazonaws.{config_region}.dynamodb
      vpc_endpoint_type: Gateway
      tags:
        Name: '{dynamodb_endpoint_name}'
  secg-web-{project}-{environment}-{region_short}:
    type: aws:ec2:SecurityGroup
    name: secg-web-{project}-{environment}-{region_short}
    always_created: true
    description: Security group for web tier (HTTP/HTTPS)
    smart_defaults:
      vpc_id: '{config_id}'
      description: Security group for web tier (HTTP/HTTPS)
      ingress:
      - protocol: tcp
        from_port: 80
        to_port: 80
        cidr_blocks:
        - 0.0.0.0/0
        description: HTTP from internet
      - protocol: tcp
        from_port: 443
        to_port: 443
        cidr_blocks:
        - 0.0.0.0/0
        description: HTTPS from internet
      egress:
      - protocol: '-1'
        from_port: 0
        to_port: 0
        cidr_blocks:
        - 0.0.0.0/0
        description: Allow all outbound
      tags:
        Name: '{web_sg_name}'
        Tier: web
  secg-app-{project}-{environment}-{region_short}:
    type: aws:ec2:SecurityGroup
    name: secg-app-{project}-{environment}-{region_short}
    always_created: true
    description: Security group for application tier
    smart_defaults:
      vpc_id: '{config_id}'
      description: Security group for application tier
      ingress:
      - protocol: tcp
        from_port: 3000
        to_port: 3000
        security_groups:
        - '{security_group_web}'
        description: App traffic from web tier
      - protocol: tcp
        from_port: 8080
        to_port: 8080
        security_groups:
        - '{security_group_web}'
        description: Alt app port from web tier
      egress:
      - protocol: '-1'
        from_port: 0
        to_port: 0
        cidr_blocks:
        - 0.0.0.0/0
        description: Allow all outbound
      tags:
        Name: '{app_sg_name}'
        Tier: app
  pubsub-{project}-{environment}-{region_short}-{az_short}-{subnet_num}:
    type: aws:ec2:Subnet
    name: pubsub-{project}-{environment}-{region_short}-{az_short}-{subnet_num}
    always_created: true
    description: 'Public subnet for public tier workloads (CIDR: {public_cidr})'
    smart_defaults:
      vpc_id: '{config_id}'
      cidr_block: '{public_cidr}'
      availability_zone: '{config_region}a'
      map_public_ip_on_launch: true
      tags:
        Name: '{public_subnet_name}'
        Tier: public
  privsub-{project}-{environment}-{region_short}-{az_short}-{subnet_num}:
    type: aws:ec2:Subnet
    name: privsub-{project}-{environment}-{region_short}-{az_short}-{subnet_num}
    always_created: true
    description: 'Private subnet for private tier workloads (CIDR: {private_cidr})'
    smart_defaults:
      vpc_id: '{config_id}'
      cidr_block: '{private_cidr}'
      availability_zone: '{config_region}a'
      map_public_ip_on_launch: false
      tags:
        Name: '{private_subnet_name}'
        Tier: private
  eip-{purpose}-{project}-{environment}-{region_short}-{az_short}:
    type: aws:ec2:Eip
    name: eip-{purpose}-{project}-{environment}-{region_short}-{az_short}
    always_created: true
    description: Elastic IP address for NAT Gateway attachment
    smart_defaults:
      domain: vpc
      tags:
        Name: '{eip_name}'
  nat-gw-{project}-{environment}-{region_short}-{az_short}:
    type: aws:ec2:NatGateway
    name: nat-gw-{project}-{environment}-{region_short}-{az_short}
    always_created: true
    description: NAT Gateway providing outbound internet access for private subnets
    smart_defaults:
      subnet_id: '{id}'
      allocation_id: '{id}'
      tags:
        Name: '{nat_name}'
  route-00000-{project}-{environment}-{region_short}-igw:
    type: aws:ec2:Route
    name: route-00000-{project}-{environment}-{region_short}-igw
    always_created: true
    description: Route directing 0.0.0.0/0 traffic to Internet Gateway
    smart_defaults:
      route_table_id: '{id}'
      destination_cidr_block: 0.0.0.0/0
      gateway_id: '{config_id}'
  route-00000-{project}-{environment}-{region_short}-nat:
    type: aws:ec2:Route
    name: route-00000-{project}-{environment}-{region_short}-nat
    always_created: true
    description: Route directing 0.0.0.0/0 traffic to NAT Gateway
    smart_defaults:
      route_table_id: '{id}'
      destination_cidr_block: 0.0.0.0/0
      nat_gateway_id: '{config_id}'
  rta-public-{project}-{environment}-{region_short}-1:
    type: aws:ec2:RouteTableAssociation
    name: rta-public-{project}-{environment}-{region_short}-1
    always_created: true
    description: Associates a route table with a subnet for traffic routing
    smart_defaults:
      subnet_id: '{id}'
      route_table_id: '{id}'
  rta-private-{project}-{environment}-{region_short}-1:
    type: aws:ec2:RouteTableAssociation
    name: rta-private-{project}-{environment}-{region_short}-1
    always_created: true
    description: Associates a route table with a subnet for traffic routing
    smart_defaults:
      subnet_id: '{id}'
      route_table_id: '{id}'
  rt-isolated-{project}-{environment}-{region_short}:
    type: aws:ec2:RouteTable
    name: rt-isolated-{project}-{environment}-{region_short}
    description: Route table for isolated tier network traffic routing
    conditional:
      field: enable_isolated_tier
    smart_defaults:
      vpc_id: '{config_id}'
      tags:
        Name: '{isolated_rt_name}'
        Tier: isolated
  secg-access-{project}-{environment}-{region_short}:
    type: aws:ec2:SecurityGroup
    name: secg-access-{project}-{environment}-{region_short}
    description: Management access security group (SSH/RDP)
    conditional:
      field: enable_ssh
    smart_defaults:
      vpc_id: '{config_id}'
      description: Management access security group (SSH/RDP)
      ingress: '{access_sg_ingress}'
      egress:
      - protocol: '-1'
        from_port: 0
        to_port: 0
        cidr_blocks:
        - 0.0.0.0/0
        description: Allow all outbound
      tags:
        Name: '{access_sg_name}'
        Tier: management
  isolatedsub-{project}-{environment}-{region_short}-{az_short}-{subnet_num}:
    type: aws:ec2:Subnet
    name: isolatedsub-{project}-{environment}-{region_short}-{az_short}-{subnet_num}
    description: 'Private subnet for isolated tier workloads (CIDR: {isolated_cidr})'
    conditional:
      field: enable_isolated_tier
    smart_defaults:
      vpc_id: '{config_id}'
      cidr_block: '{isolated_cidr}'
      availability_zone: '{config_region}a'
      map_public_ip_on_launch: false
      tags:
        Name: '{isolated_subnet_name}'
        Tier: isolated
  rta-isolated-{project}-{environment}-{region_short}-1:
    type: aws:ec2:RouteTableAssociation
    name: rta-isolated-{project}-{environment}-{region_short}-1
    description: Associates a route table with a subnet for traffic routing
    conditional:
      field: enable_isolated_tier
    smart_defaults:
      subnet_id: '{id}'
      route_table_id: '{id}'
  vpce-rds-{project}-{environment}-{region_short}-if:
    type: aws:ec2:VpcEndpoint
    name: vpce-rds-{project}-{environment}-{region_short}-if
    description: RDS Interface VPC Endpoint for private RDS service access
    conditional:
      field: enable_rds_endpoint
    smart_defaults:
      vpc_id: '{config_id}'
      service_name: com.amazonaws.{config_region}.rds
      vpc_endpoint_type: Interface
      subnet_ids:
      - '{id}'
      security_group_ids:
      - '{id}'
      private_dns_enabled: true
      tags:
        Name: '{rds_endpoint_name}'
  vpce-ssm-{project}-{environment}-{region_short}-if:
    type: aws:ec2:VpcEndpoint
    name: vpce-ssm-{project}-{environment}-{region_short}-if
    description: SSM Interface VPC Endpoint for private SSM service access
    conditional:
      field: enable_ssm_endpoints
    smart_defaults:
      vpc_id: '{config_id}'
      service_name: com.amazonaws.{config_region}.ssm
      vpc_endpoint_type: Interface
      subnet_ids:
      - '{id}'
      private_dns_enabled: true
      tags:
        Name: '{ssm_endpoint_name}'
  vpce-ssmmessages-{project}-{environment}-{region_short}-if:
    type: aws:ec2:VpcEndpoint
    name: vpce-ssmmessages-{project}-{environment}-{region_short}-if
    description: SSMMESSAGES Interface VPC Endpoint for private SSMMESSAGES service access
    conditional:
      field: enable_ssm_endpoints
    smart_defaults:
      vpc_id: '{config_id}'
      service_name: com.amazonaws.{config_region}.ssmmessages
      vpc_endpoint_type: Interface
      subnet_ids:
      - '{id}'
      private_dns_enabled: true
      tags:
        Name: '{ssm_messages_endpoint_name}'
  vpce-ec2messages-{project}-{environment}-{region_short}-if:
    type: aws:ec2:VpcEndpoint
    name: vpce-ec2messages-{project}-{environment}-{region_short}-if
    description: EC2MESSAGES Interface VPC Endpoint for private EC2MESSAGES service access
    conditional:
      field: enable_ssm_endpoints
    smart_defaults:
      vpc_id: '{config_id}'
      service_name: com.amazonaws.{config_region}.ec2messages
      vpc_endpoint_type: Interface
      subnet_ids:
      - '{id}'
      private_dns_enabled: true
      tags:
        Name: '{ec2_messages_endpoint_name}'
  s3-{purpose}-{project}-{environment}-{region_short}:
    type: aws:s3:Bucket
    name: s3-{purpose}-{project}-{environment}-{region_short}
    description: S3 bucket for VPC Flow Logs storage
    conditional:
      field: enable_flow_logs
    smart_defaults:
      bucket: '{bucket_name}'
      force_destroy: true
      tags:
        Name: '{bucket_name}'
        Purpose: VPC Flow Logs
  '{bucket_name}-lifecycle':
    type: aws:s3:BucketLifecycleConfigurationV2
    name: '{bucket_name}-lifecycle'
    description: S3 bucket lifecycle rules for automatic log retention and deletion
    conditional:
      field: enable_flow_logs
    smart_defaults:
      bucket: '{config_id}'
      rules:
      - id: delete-old-flow-logs
        status: Enabled
  fl-{scope}-{project}-{environment}-{region_short}-{traffic}:
    type: aws:ec2:FlowLog
    name: fl-{scope}-{project}-{environment}-{region_short}-{traffic}
    description: VPC Flow Logs capturing ALL network traffic to S3
    conditional:
      field: enable_flow_logs
    smart_defaults:
      vpc_id: '{config_id}'
      traffic_type: ALL
      log_destination_type: s3
      log_destination: '{computed}'
      max_aggregation_interval: 600
      tags:
        Name: '{flow_log_name}'
configuration:
  properties:
    resource_prefix:
      type: string
      title: Resource Prefix
      description: Get resource name prefix
      group: General Settings
      order: 1
    deletion_protection_enabled:
      type: boolean
      title: Deletion Protection Enabled
      description: Deletion protection disabled for nonprod
      group: General Settings
      order: 2
    vpc_header:
      type: separator
      title: VPC Configuration
      group: Networking & Connectivity
      isEssential: true
      order: 10
    vpc_mode:
      type: select
      title: VPC Selection
      description: Deploy into a new or existing VPC
      default: new
      options:
      - label: Create New VPC
        value: new
      - label: Use Existing VPC
        value: existing
      group: Networking & Connectivity
      isEssential: false
      order: 11
    vpc_id:
      type: string
      title: Existing VPC ID
      description: ID of the existing VPC
      placeholder: vpc-xxxxxxxx
      group: Networking & Connectivity
      visibleIf: &id001
        vpc_mode: existing
      isEssential: false
      order: 12
    subnet_id:
      type: string
      title: Subnet ID
      description: Select existing Subnet
      placeholder: subnet-xxxxxxxx
      group: Networking & Connectivity
      visibleIf: *id001
      isEssential: false
      order: 13
    vpc_name:
      type: string
      title: VPC Name
      description: Custom name for the new VPC
      placeholder: Auto-generated
      group: Networking & Connectivity
      visibleIf: &id002
        vpc_mode: new
      isEssential: true
      order: 20
    instance_tenancy:
      type: select
      title: VPC Tenancy
      description: The allowed tenancy of instances launched into the VPC
      default: default
      options:
      - label: Default
        value: default
      - label: Dedicated
        value: dedicated
      group: Networking & Connectivity
      visibleIf: *id002
      order: 22
    cidr_block:
      type: string
      title: VPC CIDR Block
      description: IPv4 CIDR block for the new VPC
      default: ''
      placeholder: Auto-Assign
      group: Networking & Connectivity
      visibleIf: *id002
      isEssential: true
      order: 23
    dns_header:
      type: separator
      title: DNS Configuration
      group: Networking & Connectivity
      visibleIf: *id002
      isEssential: true
      order: 69
    enable_dns_support:
      type: boolean
      title: Enable DNS Support
      description: Allow DNS resolution
      default: true
      group: Networking & Connectivity
      visibleIf: *id002
      isEssential: true
      order: 70
    enable_dns_hostnames:
      type: boolean
      title: Enable DNS Hostnames
      description: Assign public hostnames
      default: true
      group: Networking & Connectivity
      visibleIf: *id002
      isEssential: true
      order: 71
    subnet_header:
      type: separator
      title: Subnet Configuration
      group: Networking & Connectivity
      visibleIf: *id002
      order: 29
    public_subnet_1_cidr:
      type: string
      title: Public Subnet 1 CIDR
      placeholder: e.g. 10.0.1.0/24
      group: Networking & Connectivity
      visibleIf: *id002
      order: 30
    az_1:
      type: string
      title: Availability Zone 1
      placeholder: e.g. us-east-1a
      group: Networking & Connectivity
      visibleIf: *id002
      order: 31
    private_subnet_1_cidr:
      type: string
      title: Private Subnet 1 CIDR
      placeholder: e.g. 10.0.11.0/24
      group: Networking & Connectivity
      visibleIf: *id002
      order: 32
    zone_2_separator:
      type: separator
      title: Secondary Zone Configuration
      group: Networking & Connectivity
      visibleIf: *id002
      order: 34
    public_subnet_2_cidr:
      type: string
      title: Public Subnet 2 CIDR
      placeholder: e.g. 10.0.2.0/24
      group: Networking & Connectivity
      visibleIf: *id002
      order: 35
    az_2:
      type: string
      title: Availability Zone 2
      placeholder: e.g. us-east-1b
      group: Networking & Connectivity
      visibleIf: *id002
      order: 36
    private_subnet_2_cidr:
      type: string
      title: Private Subnet 2 CIDR
      placeholder: e.g. 10.0.12.0/24
      group: Networking & Connectivity
      visibleIf: *id002
      order: 37
    nat_header:
      type: separator
      title: NAT Gateway Configuration
      group: Networking & Connectivity
      visibleIf: *id002
      isEssential: true
      order: 59
    enable_nat_gateway:
      type: boolean
      title: Provision NAT Gateway
      description: Provide internet access to private subnets
      default: true
      group: Networking & Connectivity
      visibleIf: *id002
      isEssential: true
      order: 60
    nat_gateway_count:
      type: number
      title: NAT Gateway Count
      description: 1 for cost-optimization, 2-3 for higher availability
      default: 1
      options:
      - label: Single (Cost Optimized)
        value: 1
      - label: Double (High Availability)
        value: 2
      group: Networking & Connectivity
      visibleIf:
        enable_nat_gateway: true
      order: 61
    db_header:
      type: separator
      title: Database Configuration
      group: Database Settings
      isEssential: true
      order: 80
    dbName:
      type: string
      title: Database Name
      description: Primary database name
      default: mydb
      group: Database Settings
      isEssential: true
      order: 81
    dbUsername:
      type: string
      title: Master Username
      description: Database administrator username
      default: postgres
      group: Database Settings
      isEssential: true
      order: 82
    engineVersion:
      type: string
      title: Engine Version
      description: Version of postgres
      default: '15'
      group: Database Settings
      order: 83
    instanceClass:
      type: string
      title: Instance Class
      description: Compute and memory capacity
      default: db.t3.micro
      enum:
      - db.t3.micro
      - db.t3.small
      - db.t3.medium
      - db.t3.large
      - db.m5.large
      group: Database Settings
      isEssential: true
      order: 84
    allocatedStorage:
      type: number
      title: Allocated Storage (GB)
      description: Initial storage capacity
      default: 20
      group: Database Settings
      order: 85
    maxAllocatedStorage:
      type: number
      title: Max Storage (GB)
      description: Auto-scaling storage limit
      default: 100
      group: Database Settings
      order: 86
    backupRetentionDays:
      type: number
      title: Backup Retention (Days)
      description: Number of days to keep backups
      default: 3
      group: Database Settings
      order: 87
    security_header:
      type: separator
      title: Security Group Configuration
      group: Security & Connectivity
      isEssential: true
      order: 155
    ssh_mode:
      type: select
      title: Access Mode
      description: Choose between secure SSM access or emergency SSH/RDP
      default: ssm-only
      options:
      - label: Standard (SSM Only)
        value: ssm-only
      - label: Advanced (Enable SSH/RDP)
        value: enabled
      group: Security & Connectivity
      isEssential: false
      order: 160
      help_text: 'Standard Security Policy

        SSH and RDP ports remain closed. Secure management via AWS Systems Manager (SSM) is enabled by default.'
    ssh_access_ip:
      type: string
      title: Admin Access IP (SSH/RDP)
      description: IP address or CIDR block (required for advanced mode)
      placeholder: e.g. 203.0.113.25/32
      group: Security & Connectivity
      visibleIf:
        ssh_mode: enabled
      isEssential: true
      order: 161
    endpoint_header:
      type: separator
      title: Endpoint Configuration
      group: Security & Connectivity
      isEssential: true
      order: 170
    enable_ssm_endpoints:
      type: boolean
      title: Enable SSM Endpoints
      description: Interface Endpoints for secure management
      default: true
