metadata:
  name: aws-rds-postgres-nonprod
  title: RDS PostgreSQL
  description: Cost-optimized managed PostgreSQL database for development and staging with automated backups and VPC isolation.
  category: database
  version: latest
  author: InnovativeApps
  cloud: aws
  environment: nonprod
  base_cost: $15/month
  features:
  - GP3 storage with auto-scaling up to configurable limit
  - Secrets Manager password integration
  - Automated backups with configurable retention
  - Full VPC isolation with security group tiering
  - Optional Performance Insights for query analysis
  tags:
  - rds
  - postgres
  - database
  - nonprod
  deployment_time: 8-12 minutes
  complexity: intermediate
  pillars:
  - title: Security
    score: excellent
    score_color: '#10b981'
    description: Defense-in-depth with encryption, VPC isolation, and IAM authentication
    practices:
    - Storage encryption at rest with AWS-managed keys
    - VPC isolation with dedicated database security groups
    - Password stored securely in AWS Secrets Manager
    - Private subnet placement prevents public internet exposure
    - IAM authentication support for credential-free access
  - title: Reliability
    score: excellent
    score_color: '#10b981'
    description: Automated backups and recovery options ensure data durability
    practices:
    - Multi-AZ deployment option for automatic failover
    - Automated daily backups with configurable retention period
    - Point-in-time recovery within the backup retention window
    - Auto-scaling storage prevents out-of-space failures
    - Automated minor version upgrades for stability patches
  - title: Operational Excellence
    score: good
    score_color: '#f59e0b'
    description: Managed service with monitoring and automated maintenance
    practices:
    - Infrastructure as Code with Pulumi for repeatable deployments
    - CloudWatch metrics for CPU, memory, and I/O monitoring
    - Parameter groups for engine-level tuning
    - Automated maintenance windows for patching
    - Performance Insights for query-level diagnostics
  - title: Performance Efficiency
    score: good
    score_color: '#f59e0b'
    description: Right-sized instances with GP3 storage for consistent performance
    practices:
    - GP3 storage provides baseline 3,000 IOPS at no extra cost
    - Read replicas available for read-heavy workloads
    - Configurable instance types for workload-specific sizing
    - Auto-scaling storage eliminates manual capacity planning
    - Performance Insights identifies slow queries and bottlenecks
  - title: Cost Optimization
    score: good
    score_color: '#f59e0b'
    description: Cost-optimized defaults with burstable instances and right-sizing options
    practices:
    - Burstable db.t3 instances for variable workloads
    - Reserved instance pricing available for predictable usage
    - Auto-scaling storage avoids over-provisioning
    - Short backup retention reduces storage costs for nonprod
    - Single-AZ default saves 50% vs Multi-AZ for dev/test
  - title: Sustainability
    score: good
    score_color: '#f59e0b'
    description: Managed service with efficient resource utilization and right-sizing
    practices:
    - Graviton-based instance types available for energy efficiency
    - Auto-scaling storage reduces over-provisioned capacity
    - Burstable instances match resource usage to actual demand
    - Managed service eliminates idle infrastructure overhead
    - Regional deployment minimizes data transfer distances
  architecture:
    optional_features:
    - Performance Insights (optional)
    summary: RDS PostgreSQL Non-Production Template
  action_name: aws-rds-postgres-nonprod
  tier: template
  use_cases:
  - Development and testing environments
  - Staging infrastructure
  - Non-production workloads
resources:
  '{project_name}-postgres-ingress':
    type: aws:ec2:SecurityGroupRule
    name: '{project_name}-postgres-ingress'
    always_created: true
    description: SecurityGroupRule resource
    smart_defaults:
      type: ingress
      security_group_id: '{config_id}'
      protocol: tcp
      from_port: 5432
      to_port: 5432
      cidr_blocks: '{config_allowed_cidr_blocks}'
      description: PostgreSQL access for {db_identifier} ({config_environment})
  '{project_name}-password':
    type: aws:secretsmanager:Secret
    name: '{project_name}-password'
    always_created: true
    description: Secret resource
    smart_defaults:
      name: secret-db-{config_project}-password-nonprod-{config_region_short}
      description: Master password for {db_identifier}
      recovery_window_in_days: 7
      tags: '{tags}'
  '{project_name}-password-version':
    type: aws:secretsmanager:SecretVersion
    name: '{project_name}-password-version'
    always_created: true
    description: SecretVersion resource
    smart_defaults:
      secret_id: '{config_id}'
      secret_string: '{computed}'
  '{namer_rds}':
    type: aws:rds:Instance
    name: '{namer_rds}'
    always_created: true
    description: Instance resource
    smart_defaults:
      engine: postgres
      engine_version: '15'
      instance_class: '{config_db_instance_class}'
      allocated_storage: 20
      max_allocated_storage: '{config_max_allocated_storage}'
      username: postgres
      password: '{db_password}'
      db_subnet_group_name: '{config_name}'
      vpc_security_group_ids:
      - '{sg_id}'
      db_name: mydb
      storage_type: gp3
      storage_encrypted: '{config_storage_encrypted}'
      publicly_accessible: '{config_publicly_accessible}'
      multi_az: '{config_multi_az}'
      backup_retention_period: '{config_backup_retention_days}'
      skip_final_snapshot: '{config_skip_final_snapshot}'
      deletion_protection: <deletion_protection_enabled>
      performance_insights_enabled: '{config_enable_performance_insights}'
      tags:
        Name: '{db_identifier}'
  secg-db-{project}-{environment}-{region_short}:
    type: aws:ec2:SecurityGroup
    name: secg-db-{project}-{environment}-{region_short}
    always_created: true
    description: Security group for database tier
    smart_defaults:
      vpc_id: '{config_id}'
      description: Security group for database tier
      ingress:
      - protocol: tcp
        from_port: 3306
        to_port: 3306
        security_groups:
        - '{security_group_app}'
        description: MySQL from app tier
      - protocol: tcp
        from_port: 5432
        to_port: 5432
        security_groups:
        - '{security_group_app}'
        description: PostgreSQL from app tier
      - protocol: tcp
        from_port: 1433
        to_port: 1433
        security_groups:
        - '{security_group_app}'
        description: SQL Server from app tier
      egress:
      - protocol: '-1'
        from_port: 0
        to_port: 0
        cidr_blocks:
        - 0.0.0.0/0
        description: Allow all outbound
  sng-db-{config_project}-main-nonprod-{config_region_short}:
    type: aws:rds:SubnetGroup
    name: sng-db-{config_project}-main-nonprod-{config_region_short}
    always_created: true
    description: SubnetGroup resource
    smart_defaults:
      subnet_ids: '{config_subnet_ids}'
      description: Subnet group for {db_identifier}
      tags:
        Name: '{sng_name}'
  vpc-{project}-{environment}-{region_short}-{network_num}:
    type: aws:ec2:Vpc
    name: vpc-{project}-{environment}-{region_short}-{network_num}
    always_created: true
    description: Virtual Private Cloud with CIDR {config_custom_cidr_block}, DNS support enabled
    smart_defaults:
      cidr_block: '{config_custom_cidr_block}'
      enable_dns_support: '{config_enable_dns_support}'
      enable_dns_hostnames: '{config_enable_dns_hostnames}'
      instance_tenancy: '{config_instance_tenancy}'
      tags:
        Name: '{vpc_name}'
  igw-main-{project}-{environment}-{region_short}:
    type: aws:ec2:InternetGateway
    name: igw-main-{project}-{environment}-{region_short}
    always_created: true
    description: Internet Gateway providing public internet connectivity for the VPC
    smart_defaults:
      vpc_id: '{config_id}'
      tags:
        Name: '{igw_name}'
  rt-public-{project}-{environment}-{region_short}:
    type: aws:ec2:RouteTable
    name: rt-public-{project}-{environment}-{region_short}
    always_created: true
    description: Route table for public tier network traffic routing
    smart_defaults:
      vpc_id: '{config_id}'
      tags:
        Name: '{public_rt_name}'
        Tier: public
  rt-private-{project}-{environment}-{region_short}:
    type: aws:ec2:RouteTable
    name: rt-private-{project}-{environment}-{region_short}
    always_created: true
    description: Route table for private tier network traffic routing
    smart_defaults:
      vpc_id: '{config_id}'
      tags:
        Name: '{private_rt_name}'
        Tier: private
  vpce-s3-{project}-{environment}-{region_short}-gw:
    type: aws:ec2:VpcEndpoint
    name: vpce-s3-{project}-{environment}-{region_short}-gw
    always_created: true
    description: S3 Gateway VPC Endpoint for private S3 service access
    smart_defaults:
      vpc_id: '{config_id}'
      service_name: com.amazonaws.{config_region}.s3
      vpc_endpoint_type: Gateway
      tags:
        Name: '{s3_endpoint_name}'
  vpce-dynamodb-{project}-{environment}-{region_short}-gw:
    type: aws:ec2:VpcEndpoint
    name: vpce-dynamodb-{project}-{environment}-{region_short}-gw
    always_created: true
    description: DYNAMODB Gateway VPC Endpoint for private DYNAMODB service access
    smart_defaults:
      vpc_id: '{config_id}'
      service_name: com.amazonaws.{config_region}.dynamodb
      vpc_endpoint_type: Gateway
      tags:
        Name: '{dynamodb_endpoint_name}'
  secg-web-{project}-{environment}-{region_short}:
    type: aws:ec2:SecurityGroup
    name: secg-web-{project}-{environment}-{region_short}
    always_created: true
    description: Security group for web tier (HTTP/HTTPS)
    smart_defaults:
      vpc_id: '{config_id}'
      description: Security group for web tier (HTTP/HTTPS)
      ingress:
      - protocol: tcp
        from_port: 80
        to_port: 80
        cidr_blocks:
        - 0.0.0.0/0
        description: HTTP from internet
      - protocol: tcp
        from_port: 443
        to_port: 443
        cidr_blocks:
        - 0.0.0.0/0
        description: HTTPS from internet
      egress:
      - protocol: '-1'
        from_port: 0
        to_port: 0
        cidr_blocks:
        - 0.0.0.0/0
        description: Allow all outbound
      tags:
        Name: '{web_sg_name}'
        Tier: web
  secg-app-{project}-{environment}-{region_short}:
    type: aws:ec2:SecurityGroup
    name: secg-app-{project}-{environment}-{region_short}
    always_created: true
    description: Security group for application tier
    smart_defaults:
      vpc_id: '{config_id}'
      description: Security group for application tier
      ingress:
      - protocol: tcp
        from_port: 3000
        to_port: 3000
        security_groups:
        - '{security_group_web}'
        description: App traffic from web tier
      - protocol: tcp
        from_port: 8080
        to_port: 8080
        security_groups:
        - '{security_group_web}'
        description: Alt app port from web tier
      egress:
      - protocol: '-1'
        from_port: 0
        to_port: 0
        cidr_blocks:
        - 0.0.0.0/0
        description: Allow all outbound
      tags:
        Name: '{app_sg_name}'
        Tier: app
  pubsub-{project}-{environment}-{region_short}-{az_short}-{subnet_num}:
    type: aws:ec2:Subnet
    name: pubsub-{project}-{environment}-{region_short}-{az_short}-{subnet_num}
    always_created: true
    description: 'Public subnet for public tier workloads (CIDR: {public_cidr})'
    smart_defaults:
      vpc_id: '{config_id}'
      cidr_block: '{public_cidr}'
      availability_zone: '{config_region}a'
      map_public_ip_on_launch: true
      tags:
        Name: '{public_subnet_name}'
        Tier: public
  privsub-{project}-{environment}-{region_short}-{az_short}-{subnet_num}:
    type: aws:ec2:Subnet
    name: privsub-{project}-{environment}-{region_short}-{az_short}-{subnet_num}
    always_created: true
    description: 'Private subnet for private tier workloads (CIDR: {private_cidr})'
    smart_defaults:
      vpc_id: '{config_id}'
      cidr_block: '{private_cidr}'
      availability_zone: '{config_region}a'
      map_public_ip_on_launch: false
      tags:
        Name: '{private_subnet_name}'
        Tier: private
  route-00000-{project}-{environment}-{region_short}-igw:
    type: aws:ec2:Route
    name: route-00000-{project}-{environment}-{region_short}-igw
    always_created: true
    description: Route directing 0.0.0.0/0 traffic to Internet Gateway
    smart_defaults:
      route_table_id: '{id}'
      destination_cidr_block: 0.0.0.0/0
      gateway_id: '{config_id}'
  rta-public-{project}-{environment}-{region_short}-1:
    type: aws:ec2:RouteTableAssociation
    name: rta-public-{project}-{environment}-{region_short}-1
    always_created: true
    description: Associates a route table with a subnet for traffic routing
    smart_defaults:
      subnet_id: '{id}'
      route_table_id: '{id}'
  rta-private-{project}-{environment}-{region_short}-1:
    type: aws:ec2:RouteTableAssociation
    name: rta-private-{project}-{environment}-{region_short}-1
    always_created: true
    description: Associates a route table with a subnet for traffic routing
    smart_defaults:
      subnet_id: '{id}'
      route_table_id: '{id}'
  rt-isolated-{project}-{environment}-{region_short}:
    type: aws:ec2:RouteTable
    name: rt-isolated-{project}-{environment}-{region_short}
    description: Route table for isolated tier network traffic routing
    conditional:
      field: enable_isolated_tier
    smart_defaults:
      vpc_id: '{config_id}'
      tags:
        Name: '{isolated_rt_name}'
        Tier: isolated
  secg-access-{project}-{environment}-{region_short}:
    type: aws:ec2:SecurityGroup
    name: secg-access-{project}-{environment}-{region_short}
    description: Management access security group (SSH/RDP)
    conditional:
      field: enable_ssh
    smart_defaults:
      vpc_id: '{config_id}'
      description: Management access security group (SSH/RDP)
      ingress: '{access_sg_ingress}'
      egress:
      - protocol: '-1'
        from_port: 0
        to_port: 0
        cidr_blocks:
        - 0.0.0.0/0
        description: Allow all outbound
      tags:
        Name: '{access_sg_name}'
        Tier: management
  isolatedsub-{project}-{environment}-{region_short}-{az_short}-{subnet_num}:
    type: aws:ec2:Subnet
    name: isolatedsub-{project}-{environment}-{region_short}-{az_short}-{subnet_num}
    description: 'Private subnet for isolated tier workloads (CIDR: {isolated_cidr})'
    conditional:
      field: enable_isolated_tier
    smart_defaults:
      vpc_id: '{config_id}'
      cidr_block: '{isolated_cidr}'
      availability_zone: '{config_region}a'
      map_public_ip_on_launch: false
      tags:
        Name: '{isolated_subnet_name}'
        Tier: isolated
  eip-{purpose}-{project}-{environment}-{region_short}-{az_short}:
    type: aws:ec2:Eip
    name: eip-{purpose}-{project}-{environment}-{region_short}-{az_short}
    description: Elastic IP address for NAT Gateway attachment
    conditional:
      field: enable_nat_gateway
    smart_defaults:
      domain: vpc
      tags:
        Name: '{eip_name}'
  nat-gw-{project}-{environment}-{region_short}-{az_short}:
    type: aws:ec2:NatGateway
    name: nat-gw-{project}-{environment}-{region_short}-{az_short}
    description: NAT Gateway providing outbound internet access for private subnets
    conditional:
      field: enable_nat_gateway
    smart_defaults:
      subnet_id: '{id}'
      allocation_id: '{id}'
      tags:
        Name: '{nat_name}'
  route-00000-{project}-{environment}-{region_short}-nat:
    type: aws:ec2:Route
    name: route-00000-{project}-{environment}-{region_short}-nat
    always_created: true
    description: Route directing 0.0.0.0/0 traffic to NAT Gateway
    smart_defaults:
      route_table_id: '{id}'
      destination_cidr_block: 0.0.0.0/0
      nat_gateway_id: '{config_id}'
  rta-isolated-{project}-{environment}-{region_short}-1:
    type: aws:ec2:RouteTableAssociation
    name: rta-isolated-{project}-{environment}-{region_short}-1
    description: Associates a route table with a subnet for traffic routing
    conditional:
      field: enable_isolated_tier
    smart_defaults:
      subnet_id: '{id}'
      route_table_id: '{id}'
  vpce-rds-{project}-{environment}-{region_short}-if:
    type: aws:ec2:VpcEndpoint
    name: vpce-rds-{project}-{environment}-{region_short}-if
    description: RDS Interface VPC Endpoint for private RDS service access
    conditional:
      field: enable_rds_endpoint
    smart_defaults:
      vpc_id: '{config_id}'
      service_name: com.amazonaws.{config_region}.rds
      vpc_endpoint_type: Interface
      subnet_ids:
      - '{id}'
      security_group_ids:
      - '{id}'
      private_dns_enabled: true
      tags:
        Name: '{rds_endpoint_name}'
  vpce-ssm-{project}-{environment}-{region_short}-if:
    type: aws:ec2:VpcEndpoint
    name: vpce-ssm-{project}-{environment}-{region_short}-if
    description: SSM Interface VPC Endpoint for private SSM service access
    conditional:
      field: enable_ssm_endpoints
    smart_defaults:
      vpc_id: '{config_id}'
      service_name: com.amazonaws.{config_region}.ssm
      vpc_endpoint_type: Interface
      subnet_ids:
      - '{id}'
      private_dns_enabled: true
      tags:
        Name: '{ssm_endpoint_name}'
  vpce-ssmmessages-{project}-{environment}-{region_short}-if:
    type: aws:ec2:VpcEndpoint
    name: vpce-ssmmessages-{project}-{environment}-{region_short}-if
    description: SSMMESSAGES Interface VPC Endpoint for private SSMMESSAGES service access
    conditional:
      field: enable_ssm_endpoints
    smart_defaults:
      vpc_id: '{config_id}'
      service_name: com.amazonaws.{config_region}.ssmmessages
      vpc_endpoint_type: Interface
      subnet_ids:
      - '{id}'
      private_dns_enabled: true
      tags:
        Name: '{ssm_messages_endpoint_name}'
  vpce-ec2messages-{project}-{environment}-{region_short}-if:
    type: aws:ec2:VpcEndpoint
    name: vpce-ec2messages-{project}-{environment}-{region_short}-if
    description: EC2MESSAGES Interface VPC Endpoint for private EC2MESSAGES service access
    conditional:
      field: enable_ssm_endpoints
    smart_defaults:
      vpc_id: '{config_id}'
      service_name: com.amazonaws.{config_region}.ec2messages
      vpc_endpoint_type: Interface
      subnet_ids:
      - '{id}'
      private_dns_enabled: true
      tags:
        Name: '{ec2_messages_endpoint_name}'
  s3-{purpose}-{project}-{environment}-{region_short}:
    type: aws:s3:Bucket
    name: s3-{purpose}-{project}-{environment}-{region_short}
    description: S3 bucket for VPC Flow Logs storage
    conditional:
      field: enable_flow_logs
    smart_defaults:
      bucket: '{bucket_name}'
      force_destroy: true
      tags:
        Name: '{bucket_name}'
        Purpose: VPC Flow Logs
  '{bucket_name}-lifecycle':
    type: aws:s3:BucketLifecycleConfigurationV2
    name: '{bucket_name}-lifecycle'
    description: S3 bucket lifecycle rules for automatic log retention and deletion
    conditional:
      field: enable_flow_logs
    smart_defaults:
      bucket: '{config_id}'
      rules:
      - id: delete-old-flow-logs
        status: Enabled
  fl-{scope}-{project}-{environment}-{region_short}-{traffic}:
    type: aws:ec2:FlowLog
    name: fl-{scope}-{project}-{environment}-{region_short}-{traffic}
    description: VPC Flow Logs capturing ALL network traffic to S3
    conditional:
      field: enable_flow_logs
    smart_defaults:
      vpc_id: '{config_id}'
      traffic_type: ALL
      log_destination_type: s3
      log_destination: '{computed}'
      max_aggregation_interval: 600
      tags:
        Name: '{flow_log_name}'
configuration:
  properties:
    resource_prefix:
      type: string
      title: Resource Prefix
      description: Get resource name prefix
      group: General Settings
      order: 1
    deletion_protection_enabled:
      type: boolean
      title: Deletion Protection Enabled
      description: Deletion protection disabled for nonprod
      group: General Settings
      order: 2
    project_name:
      type: string
      title: Project Name
      description: Unique name for this project (used in resource naming)
      group: Essentials
      isEssential: true
      order: 1
    region:
      type: string
      title: AWS Region
      description: AWS region to deploy into
      default: us-east-1
      enum:
      - us-east-1
      - us-east-2
      - us-west-1
      - us-west-2
      - eu-west-1
      - eu-central-1
      - ap-southeast-1
      group: Essentials
      isEssential: true
      order: 2
    db_name:
      type: string
      title: Database Name
      description: Name of the PostgreSQL database to create
      default: mydb
      group: Database
      isEssential: true
      order: 10
    db_username:
      type: string
      title: Master Username
      description: Master username for the database
      default: postgres
      group: Database
      isEssential: true
      order: 11
    engine_version:
      type: string
      title: PostgreSQL Version
      description: PostgreSQL engine version
      default: '15'
      enum:
      - '13'
      - '14'
      - '15'
      - '16'
      group: Database
      isEssential: true
      order: 12
    instance_class:
      type: string
      title: Instance Class
      description: RDS instance size
      default: db.t3.micro
      enum:
      - db.t3.micro
      - db.t3.small
      - db.t3.medium
      - db.t3.large
      - db.t4g.micro
      - db.t4g.small
      - db.m5.large
      group: Database
      isEssential: true
      order: 13
    allocated_storage:
      type: number
      title: Storage (GB)
      description: Initial allocated storage in gigabytes
      default: 20
      minimum: 20
      maximum: 1000
      group: Database
      order: 14
    backup_retention:
      type: number
      title: Backup Retention (days)
      description: Number of days to retain automated backups
      default: 7
      minimum: 0
      maximum: 35
      group: Database
      order: 15
    vpc_mode:
      type: string
      title: VPC Mode
      description: Create a new VPC or use an existing one
      default: new
      enum:
      - new
      - existing
      group: Networking
      isEssential: true
      order: 20
    vpc_id:
      type: string
      title: Existing VPC ID
      description: ID of an existing VPC to deploy into
      placeholder: vpc-0abc123def456
      visibleIf:
        vpc_mode: existing
      group: Networking
      order: 21
    deletion_protection:
      type: boolean
      title: Deletion Protection
      description: Prevent accidental deletion of the database
      default: false
      group: Security
      order: 30
  required:
  - project_name
  - db_name
outputs:
- name: db_instance_id
  description: 'Output: db_instance_id'
- name: db_address
  description: 'Output: db_address'
- name: db_port
  description: 'Output: db_port'
- name: db_endpoint
  description: 'Output: db_endpoint'
- name: connection_string
  description: 'Output: connection_string'
- name: db_password_secret_name
  description: 'Output: db_password_secret_name'
cost_calculator:
  base_cost: 20
  components:
    db_instance_base:
      cost: 20
      description: RDS PostgreSQL (db.t3.micro)
      always_included: true
