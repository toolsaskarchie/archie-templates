    # ARCHITECTURE DECISION: Database Deployment Mode
    deployment_mode:
      type: select
      title: Database Deployment Architecture
      description: Choose availability and failover configuration
      default: single_az
      group: Architecture Decisions
      isEssential: true
      architecture_decision: true
      smart_default_enabled: true
      resources_impacted:
        - rds-{project}-{environment}-{region_short}
      order: 210
      options:
      - label: Single-AZ
        value: single_az
        description: Cost-optimized for dev/test (base cost ~$20/month)
      - label: Multi-AZ
        value: multi_az
        description: Production HA with automatic failover (+100% cost ~$40/month)
    # ARCHITECTURE DECISION: Read Scaling
    read_replica_mode:
      type: select
      title: Read Replica Configuration
      description: Add read-only replicas for scaling read traffic
      default: none
      group: Architecture Decisions
      isEssential: true
      architecture_decision: true
      smart_default_enabled: false
      resources_impacted:
        - rds-replica-{project}-{environment}-{region_short}-1
        - rds-replica-{project}-{environment}-{region_short}-2
      order: 211
      options:
      - label: No Read Replicas
        value: none
        description: Writer instance only
      - label: 1 Read Replica
        value: single
        description: +$20/month for additional db.t3.micro
      - label: 2 Read Replicas
        value: dual
        description: +$40/month for two additional instances
