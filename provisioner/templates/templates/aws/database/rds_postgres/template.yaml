metadata:
  name: aws-rds-postgres
  title: RDS PostgreSQL (Production)
  description: Enterprise-ready PostgreSQL with Multi-AZ high availability, encryption, and automated backups.
  category: database
  version: latest
  author: InnovativeApps
  cloud: aws
  environment: prod
  base_cost: $50/month
  features:
  - High-availability Multi-AZ deployment with automatic failover
  - Auto-scaling GP3 storage with encryption at rest
  - Secure password management via AWS Secrets Manager
  - Full VPC isolation with managed security groups
  - Performance Insights and CloudWatch monitoring enabled
  tags:
  - database
  - postgresql
  - rds
  - production
  - high-availability
  deployment_time: 15-20 minutes
  complexity: advanced
  pillars:
  - title: Security
    score: excellent
    score_color: '#10b981'
    description: Enterprise-grade security with encryption, VPC isolation, and IAM authentication
    practices:
    - Storage encryption at rest with AWS KMS managed keys
    - SSL/TLS encryption enforced for all connections in transit
    - VPC isolation with dedicated database-tier security groups
    - Password stored and rotated via AWS Secrets Manager
    - IAM database authentication for credential-free access
  - title: Reliability
    score: excellent
    score_color: '#10b981'
    description: Multi-AZ architecture with automated failover and comprehensive backup strategy
    practices:
    - Multi-AZ deployment with synchronous standby replication
    - Automated daily backups with 30-day retention period
    - Point-in-time recovery to any second within retention window
    - Deletion protection enabled to prevent accidental data loss
    - Final snapshot on deletion ensures data preservation
  - title: Operational Excellence
    score: good
    score_color: '#f59e0b'
    description: Fully managed service with comprehensive monitoring and automated maintenance
    practices:
    - Infrastructure as Code with Pulumi for repeatable deployments
    - Performance Insights enabled for query-level diagnostics
    - CloudWatch metrics and alarms for proactive monitoring
    - Automated minor version upgrades and maintenance windows
    - Parameter groups for engine-level performance tuning
  - title: Performance Efficiency
    score: good
    score_color: '#f59e0b'
    description: Production-grade instances with GP3 storage and read replica support
    practices:
    - GP3 storage provides baseline 3,000 IOPS with burst capability
    - Read replicas available for horizontal read scaling
    - Configurable instance types from db.m5 to db.r6g families
    - Auto-scaling storage eliminates manual capacity planning
    - Performance Insights identifies slow queries and lock contention
  - title: Cost Optimization
    score: good
    score_color: '#f59e0b'
    description: Right-sized production instances with reserved capacity options
    practices:
    - Reserved instance pricing available for 1-year or 3-year terms
    - Auto-scaling storage avoids over-provisioning disk capacity
    - Right-sizing recommendations via Performance Insights
    - GP3 storage eliminates IOPS provisioning costs for most workloads
    - Copy-tags-to-snapshot enables cost allocation tracking
  - title: Sustainability
    score: good
    score_color: '#f59e0b'
    description: Managed service with Graviton support and efficient resource utilization
    practices:
    - Graviton-based db.r6g/db.m6g instances for energy efficiency
    - Auto-scaling storage reduces over-provisioned capacity waste
    - Managed service eliminates idle infrastructure overhead
    - Multi-AZ uses synchronous replication minimizing data duplication
    - Regional deployment reduces cross-region data transfer
  architecture:
    summary: RDS PostgreSQL Production Template
  action_name: aws-rds-postgres
  tier: template
  use_cases:
  - Production workloads
  - Mission-critical applications
  - Enterprise-grade infrastructure
resources:
  '{project_name}-postgres-ingress':
    type: aws:ec2:SecurityGroupRule
    name: '{project_name}-postgres-ingress'
    always_created: true
    description: SecurityGroupRule resource
    smart_defaults:
      type: ingress
      security_group_id: '{config_id}'
      protocol: tcp
      from_port: 5432
      to_port: 5432
      cidr_blocks: '{config_allowed_cidr_blocks}'
      description: PostgreSQL access for {db_identifier}
  '{project_name}-password':
    type: aws:secretsmanager:Secret
    name: '{project_name}-password'
    always_created: true
    description: Secret resource
    smart_defaults:
      name: secret-db-{config_project}-password-nonprod-{config_region_short}
      description: Master password for {db_identifier}
      recovery_window_in_days: 7
      tags: '{tags}'
  '{project_name}-password-version':
    type: aws:secretsmanager:SecretVersion
    name: '{project_name}-password-version'
    always_created: true
    description: SecretVersion resource
    smart_defaults:
      secret_id: '{config_id}'
      secret_string: '{computed}'
  '{namer_rds}':
    type: aws:rds:Instance
    name: '{namer_rds}'
    always_created: true
    description: Instance resource
    smart_defaults:
      instance_class: '{config_db_instance_class}'
      allocated_storage: '{config_allocated_storage}'
      engine: postgres
      engine_version: '{config_engine_version}'
      identifier: '{namer_rds}'
      db_name: '{config_db_name}'
      username: '{config_db_username}'
      password: '{db_password}'
      db_subnet_group_name: '{config_name}'
      vpc_security_group_ids:
      - '{sg_id}'
      publicly_accessible: '{config_publicly_accessible}'
      multi_az: '{computed}'
      storage_type: gp3
      storage_encrypted: '{config_storage_encrypted}'
      backup_retention_period: '{config_backup_retention_days}'
      skip_final_snapshot: '{config_skip_final_snapshot}'
      performance_insights_enabled: true
      performance_insights_retention_period: 7
      copy_tags_to_snapshot: true
      deletion_protection: true
      tags:
        Name: '{db_identifier}'
  secg-db-{project}-{environment}-{region_short}:
    type: aws:ec2:SecurityGroup
    name: secg-db-{project}-{environment}-{region_short}
    always_created: true
    description: Security group for database tier
    smart_defaults:
      vpc_id: '{config_id}'
      description: Security group for database tier
      egress:
      - protocol: '-1'
        from_port: 0
        to_port: 0
        cidr_blocks:
        - 0.0.0.0/0
      tags:
        Name: '{db_sg_name}'
        Project: '{project_name}'
        Environment: prod
        Tier: db
        ManagedBy: Archie
  sng-db-{config_project}-main-nonprod-{config_region_short}:
    type: aws:rds:SubnetGroup
    name: sng-db-{config_project}-main-nonprod-{config_region_short}
    always_created: true
    description: SubnetGroup resource
    smart_defaults:
      subnet_ids: '{config_subnet_ids}'
      description: Subnet group for {db_identifier}
      tags:
        Name: '{sng_name}'
  vpc-{project}-{environment}-{region_short}-{network_num}:
    type: aws:ec2:Vpc
    name: vpc-{project}-{environment}-{region_short}-{network_num}
    always_created: true
    description: Virtual Private Cloud with CIDR {cidr_block}, DNS support enabled
    smart_defaults:
      cidr_block: '{cidr_block}'
      enable_dns_support: '{computed}'
      enable_dns_hostnames: '{computed}'
      instance_tenancy: '{computed}'
      tags:
        Name: '{vpc_resource_name}'
        Project: '{project_name}'
        Environment: prod
        ManagedBy: Archie
  igw-main-{project}-{environment}-{region_short}:
    type: aws:ec2:InternetGateway
    name: igw-main-{project}-{environment}-{region_short}
    always_created: true
    description: Internet Gateway providing public internet connectivity for the VPC
    smart_defaults:
      vpc_id: '{config_id}'
      tags:
        Name: '{igw_name}'
        Project: '{project_name}'
        Environment: prod
  rt-public-{project}-{environment}-{region_short}:
    type: aws:ec2:RouteTable
    name: rt-public-{project}-{environment}-{region_short}
    always_created: true
    description: Route table for public tier network traffic routing
    smart_defaults:
      vpc_id: '{config_id}'
      tags:
        Name: '{public_rt_name}'
        Project: '{project_name}'
        Environment: prod
        Tier: public
  vpce-s3-{project}-{environment}-{region_short}-gw:
    type: aws:ec2:VpcEndpoint
    name: vpce-s3-{project}-{environment}-{region_short}-gw
    always_created: true
    description: S3 Gateway VPC Endpoint for private S3 service access
    smart_defaults:
      vpc_id: '{config_id}'
      service_name: com.amazonaws.{region}.s3
      vpc_endpoint_type: Gateway
      route_table_ids: '{endpoint_rt_ids}'
      tags:
        Name: '{s3_name}'
        Project: '{project_name}'
        Environment: prod
  vpce-dynamodb-{project}-{environment}-{region_short}-gw:
    type: aws:ec2:VpcEndpoint
    name: vpce-dynamodb-{project}-{environment}-{region_short}-gw
    always_created: true
    description: DYNAMODB Gateway VPC Endpoint for private DYNAMODB service access
    smart_defaults:
      vpc_id: '{config_id}'
      service_name: com.amazonaws.{region}.dynamodb
      vpc_endpoint_type: Gateway
      route_table_ids: '{endpoint_rt_ids}'
      tags:
        Name: '{ddb_name}'
        Project: '{project_name}'
        Environment: prod
  secg-web-{project}-{environment}-{region_short}:
    type: aws:ec2:SecurityGroup
    name: secg-web-{project}-{environment}-{region_short}
    always_created: true
    description: Security group for web tier - allows HTTP/HTTPS traffic
    smart_defaults:
      vpc_id: '{config_id}'
      description: Security group for web tier - allows HTTP/HTTPS traffic
      ingress:
      - protocol: tcp
        from_port: 80
        to_port: 80
        cidr_blocks:
        - 0.0.0.0/0
      - protocol: tcp
        from_port: 443
        to_port: 443
        cidr_blocks:
        - 0.0.0.0/0
      egress:
      - protocol: '-1'
        from_port: 0
        to_port: 0
        cidr_blocks:
        - 0.0.0.0/0
      tags:
        Name: '{web_sg_name}'
        Project: '{project_name}'
        Environment: prod
        Tier: web
        ManagedBy: Archie
  secg-app-{project}-{environment}-{region_short}:
    type: aws:ec2:SecurityGroup
    name: secg-app-{project}-{environment}-{region_short}
    always_created: true
    description: Security group for application tier
    smart_defaults:
      vpc_id: '{config_id}'
      description: Security group for application tier
      egress:
      - protocol: '-1'
        from_port: 0
        to_port: 0
        cidr_blocks:
        - 0.0.0.0/0
      tags:
        Name: '{app_sg_name}'
        Project: '{project_name}'
        Environment: prod
