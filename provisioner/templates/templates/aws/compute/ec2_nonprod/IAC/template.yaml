# EC2 Non-Prod Template Metadata

template:
  # Identification
  id: ec2-nonprod
  name: ec2-nonprod

  # Display Information
  title: EC2 Non-Production Instance
  subtitle: Single EC2 instance for development and testing
  description: |
    Deploy a single EC2 instance for development and testing with flexible VPC options.
    Can create a new VPC with public/private subnets or use an existing VPC.
    Includes security groups, IAM roles, and SSH key pair support.

  # Classification
  category: Compute
  provider: aws
  tier: template
  complexity: intermediate

  # Visual
  icon: 💻

  # Versioning
  version: 1.0.0
  status: stable

  # Pricing & Time
  pricing_tier: basic
  estimated_cost: $45 - $60/month
  deployment_time: 5-10 minutes

  # Marketing
  use_cases:
    - Development servers
    - Testing environments
    - Learning AWS compute
    - Application prototyping
    - CI/CD build agents

  features:
    - Flexible VPC modes (new or existing)
    - Multiple instance types
    - Security group configuration
    - SSH key pair support
    - IAM roles and instance profiles
    - CloudWatch monitoring

  outputs:
    - Instance ID
    - Public IP (if applicable)
    - Private IP
    - Security Group IDs
    - IAM Role ARN
    - VPC ID (if created)