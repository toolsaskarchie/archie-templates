metadata:
  name: aws-ec2-nonprod
  title: Flexible EC2 Development Instance
  description: Complete cost-optimized EC2 infrastructure for development, staging,
    and testing environments. Choose between creating a new VPC with full networking
    setup (subnets, internet gateway, NAT gateway, route tables, security groups)
    or deploying into an existing VPC. Includes EC2 instance with IAM role/profile,
    multiple application presets (Web Server, WordPress, MySQL, Node.js, ALB Backend,
    Custom), pre-configured security groups for SSH access, application traffic, database
    connections, and web services. Features VPC endpoints for S3 and DynamoDB, VPC
    Flow Logs for monitoring, and AWS Systems Manager (SSM) integration for secure
    instance management without SSH keys. Supports both public and private subnet
    deployments with optional NAT gateway for private subnet internet access. Automatically
    assigns appropriate security groups based on application preset (web presets get
    HTTP/HTTPS access, database presets get app security groups). Creates IAM roles
    with SSM managed policies and S3 read access for static assets. Exports instance
    details, IP addresses, VPC information, and connection commands for SSH and SSM
    access.
  category: compute
  version: latest
  author: InnovativeApps
  base_template: aws-vpc-nonprod
  tags:
  - ec2
  - compute
  - development
  - nonprod
  - cost-optimized
  use_cases:
  - title: Development & Testing Workloads
    description: Deploy isolated EC2 instances for application development, QA testing,
      and staging environments with cost-effective instance types.
  - title: Web Application Hosting
    description: Host web servers, WordPress sites, or Node.js applications with pre-configured
      security groups and application presets.
  - title: Database Development Instances
    description: Run MySQL, PostgreSQL, or other database engines for development
      and testing with appropriate security controls.
  - title: CI/CD Build Agents
    description: Deploy dedicated build agents or Jenkins workers with SSM access
      and S3 integration for artifact storage.
  - title: Application Backend Services
    description: Run backend APIs and microservices behind Application Load Balancers
      with auto-configured security groups.
  features:
  - Flexible VPC Integration (New/Existing VPC)
  - Application/Stack Presets (Web, Node.js, DB)
  - Cost-Effective t3-Family Instance Support
  - Integrated Security Group presets for Common Ports
  - Secure Access via SSH or AWS Systems Manager (SSM)
  - S3 Integration for Static Assets & Deployment
  - Multi-Instance Support with Custom Configurations
  - Multiple AMI Options (Amazon Linux 2, Ubuntu, Windows)
  estimated_cost: $10-35/month (Burstable performance)
  complexity: medium
  deployment_time: 5-8 minutes
  marketplace_group: aws-compute-group
  is_listed_in_marketplace: true
  pillars:
  - score: good
    practices:
    - SSM integration enables secure, auditable instance access without managing SSH
      keys or bastion hosts
    - Application presets provide standardized configurations for common workloads
      (web servers, databases, Node.js)
    - VPC Flow Logs capture network traffic for troubleshooting and security analysis
    - User data scripts automate initial instance configuration and application deployment
    - CloudWatch integration through SSM agent provides centralized logging and monitoring
    title: Operational Excellence
    score_color: '#f59e0b'
  - score: excellent
    practices:
    - Security groups restrict access to only required ports based on application
      preset
    - IAM instance profiles follow least-privilege principle with SSM and S3 read-only
      access
    - VPC isolation options (public/private subnets) protect instances from direct
      internet exposure
    - SSH/RDP access limited to specified IP ranges with optional key pair authentication
    - SSM Session Manager provides encrypted, auditable shell access without exposing
      SSH ports
    - VPC endpoints enable private AWS service access without internet gateway traversal
    title: Security
    score_color: '#10b981'
  - score: good
    practices:
    - Multi-AZ VPC architecture provides infrastructure redundancy for networking
      components
    - NAT gateway options ensure reliable outbound internet connectivity from private
      subnets
    - Instance status checks and automatic recovery can be enabled via AWS Systems
      Manager
    - Multiple availability zones supported for subnet placement
    - 'Note: Single-instance design suitable for dev/test; production workloads should
      use Auto Scaling Groups'
    title: Reliability
    score_color: '#f59e0b'
  - score: good
    practices:
    - T3 burstable instances provide cost-effective baseline performance with burst
      capacity
    - Application presets select appropriate instance types (t3.micro for web, t3.small
      for databases)
    - VPC endpoints reduce latency and data transfer costs for S3/DynamoDB access
    - Multiple AMI options (Amazon Linux 2, Ubuntu, Windows) optimized for different
      workloads
    - User data scripts enable rapid instance bootstrapping and application deployment
    title: Performance Efficiency
    score_color: '#f59e0b'
  - score: excellent
    practices:
    - T3 instance family provides lowest-cost option for variable workloads ($10-35/month)
    - Single-AZ VPC option eliminates unnecessary NAT gateway costs for dev environments
    - Optional NAT gateway deployment reduces costs when outbound internet not required
    - VPC endpoints eliminate data transfer charges for S3 and DynamoDB access
    - Burstable performance instances accumulate credits during idle periods for burst
      workloads
    - Flexible VPC modes allow using existing infrastructure to avoid duplication
      costs
    title: Cost Optimization
    score_color: '#10b981'
  - score: good
    practices:
    - T3 instances use AWS Nitro System for improved resource efficiency and lower
      power consumption
    - Burstable instances reduce over-provisioning by rightsizing to actual workload
      needs
    - Single-instance nonprod design minimizes unnecessary resource consumption
    - Optional VPC creation prevents infrastructure duplication across projects
    - SSM enables instance management without additional bastion hosts or jump boxes
    title: Sustainability
    score_color: '#f59e0b'
  action_name: aws-ec2-nonprod
  environment: nonprod
  cloud: aws
  tier: template
resources:
  role-{service}-{project}-{environment}-{region_short}:
    type: aws:iam:Role
    name: role-{service}-{project}-{environment}-{region_short}
    description: Role resource
    conditional:
      field: enable_ssm
    smart_defaults:
      assume_role_policy: '{json_config}'
      managed_policy_arns:
      - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      tags:
        Name: '{role_name}'
  '{namer_iam_profile}':
    type: aws:iam:InstanceProfile
    name: '{namer_iam_profile}'
    description: InstanceProfile resource
    conditional:
      field: enable_ssm
    smart_defaults:
      role: '{name}'
      tags:
        Name: '{profile_name}'
  ec2-{preset}-{project}-{environment}-{region_short}:
    type: aws:ec2:Instance
    name: ec2-{preset}-{project}-{environment}-{region_short}
    always_created: true
    description: Instance resource
    smart_defaults:
      instance_type: t3.micro
      ami: '{config_id}'
      subnet_id: <subnet_id>
      vpc_security_group_ids: '{base_security_groups}'
      iam_instance_profile: '{config_name}'
      key_name: <key_name>
      user_data: <user_data>
      tags:
        Name: '{name_final}'
        ManagedBy: Archie
  secg-access-{project}-{environment}-{region_short}:
    type: aws:ec2:SecurityGroup
    name: secg-access-{project}-{environment}-{region_short}
    description: Management access security group (SSH/RDP)
    conditional:
      field: enable_ssh
    smart_defaults:
      vpc_id: '{config_id}'
      description: Management access security group (SSH/RDP)
      ingress: '{access_sg_ingress}'
      egress:
      - protocol: '-1'
        from_port: 0
        to_port: 0
        cidr_blocks:
        - 0.0.0.0/0
        description: Allow all outbound
      tags:
        Name: '{access_sg_name}'
        Tier: management
  '{project_name}--rule-{idx}':
    type: aws:ec2:SecurityGroupRule
    name: '{project_name}--rule-{idx}'
    always_created: true
    description: SecurityGroupRule resource
    smart_defaults:
      type: ingress
      security_group_id: '{access_sg_id}'
      protocol: tcp
      from_port: '{remote_port}'
      to_port: '{remote_port}'
      cidr_blocks:
      - '{cidr_ip}'
      description: '{remote_proto} from {cidr_ip}'
  vpc-{project}-{environment}-{region_short}-{network_num}:
    type: aws:ec2:Vpc
    name: vpc-{project}-{environment}-{region_short}-{network_num}
    always_created: true
    description: Virtual Private Cloud with CIDR {config_custom_cidr_block}, DNS support
      enabled
    smart_defaults:
      cidr_block: '{config_custom_cidr_block}'
      enable_dns_support: <enable_dns_support>
      enable_dns_hostnames: <enable_dns_hostnames>
      instance_tenancy: default
      tags:
        Name: '{vpc_name}'
  igw-main-{project}-{environment}-{region_short}:
    type: aws:ec2:InternetGateway
    name: igw-main-{project}-{environment}-{region_short}
    always_created: true
    description: Internet Gateway providing public internet connectivity for the VPC
    smart_defaults:
      vpc_id: '{config_id}'
      tags:
        Name: '{igw_name}'
  rt-public-{project}-{environment}-{region_short}:
    type: aws:ec2:RouteTable
    name: rt-public-{project}-{environment}-{region_short}
    always_created: true
    description: Route table for public tier network traffic routing
    smart_defaults:
      vpc_id: '{config_id}'
      tags:
        Name: '{public_rt_name}'
        Tier: public
  rt-private-{project}-{environment}-{region_short}:
    type: aws:ec2:RouteTable
    name: rt-private-{project}-{environment}-{region_short}
    always_created: true
    description: Route table for private tier network traffic routing
    smart_defaults:
      vpc_id: '{config_id}'
      tags:
        Name: '{private_rt_name}'
        Tier: private
  vpce-s3-{project}-{environment}-{region_short}-gw:
    type: aws:ec2:VpcEndpoint
    name: vpce-s3-{project}-{environment}-{region_short}-gw
    always_created: true
    description: S3 Gateway VPC Endpoint for private S3 service access
    smart_defaults:
      vpc_id: '{config_id}'
      service_name: com.amazonaws.{config_region}.s3
      vpc_endpoint_type: Gateway
      tags:
        Name: '{s3_endpoint_name}'
  vpce-dynamodb-{project}-{environment}-{region_short}-gw:
    type: aws:ec2:VpcEndpoint
    name: vpce-dynamodb-{project}-{environment}-{region_short}-gw
    always_created: true
    description: DYNAMODB Gateway VPC Endpoint for private DYNAMODB service access
    smart_defaults:
      vpc_id: '{config_id}'
      service_name: com.amazonaws.{config_region}.dynamodb
      vpc_endpoint_type: Gateway
      tags:
        Name: '{dynamodb_endpoint_name}'
  secg-web-{project}-{environment}-{region_short}:
    type: aws:ec2:SecurityGroup
    name: secg-web-{project}-{environment}-{region_short}
    always_created: true
    description: Security group for web tier (HTTP/HTTPS)
    smart_defaults:
      vpc_id: '{config_id}'
      description: Security group for web tier (HTTP/HTTPS)
      ingress:
      - protocol: tcp
        from_port: 80
        to_port: 80
        cidr_blocks:
        - 0.0.0.0/0
        description: HTTP from internet
      - protocol: tcp
        from_port: 443
        to_port: 443
        cidr_blocks:
        - 0.0.0.0/0
        description: HTTPS from internet
      egress:
      - protocol: '-1'
        from_port: 0
        to_port: 0
        cidr_blocks:
        - 0.0.0.0/0
        description: Allow all outbound
      tags:
        Name: '{web_sg_name}'
        Tier: web
  secg-app-{project}-{environment}-{region_short}:
    type: aws:ec2:SecurityGroup
    name: secg-app-{project}-{environment}-{region_short}
    always_created: true
    description: Security group for application tier
    smart_defaults:
      vpc_id: '{config_id}'
      description: Security group for application tier
      ingress:
      - protocol: tcp
        from_port: 3000
        to_port: 3000
        security_groups:
        - '{security_group_web}'
        description: App traffic from web tier
      - protocol: tcp
        from_port: 8080
        to_port: 8080
        security_groups:
        - '{security_group_web}'
        description: Alt app port from web tier
      egress:
      - protocol: '-1'
        from_port: 0
        to_port: 0
        cidr_blocks:
        - 0.0.0.0/0
        description: Allow all outbound
      tags:
        Name: '{app_sg_name}'
        Tier: app
  secg-db-{project}-{environment}-{region_short}:
    type: aws:ec2:SecurityGroup
    name: secg-db-{project}-{environment}-{region_short}
    always_created: true
    description: Security group for database tier
    smart_defaults:
      vpc_id: '{config_id}'
      description: Security group for database tier
      ingress:
      - protocol: tcp
        from_port: 3306
        to_port: 3306
        security_groups:
        - '{security_group_app}'
        description: MySQL from app tier
      - protocol: tcp
        from_port: 5432
        to_port: 5432
        security_groups:
        - '{security_group_app}'
        description: PostgreSQL from app tier
      - protocol: tcp
        from_port: 1433
        to_port: 1433
        security_groups:
        - '{security_group_app}'
        description: SQL Server from app tier
      egress:
      - protocol: '-1'
        from_port: 0
        to_port: 0
        cidr_blocks:
        - 0.0.0.0/0
        description: Allow all outbound
  pubsub-{project}-{environment}-{region_short}-{az_short}-{subnet_num}:
    type: aws:ec2:Subnet
    name: pubsub-{project}-{environment}-{region_short}-{az_short}-{subnet_num}
    always_created: true
    description: 'Public subnet for public tier workloads (CIDR: {public_cidr})'
    smart_defaults:
      vpc_id: '{config_id}'
      cidr_block: '{public_cidr}'
      availability_zone: '{config_region}a'
      map_public_ip_on_launch: true
      tags:
        Name: '{public_subnet_name}'
        Tier: public
  privsub-{project}-{environment}-{region_short}-{az_short}-{subnet_num}:
    type: aws:ec2:Subnet
    name: privsub-{project}-{environment}-{region_short}-{az_short}-{subnet_num}
    always_created: true
    description: 'Private subnet for private tier workloads (CIDR: {private_cidr})'
    smart_defaults:
      vpc_id: '{config_id}'
      cidr_block: '{private_cidr}'
      availability_zone: '{config_region}a'
      map_public_ip_on_launch: false
      tags:
        Name: '{private_subnet_name}'
        Tier: private
  route-00000-{project}-{environment}-{region_short}-igw:
    type: aws:ec2:Route
    name: route-00000-{project}-{environment}-{region_short}-igw
    always_created: true
    description: Route directing 0.0.0.0/0 traffic to Internet Gateway
    smart_defaults:
      route_table_id: '{id}'
      destination_cidr_block: 0.0.0.0/0
      gateway_id: '{config_id}'
  rta-public-{project}-{environment}-{region_short}-1:
    type: aws:ec2:RouteTableAssociation
    name: rta-public-{project}-{environment}-{region_short}-1
    always_created: true
    description: Associates a route table with a subnet for traffic routing
    smart_defaults:
      subnet_id: '{id}'
      route_table_id: '{id}'
  rta-private-{project}-{environment}-{region_short}-1:
    type: aws:ec2:RouteTableAssociation
    name: rta-private-{project}-{environment}-{region_short}-1
    always_created: true
    description: Associates a route table with a subnet for traffic routing
    smart_defaults:
      subnet_id: '{id}'
      route_table_id: '{id}'
  rt-isolated-{project}-{environment}-{region_short}:
    type: aws:ec2:RouteTable
    name: rt-isolated-{project}-{environment}-{region_short}
    description: Route table for isolated tier network traffic routing
    conditional:
      field: enable_isolated_tier
    smart_defaults:
      vpc_id: '{config_id}'
      tags:
        Name: '{isolated_rt_name}'
        Tier: isolated
  isolatedsub-{project}-{environment}-{region_short}-{az_short}-{subnet_num}:
    type: aws:ec2:Subnet
    name: isolatedsub-{project}-{environment}-{region_short}-{az_short}-{subnet_num}
    description: 'Private subnet for isolated tier workloads (CIDR: {isolated_cidr})'
    conditional:
      field: enable_isolated_tier
    smart_defaults:
      vpc_id: '{config_id}'
      cidr_block: '{isolated_cidr}'
      availability_zone: '{config_region}a'
      map_public_ip_on_launch: false
      tags:
        Name: '{isolated_subnet_name}'
        Tier: isolated
  eip-{purpose}-{project}-{environment}-{region_short}-{az_short}:
    type: aws:ec2:Eip
    name: eip-{purpose}-{project}-{environment}-{region_short}-{az_short}
    description: Elastic IP address for NAT Gateway attachment
    conditional:
      field: enable_nat_gateway
    smart_defaults:
      domain: vpc
      tags:
        Name: '{eip_name}'
  nat-gw-{project}-{environment}-{region_short}-{az_short}:
    type: aws:ec2:NatGateway
    name: nat-gw-{project}-{environment}-{region_short}-{az_short}
    description: NAT Gateway providing outbound internet access for private subnets
    conditional:
      field: enable_nat_gateway
    smart_defaults:
      subnet_id: '{id}'
      allocation_id: '{id}'
      tags:
        Name: '{nat_name}'
  route-00000-{project}-{environment}-{region_short}-nat:
    type: aws:ec2:Route
    name: route-00000-{project}-{environment}-{region_short}-nat
    always_created: true
    description: Route directing 0.0.0.0/0 traffic to NAT Gateway
    smart_defaults:
      route_table_id: '{id}'
      destination_cidr_block: 0.0.0.0/0
      nat_gateway_id: '{config_id}'
  rta-isolated-{project}-{environment}-{region_short}-1:
    type: aws:ec2:RouteTableAssociation
    name: rta-isolated-{project}-{environment}-{region_short}-1
    description: Associates a route table with a subnet for traffic routing
    conditional:
      field: enable_isolated_tier
    smart_defaults:
      subnet_id: '{id}'
      route_table_id: '{id}'
  vpce-rds-{project}-{environment}-{region_short}-if:
    type: aws:ec2:VpcEndpoint
    name: vpce-rds-{project}-{environment}-{region_short}-if
    description: RDS Interface VPC Endpoint for private RDS service access
    conditional:
      field: enable_rds_endpoint
    smart_defaults:
      vpc_id: '{config_id}'
      service_name: com.amazonaws.{config_region}.rds
      vpc_endpoint_type: Interface
      subnet_ids:
      - '{id}'
      security_group_ids:
      - '{id}'
      private_dns_enabled: true
      tags:
        Name: '{rds_endpoint_name}'
  vpce-ssm-{project}-{environment}-{region_short}-if:
    type: aws:ec2:VpcEndpoint
    name: vpce-ssm-{project}-{environment}-{region_short}-if
    description: SSM Interface VPC Endpoint for private SSM service access
    conditional:
      field: enable_ssm_endpoints
    smart_defaults:
      vpc_id: '{config_id}'
      service_name: com.amazonaws.{config_region}.ssm
      vpc_endpoint_type: Interface
      subnet_ids:
      - '{id}'
      private_dns_enabled: true
      tags:
        Name: '{ssm_endpoint_name}'
  vpce-ssmmessages-{project}-{environment}-{region_short}-if:
    type: aws:ec2:VpcEndpoint
    name: vpce-ssmmessages-{project}-{environment}-{region_short}-if
    description: SSMMESSAGES Interface VPC Endpoint for private SSMMESSAGES service
      access
    conditional:
      field: enable_ssm_endpoints
    smart_defaults:
      vpc_id: '{config_id}'
      service_name: com.amazonaws.{config_region}.ssmmessages
      vpc_endpoint_type: Interface
      subnet_ids:
      - '{id}'
      private_dns_enabled: true
      tags:
        Name: '{ssm_messages_endpoint_name}'
  vpce-ec2messages-{project}-{environment}-{region_short}-if:
    type: aws:ec2:VpcEndpoint
    name: vpce-ec2messages-{project}-{environment}-{region_short}-if
    description: EC2MESSAGES Interface VPC Endpoint for private EC2MESSAGES service
      access
    conditional:
      field: enable_ssm_endpoints
    smart_defaults:
      vpc_id: '{config_id}'
      service_name: com.amazonaws.{config_region}.ec2messages
      vpc_endpoint_type: Interface
      subnet_ids:
      - '{id}'
      private_dns_enabled: true
      tags:
        Name: '{ec2_messages_endpoint_name}'
  s3-{purpose}-{project}-{environment}-{region_short}:
    type: aws:s3:Bucket
    name: s3-{purpose}-{project}-{environment}-{region_short}
    description: S3 bucket for VPC Flow Logs storage
    conditional:
      field: enable_flow_logs
    smart_defaults:
      bucket: '{bucket_name}'
      force_destroy: true
      tags:
        Name: '{bucket_name}'
        Purpose: VPC Flow Logs
  '{bucket_name}-lifecycle':
    type: aws:s3:BucketLifecycleConfigurationV2
    name: '{bucket_name}-lifecycle'
    description: S3 bucket lifecycle rules for automatic log retention and deletion
    conditional:
      field: enable_flow_logs
    smart_defaults:
      bucket: '{config_id}'
      rules:
      - id: delete-old-flow-logs
        status: Enabled
  fl-{scope}-{project}-{environment}-{region_short}-{traffic}:
    type: aws:ec2:FlowLog
    name: fl-{scope}-{project}-{environment}-{region_short}-{traffic}
    description: VPC Flow Logs capturing ALL network traffic to S3
    conditional:
      field: enable_flow_logs
    smart_defaults:
      vpc_id: '{config_id}'
      traffic_type: ALL
      log_destination_type: s3
      log_destination: '{computed}'
      max_aggregation_interval: 600
      tags:
        Name: '{flow_log_name}'
configuration:
  type: object
  properties:
    project_name:
      type: string
      title: Project Name
      description: Unique name for this project (used in resource naming)
      group: Essentials
      isEssential: true
      order: 1
    region:
      type: string
      title: AWS Region
      description: AWS region to deploy into
      default: us-east-1
      enum:
      - us-east-1
      - us-east-2
      - us-west-1
      - us-west-2
      - eu-west-1
      - eu-central-1
      - ap-southeast-1
      group: Essentials
      isEssential: true
      order: 2
    config_preset:
      type: string
      title: Configuration Preset
      description: Pre-configured setup for common workloads
      default: web-server
      enum:
      - web-server
      - wordpress
      - mysql
      - nodejs
      - alb-backend
      group: Compute
      isEssential: true
      order: 10
    instance_type:
      type: string
      title: Instance Type
      description: EC2 instance size
      default: t3.micro
      enum:
      - t3.micro
      - t3.small
      - t3.medium
      - t3.large
      - t3.xlarge
      group: Compute
      isEssential: true
      order: 11
    ami_os:
      type: string
      title: Operating System
      description: AMI operating system
      default: amazon-linux-2
      enum:
      - amazon-linux-2
      - ubuntu-22.04
      - windows-2022
      group: Compute
      isEssential: true
      order: 12
    instance_count:
      type: number
      title: Instance Count
      description: Number of EC2 instances to launch
      default: 1
      minimum: 1
      maximum: 10
      group: Compute
      order: 13
    vpc_mode:
      type: string
      title: VPC Mode
      description: Create a new VPC or use an existing one
      default: new
      enum:
      - new
      - existing
      group: Networking
      isEssential: true
      order: 20
    vpc_id:
      type: string
      title: Existing VPC ID
      description: ID of an existing VPC to deploy into
      placeholder: vpc-0abc123def456
      visibleIf:
        vpc_mode: existing
      group: Networking
      order: 21
    subnet_id:
      type: string
      title: Existing Subnet ID
      description: Subnet to launch the instance in
      placeholder: subnet-0abc123def456
      visibleIf:
        vpc_mode: existing
      group: Networking
      order: 22
    cidr_block:
      type: string
      title: VPC CIDR Block
      description: CIDR block for the new VPC (leave empty for auto-generated)
      placeholder: 10.0.0.0/16
      visibleIf:
        vpc_mode: new
      group: Networking
      order: 23
    enable_ssm:
      type: boolean
      title: Enable SSM Access
      description: Enable AWS Systems Manager for remote management (no SSH needed)
      default: true
      group: Security
      isEssential: true
      order: 30
    enable_ssh_access:
      type: boolean
      title: Enable SSH Access
      description: Open port 22 for SSH connections
      default: false
      group: Security
      order: 31
    ssh_access_ip:
      type: string
      title: SSH Access IP
      description: IP address allowed for SSH (e.g. 203.0.113.0/32)
      placeholder: 0.0.0.0/0
      visibleIf:
        enable_ssh_access: true
      group: Security
      order: 32
    key_name:
      type: string
      title: Key Pair Name
      description: EC2 key pair for SSH authentication
      placeholder: my-keypair
