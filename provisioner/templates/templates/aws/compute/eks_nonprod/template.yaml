            enum:
            - t3.micro
            - t3.small
            - t3.medium
            - t4g.small
            - t4g.medium
            enumLabels:
              t3.micro: t3.micro (Core / Cost)
              t3.small: t3.small (Standard)
              t3.medium: t3.medium (Standard plus)
              t4g.small: t4g.small (Graviton / Efficiency)
