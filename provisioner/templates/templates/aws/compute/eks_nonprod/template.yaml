metadata:
  name: aws-eks-nonprod
  title: Managed Kubernetes Cluster
  description: Enterprise Kubernetes environment with managed control plane and EC2 node groups.
  category: compute
  version: latest
  author: InnovativeApps
  cloud: aws
  environment: nonprod
  base_cost: $121/month
  features:
  - AWS-Managed EKS Control Plane
  - Automated Node Group orchestration
  - Dedicated Multi-AZ VPC Architecture
  - Integrated IAM Role-Based Access Control
  - Self-healing node bootstrap logic
  tags:
  - eks
  - kubernetes
  - containers
  - compute
  - nonprod
  deployment_time: 15-20 minutes
  complexity: advanced
  architecture:
    summary: EKS Non-Prod Template
  action_name: aws-eks-nonprod
  tier: template
  use_cases:
  - Development and testing environments
  - Staging infrastructure
  - Non-production workloads
resources:
  role-{service}-{project}-{environment}-{region_short}:
    type: aws:iam:Role
    name: role-{service}-{project}-{environment}-{region_short}
    description: Role resource
    conditional:
      field: enable_ssm
    smart_defaults:
      assume_role_policy: '{json_config}'
      managed_policy_arns:
      - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      tags:
        Name: '{role_name}'
  '{namer_resource}':
    type: aws:iam:InstanceProfile
    name: '{namer_resource}'
    always_created: true
    description: InstanceProfile resource
    smart_defaults:
      name: '{namer_resource}'
      role: '{config_name}'
      tags: '{tags}'
  '{config_cluster_name}':
    type: aws:eks:Cluster
    name: '{config_cluster_name}'
    always_created: true
    description: Cluster resource
    smart_defaults:
      name: <cluster_name>
      role_arn: '{config_arn}'
      version: '1.28'
      vpc_config:
        subnet_ids: '{private_subnet_ids}'
        endpoint_private_access: true
        endpoint_public_access: true
      tags: {}
  '{namer_iam_profile}':
    type: aws:iam:InstanceProfile
    name: '{namer_iam_profile}'
    description: InstanceProfile resource
    conditional:
      field: enable_ssm
    smart_defaults:
      role: '{name}'
      tags:
        Name: '{profile_name}'
  ec2-{preset}-{project}-{environment}-{region_short}:
    type: aws:ec2:Instance
    name: ec2-{preset}-{project}-{environment}-{region_short}
    always_created: true
    description: Instance resource
    smart_defaults:
      instance_type: '{config_instance_type}'
      ami: '{config_id}'
      subnet_id: <subnet_id>
      vpc_security_group_ids: '{base_security_groups}'
      iam_instance_profile: '{config_name}'
      key_name: '{config_key_name}'
      user_data: '{config_user_data}'
      tags:
        Name: '{name_final}'
        ManagedBy: Archie
  secg-access-{project}-{environment}-{region_short}:
    type: aws:ec2:SecurityGroup
    name: secg-access-{project}-{environment}-{region_short}
    description: Management access security group (SSH/RDP)
    conditional:
      field: enable_ssh
    smart_defaults:
      vpc_id: '{config_id}'
      description: Management access security group (SSH/RDP)
      ingress: '{access_sg_ingress}'
      egress:
      - protocol: '-1'
        from_port: 0
        to_port: 0
        cidr_blocks:
        - 0.0.0.0/0
        description: Allow all outbound
      tags:
        Name: '{access_sg_name}'
        Tier: management
  '{project_name}--rule-{idx}':
    type: aws:ec2:SecurityGroupRule
    name: '{project_name}--rule-{idx}'
    always_created: true
    description: SecurityGroupRule resource
    smart_defaults:
      type: ingress
      security_group_id: '{access_sg_id}'
      protocol: tcp
      from_port: '{remote_port}'
      to_port: '{remote_port}'
      cidr_blocks:
      - '{cidr_ip}'
      description: '{remote_proto} from {cidr_ip}'
  vpc-{project}-{environment}-{region_short}-{network_num}:
    type: aws:ec2:Vpc
    name: vpc-{project}-{environment}-{region_short}-{network_num}
    always_created: true
    description: Virtual Private Cloud with CIDR {config_custom_cidr_block}, DNS support enabled
    smart_defaults:
      cidr_block: 10.0.0.0/16
      enable_dns_support: true
      enable_dns_hostnames: true
      instance_tenancy: default
      tags:
        Name: '{vpc_name}'
  igw-main-{project}-{environment}-{region_short}:
    type: aws:ec2:InternetGateway
    name: igw-main-{project}-{environment}-{region_short}
    always_created: true
    description: Internet Gateway providing public internet connectivity for the VPC
    smart_defaults:
      vpc_id: '{config_id}'
      tags:
        Name: '{igw_name}'
  rt-public-{project}-{environment}-{region_short}:
    type: aws:ec2:RouteTable
    name: rt-public-{project}-{environment}-{region_short}
    always_created: true
    description: Route table for public tier network traffic routing
    smart_defaults:
      vpc_id: '{config_id}'
      tags:
        Name: '{public_rt_name}'
        Tier: public
  rt-private-{project}-{environment}-{region_short}:
    type: aws:ec2:RouteTable
    name: rt-private-{project}-{environment}-{region_short}
    always_created: true
    description: Route table for private tier network traffic routing
    smart_defaults:
      vpc_id: '{config_id}'
      tags:
        Name: '{private_rt_name}'
        Tier: private
  vpce-s3-{project}-{environment}-{region_short}-gw:
    type: aws:ec2:VpcEndpoint
    name: vpce-s3-{project}-{environment}-{region_short}-gw
    always_created: true
    description: S3 Gateway VPC Endpoint for private S3 service access
    smart_defaults:
      vpc_id: '{config_id}'
      service_name: com.amazonaws.{config_region}.s3
      vpc_endpoint_type: Gateway
      tags:
        Name: '{s3_endpoint_name}'
  vpce-dynamodb-{project}-{environment}-{region_short}-gw:
    type: aws:ec2:VpcEndpoint
    name: vpce-dynamodb-{project}-{environment}-{region_short}-gw
    always_created: true
    description: DYNAMODB Gateway VPC Endpoint for private DYNAMODB service access
    smart_defaults:
      vpc_id: '{config_id}'
      service_name: com.amazonaws.{config_region}.dynamodb
      vpc_endpoint_type: Gateway
      tags:
        Name: '{dynamodb_endpoint_name}'
  secg-web-{project}-{environment}-{region_short}:
    type: aws:ec2:SecurityGroup
    name: secg-web-{project}-{environment}-{region_short}
    always_created: true
    description: Security group for web tier (HTTP/HTTPS)
    smart_defaults:
      vpc_id: '{config_id}'
      description: Security group for web tier (HTTP/HTTPS)
      ingress:
      - protocol: tcp
        from_port: 80
        to_port: 80
        cidr_blocks:
        - 0.0.0.0/0
        description: HTTP from internet
      - protocol: tcp
        from_port: 443
        to_port: 443
        cidr_blocks:
        - 0.0.0.0/0
        description: HTTPS from internet
      egress:
      - protocol: '-1'
        from_port: 0
        to_port: 0
        cidr_blocks:
        - 0.0.0.0/0
        description: Allow all outbound
      tags:
        Name: '{web_sg_name}'
        Tier: web
  secg-app-{project}-{environment}-{region_short}:
    type: aws:ec2:SecurityGroup
    name: secg-app-{project}-{environment}-{region_short}
    always_created: true
    description: Security group for application tier
    smart_defaults:
      vpc_id: '{config_id}'
      description: Security group for application tier
      ingress:
      - protocol: tcp
        from_port: 3000
        to_port: 3000
        security_groups:
        - '{security_group_web}'
        description: App traffic from web tier
      - protocol: tcp
        from_port: 8080
        to_port: 8080
        security_groups:
        - '{security_group_web}'
        description: Alt app port from web tier
      egress:
      - protocol: '-1'
        from_port: 0
        to_port: 0
        cidr_blocks:
        - 0.0.0.0/0
        description: Allow all outbound
      tags:
        Name: '{app_sg_name}'
        Tier: app
  secg-db-{project}-{environment}-{region_short}:
    type: aws:ec2:SecurityGroup
    name: secg-db-{project}-{environment}-{region_short}
    always_created: true
    description: Security group for database tier
    smart_defaults:
      vpc_id: '{config_id}'
      description: Security group for database tier
      ingress:
      - protocol: tcp
        from_port: 3306
        to_port: 3306
        security_groups:
        - '{security_group_app}'
        description: MySQL from app tier
      - protocol: tcp
        from_port: 5432
        to_port: 5432
        security_groups:
        - '{security_group_app}'
        description: PostgreSQL from app tier
      - protocol: tcp
        from_port: 1433
        to_port: 1433
        security_groups:
        - '{security_group_app}'
        description: SQL Server from app tier
      egress:
      - protocol: '-1'
        from_port: 0
        to_port: 0
        cidr_blocks:
        - 0.0.0.0/0
        description: Allow all outbound
  pubsub-{project}-{environment}-{region_short}-{az_short}-{subnet_num}:
    type: aws:ec2:Subnet
    name: pubsub-{project}-{environment}-{region_short}-{az_short}-{subnet_num}
    always_created: true
    description: 'Public subnet for public tier workloads (CIDR: {public_cidr})'
    smart_defaults:
      vpc_id: '{config_id}'
      cidr_block: '{public_cidr}'
      availability_zone: '{config_region}a'
      map_public_ip_on_launch: true
      tags:
        Name: '{public_subnet_name}'
        Tier: public
  privsub-{project}-{environment}-{region_short}-{az_short}-{subnet_num}:
    type: aws:ec2:Subnet
    name: privsub-{project}-{environment}-{region_short}-{az_short}-{subnet_num}
    always_created: true
    description: 'Private subnet for private tier workloads (CIDR: {private_cidr})'
    smart_defaults:
      vpc_id: '{config_id}'
      cidr_block: '{private_cidr}'
      availability_zone: '{config_region}a'
      map_public_ip_on_launch: false
      tags:
        Name: '{private_subnet_name}'
        Tier: private
  eip-{purpose}-{project}-{environment}-{region_short}-{az_short}:
    type: aws:ec2:Eip
    name: eip-{purpose}-{project}-{environment}-{region_short}-{az_short}
    always_created: true
    description: Elastic IP address for NAT Gateway attachment
    smart_defaults:
      domain: vpc
      tags:
        Name: '{eip_name}'
  nat-gw-{project}-{environment}-{region_short}-{az_short}:
    type: aws:ec2:NatGateway
    name: nat-gw-{project}-{environment}-{region_short}-{az_short}
    always_created: true
    description: NAT Gateway providing outbound internet access for private subnets
    smart_defaults:
      subnet_id: '{id}'
      allocation_id: '{id}'
      tags:
        Name: '{nat_name}'
  route-00000-{project}-{environment}-{region_short}-igw:
    type: aws:ec2:Route
    name: route-00000-{project}-{environment}-{region_short}-igw
    always_created: true
    description: Route directing 0.0.0.0/0 traffic to Internet Gateway
    smart_defaults:
      route_table_id: '{id}'
      destination_cidr_block: 0.0.0.0/0
      gateway_id: '{config_id}'
  route-00000-{project}-{environment}-{region_short}-nat:
    type: aws:ec2:Route
    name: route-00000-{project}-{environment}-{region_short}-nat
    always_created: true
    description: Route directing 0.0.0.0/0 traffic to NAT Gateway
    smart_defaults:
      route_table_id: '{id}'
      destination_cidr_block: 0.0.0.0/0
      nat_gateway_id: '{config_id}'
  rta-public-{project}-{environment}-{region_short}-1:
    type: aws:ec2:RouteTableAssociation
    name: rta-public-{project}-{environment}-{region_short}-1
    always_created: true
    description: Associates a route table with a subnet for traffic routing
    smart_defaults:
      subnet_id: '{id}'
      route_table_id: '{id}'
  rta-private-{project}-{environment}-{region_short}-1:
    type: aws:ec2:RouteTableAssociation
    name: rta-private-{project}-{environment}-{region_short}-1
    always_created: true
    description: Associates a route table with a subnet for traffic routing
    smart_defaults:
      subnet_id: '{id}'
      route_table_id: '{id}'
  rt-isolated-{project}-{environment}-{region_short}:
    type: aws:ec2:RouteTable
    name: rt-isolated-{project}-{environment}-{region_short}
    description: Route table for isolated tier network traffic routing
    conditional:
      field: enable_isolated_tier
    smart_defaults:
      vpc_id: '{config_id}'
      tags:
        Name: '{isolated_rt_name}'
        Tier: isolated
  isolatedsub-{project}-{environment}-{region_short}-{az_short}-{subnet_num}:
    type: aws:ec2:Subnet
    name: isolatedsub-{project}-{environment}-{region_short}-{az_short}-{subnet_num}
    description: 'Private subnet for isolated tier workloads (CIDR: {isolated_cidr})'
    conditional:
      field: enable_isolated_tier
    smart_defaults:
      vpc_id: '{config_id}'
      cidr_block: '{isolated_cidr}'
      availability_zone: '{config_region}a'
      map_public_ip_on_launch: false
      tags:
        Name: '{isolated_subnet_name}'
        Tier: isolated
  rta-isolated-{project}-{environment}-{region_short}-1:
    type: aws:ec2:RouteTableAssociation
    name: rta-isolated-{project}-{environment}-{region_short}-1
    description: Associates a route table with a subnet for traffic routing
    conditional:
      field: enable_isolated_tier
    smart_defaults:
      subnet_id: '{id}'
      route_table_id: '{id}'
  vpce-rds-{project}-{environment}-{region_short}-if:
    type: aws:ec2:VpcEndpoint
    name: vpce-rds-{project}-{environment}-{region_short}-if
    description: RDS Interface VPC Endpoint for private RDS service access
    conditional:
      field: enable_rds_endpoint
    smart_defaults:
      vpc_id: '{config_id}'
      service_name: com.amazonaws.{config_region}.rds
      vpc_endpoint_type: Interface
      subnet_ids:
      - '{id}'
      security_group_ids:
      - '{id}'
      private_dns_enabled: true
      tags:
        Name: '{rds_endpoint_name}'
  vpce-ssm-{project}-{environment}-{region_short}-if:
    type: aws:ec2:VpcEndpoint
    name: vpce-ssm-{project}-{environment}-{region_short}-if
    description: SSM Interface VPC Endpoint for private SSM service access
    conditional:
      field: enable_ssm_endpoints
    smart_defaults:
      vpc_id: '{config_id}'
      service_name: com.amazonaws.{config_region}.ssm
      vpc_endpoint_type: Interface
      subnet_ids:
      - '{id}'
      private_dns_enabled: true
      tags:
        Name: '{ssm_endpoint_name}'
  vpce-ssmmessages-{project}-{environment}-{region_short}-if:
    type: aws:ec2:VpcEndpoint
    name: vpce-ssmmessages-{project}-{environment}-{region_short}-if
    description: SSMMESSAGES Interface VPC Endpoint for private SSMMESSAGES service access
    conditional:
      field: enable_ssm_endpoints
    smart_defaults:
      vpc_id: '{config_id}'
      service_name: com.amazonaws.{config_region}.ssmmessages
      vpc_endpoint_type: Interface
      subnet_ids:
      - '{id}'
      private_dns_enabled: true
      tags:
        Name: '{ssm_messages_endpoint_name}'
  vpce-ec2messages-{project}-{environment}-{region_short}-if:
    type: aws:ec2:VpcEndpoint
    name: vpce-ec2messages-{project}-{environment}-{region_short}-if
    description: EC2MESSAGES Interface VPC Endpoint for private EC2MESSAGES service access
    conditional:
      field: enable_ssm_endpoints
    smart_defaults:
      vpc_id: '{config_id}'
      service_name: com.amazonaws.{config_region}.ec2messages
      vpc_endpoint_type: Interface
      subnet_ids:
      - '{id}'
      private_dns_enabled: true
      tags:
        Name: '{ec2_messages_endpoint_name}'
  s3-{purpose}-{project}-{environment}-{region_short}:
    type: aws:s3:Bucket
    name: s3-{purpose}-{project}-{environment}-{region_short}
    description: S3 bucket for VPC Flow Logs storage
    conditional:
      field: enable_flow_logs
    smart_defaults:
      bucket: '{bucket_name}'
      force_destroy: true
      tags:
        Name: '{bucket_name}'
        Purpose: VPC Flow Logs
  '{bucket_name}-lifecycle':
    type: aws:s3:BucketLifecycleConfigurationV2
    name: '{bucket_name}-lifecycle'
    description: S3 bucket lifecycle rules for automatic log retention and deletion
    conditional:
      field: enable_flow_logs
    smart_defaults:
      bucket: '{config_id}'
      rules:
      - id: delete-old-flow-logs
        status: Enabled
  fl-{scope}-{project}-{environment}-{region_short}-{traffic}:
    type: aws:ec2:FlowLog
    name: fl-{scope}-{project}-{environment}-{region_short}-{traffic}
    description: VPC Flow Logs capturing ALL network traffic to S3
    conditional:
      field: enable_flow_logs
    smart_defaults:
      vpc_id: '{config_id}'
      traffic_type: ALL
      log_destination_type: s3
      log_destination: '{computed}'
      max_aggregation_interval: 600
      tags:
        Name: '{flow_log_name}'
configuration:
  properties:
    use_custom_cidr:
      type: boolean
      default: false
      title: Use Custom CIDR
      description: Enable to specify a custom IPv4 CIDR block for the VPC
      order: 10
      group: Network Configuration
      cost_impact: $0/month
    custom_cidr_block:
      type: string
      default: 10.0.0.0/16
      title: Custom CIDR Block
      description: Specify custom IPv4 CIDR block (e.g., 10.0.0.0/16, 172.16.0.0/16, 192.168.0.0/16)
      order: 11
      group: Network Configuration
      conditional:
        field: use_custom_cidr
    enable_dns_support:
      type: boolean
      title: Enable DNS Support
      description: Allow DNS resolution
      default: true
      group: Networking & Connectivity
      visibleIf: &id001
        vpc_mode: new
      isEssential: true
      order: 70
    enable_dns_hostnames:
      type: boolean
      title: Enable DNS Hostnames
      description: Assign public hostnames
      default: true
      group: Networking & Connectivity
      visibleIf: *id001
      isEssential: true
      order: 71
    enable_ssh_access:
      type: boolean
      default: true
      title: Enable SSH Access
      description: Enable SSH/RDP access to instances
      order: 14
      group: Network Configuration
      cost_impact: +$0/month
    ssh_access_ip:
      type: string
      title: Admin Access IP (SSH/RDP)
      description: IP address or CIDR block (required for advanced mode)
      placeholder: e.g. 203.0.113.25/32
      group: Security & Connectivity
      visibleIf:
        ssh_mode: enabled
      isEssential: true
      order: 141
    enable_isolated_tier:
      type: boolean
      default: false
      title: Enable Isolated Subnet Tier
      description: Creates isolated subnet with no internet access for databases
      order: 101
      group: High Availability & Cost
      cost_impact: +$0/month (no additional cost)
    enable_flow_logs:
      type: boolean
      title: Enable Flow Logs
      description: Capture IP traffic information
      default: true
      group: Observability
      isEssential: true
      order: 201
    flow_log_retention:
      type: number
      title: Log Retention (Days)
      description: How long to keep flow logs
      default: 7
      group: Observability
      visibleIf:
        enable_flow_logs: true
      order: 203
    enable_rds_endpoint:
      type: boolean
      default: false
      title: Enable RDS VPC Endpoint
      description: Private interface endpoint for RDS API calls
      order: 102
      group: High Availability & Cost
      cost_impact: +$14/month
    enable_ssm_endpoints:
      type: boolean
      title: Enable SSM Endpoints
      description: Interface Endpoints for secure management
      default: true
      help_text: Required for secure instance access without SSH/IGW.
      group: Security & Connectivity
      isEssential: true
      order: 151
    project_name:
      type: string
      title: Project Name
      description: Project Name
      help_text: Name of your project for resource tagging and tracking
      placeholder: my-project
      group: Essentials
      isEssential: true
      order: 0
    region:
      type: string
      title: AWS Region
      description: AWS Region
      default: us-east-1
      enum:
      - us-east-1
      - us-east-2
      - us-west-1
      - us-west-2
      - eu-west-1
      - eu-central-1
      group: Essentials
      isEssential: true
      order: 1
    vpc_header:
      type: separator
      title: VPC Configuration
      group: Networking & Connectivity
      isEssential: true
      order: 10
    vpc_mode:
      type: select
      title: VPC Selection
      description: Deploy into a new or existing VPC
      default: new
      options:
      - label: Create New VPC
        value: new
      - label: Use Existing VPC
        value: existing
      group: Networking & Connectivity
      isEssential: false
      order: 11
    vpc_id:
      type: string
      title: Existing VPC ID
      description: ID of the existing VPC
      placeholder: vpc-xxxxxxxx
      group: Networking & Connectivity
      visibleIf: &id002
        vpc_mode: existing
      isEssential: false
      order: 12
    subnet_id:
      type: string
      title: Subnet ID
      description: Select existing Subnet
      placeholder: subnet-xxxxxxxx
      group: Networking & Connectivity
      visibleIf: *id002
      isEssential: false
      order: 13
    vpc_name:
      type: string
      title: VPC Name
      description: Custom name for the new VPC
      placeholder: Auto-generated
      group: Networking & Connectivity
      visibleIf: *id001
      isEssential: true
      order: 20
    instance_tenancy:
      type: select
      title: VPC Tenancy
      description: The allowed tenancy of instances launched into the VPC
      default: default
      options:
      - label: Default
        value: default
      - label: Dedicated
        value: dedicated
      group: Networking & Connectivity
      visibleIf: *id001
      order: 22
    cidr_block:
      type: string
      title: VPC CIDR Block
      description: IPv4 CIDR block for the new VPC
      default: ''
      placeholder: Auto-Assign
      group: Networking & Connectivity
      visibleIf: *id001
      isEssential: true
      order: 23
    dns_header:
      type: separator
      title: DNS Configuration
      group: Networking & Connectivity
      visibleIf: *id001
      isEssential: true
      order: 69
    subnet_header:
      type: separator
      title: Subnet Configuration
      group: Networking & Connectivity
      visibleIf: *id001
      order: 29
    public_subnet_1_cidr:
      type: string
      title: Public Subnet 1 CIDR
      placeholder: e.g. 10.0.1.0/24
      group: Networking & Connectivity
      visibleIf: *id001
      order: 30
    az_1:
      type: string
      title: Availability Zone 1
      placeholder: e.g. us-east-1a
      group: Networking & Connectivity
      visibleIf: *id001
      order: 31
    private_subnet_1_cidr:
      type: string
      title: Private Subnet 1 CIDR
      placeholder: e.g. 10.0.11.0/24
      group: Networking & Connectivity
      visibleIf: *id001
      order: 32
    zone_2_separator:
      type: separator
      title: Secondary Zone Configuration
      group: Networking & Connectivity
      visibleIf: *id001
      order: 34
    public_subnet_2_cidr:
      type: string
      title: Public Subnet 2 CIDR
      placeholder: e.g. 10.0.2.0/24
      group: Networking & Connectivity
      visibleIf: *id001
      order: 35
    az_2:
      type: string
      title: Availability Zone 2
      placeholder: e.g. us-east-1b
      group: Networking & Connectivity
      visibleIf: *id001
      order: 36
    private_subnet_2_cidr:
      type: string
      title: Private Subnet 2 CIDR
      placeholder: e.g. 10.0.12.0/24
      group: Networking & Connectivity
      visibleIf: *id001
      order: 37
    nat_header:
      type: separator
      title: NAT Gateway Configuration
      group: Networking & Connectivity
      visibleIf: *id001
      isEssential: true
      order: 59
    enable_nat_gateway:
      type: boolean
      title: Provision NAT Gateway
      description: Provide internet access to private subnets
      default: true
      group: Networking & Connectivity
      visibleIf: *id001
      isEssential: true
