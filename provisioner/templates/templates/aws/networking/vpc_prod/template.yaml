        Project: '{project_name}'
        Environment: prod
        Tier: private
        AZ: '{az}'
  pubsub-{project}-{environment}-{region_short}-{az_short}-{subnet_num}-1:
    type: aws:ec2:Subnet
    name: pubsub-{project}-{environment}-{region_short}-{az_short}-{subnet_num}-1
    always_created: true
    description: 'Public subnet for public tier workloads (CIDR: {pub_cidr})'
    smart_defaults:
      vpc_id: '{config_id}'
      cidr_block: '{pub_cidr}'
      availability_zone: '{az}'
      map_public_ip_on_launch: true
      tags:
        Name: '{pub_sub_name}'
        Project: '{project_name}'
        Environment: prod
        Tier: public
        AZ: '{az}'
  pubsub-{project}-{environment}-{region_short}-{az_short}-{subnet_num}-2:
    type: aws:ec2:Subnet
    name: pubsub-{project}-{environment}-{region_short}-{az_short}-{subnet_num}-2
    always_created: true
    description: 'Public subnet for public tier workloads (CIDR: {pub_cidr})'
    smart_defaults:
      vpc_id: '{config_id}'
      cidr_block: '{pub_cidr}'
      availability_zone: '{az}'
      map_public_ip_on_launch: true
      tags:
        Name: '{pub_sub_name}'
        Project: '{project_name}'
        Environment: prod
        Tier: public
        AZ: '{az}'
  pubsub-{project}-{environment}-{region_short}-{az_short}-{subnet_num}-3:
    type: aws:ec2:Subnet
    name: pubsub-{project}-{environment}-{region_short}-{az_short}-{subnet_num}-3
    always_created: true
    description: 'Public subnet for public tier workloads (CIDR: {pub_cidr})'
    smart_defaults:
      vpc_id: '{config_id}'
      cidr_block: '{pub_cidr}'
      availability_zone: '{az}'
      map_public_ip_on_launch: true
      tags:
        Name: '{pub_sub_name}'
        Project: '{project_name}'
        Environment: prod
        Tier: public
        AZ: '{az}'
  privsub-{project}-{environment}-{region_short}-{az_short}-{subnet_num}-1:
    type: aws:ec2:Subnet
    name: privsub-{project}-{environment}-{region_short}-{az_short}-{subnet_num}-1
    always_created: true
    description: 'Private subnet for private tier workloads (CIDR: {priv_cidr})'
    smart_defaults:
      vpc_id: '{config_id}'
      cidr_block: '{priv_cidr}'
