        Project: '{project_name}'
        Environment: prod
        Tier: private
        AZ: '{az}'
  isolatedsub-{project}-{environment}-{region_short}-{az_short}-{subnet_num}-1:
    type: aws:ec2:Subnet
    name: isolatedsub-{project}-{environment}-{region_short}-{az_short}-{subnet_num}-1
    always_created: true
    description: 'Private subnet for isolated tier workloads (CIDR: {iso_cidr})'
    smart_defaults:
      vpc_id: '{config_id}'
      cidr_block: '{iso_cidr}'
      availability_zone: '{az}'
      map_public_ip_on_launch: false
      tags:
        Name: '{iso_sub_name}'
        Project: '{project_name}'
        Environment: prod
        Tier: isolated
        AZ: '{az}'
  isolatedsub-{project}-{environment}-{region_short}-{az_short}-{subnet_num}-2:
    type: aws:ec2:Subnet
    name: isolatedsub-{project}-{environment}-{region_short}-{az_short}-{subnet_num}-2
    always_created: true
    description: 'Private subnet for isolated tier workloads (CIDR: {iso_cidr})'
    smart_defaults:
      vpc_id: '{config_id}'
      cidr_block: '{iso_cidr}'
      availability_zone: '{az}'
      map_public_ip_on_launch: false
      tags:
        Name: '{iso_sub_name}'
        Project: '{project_name}'
        Environment: prod
        Tier: isolated
        AZ: '{az}'
  isolatedsub-{project}-{environment}-{region_short}-{az_short}-{subnet_num}-3:
    type: aws:ec2:Subnet
    name: isolatedsub-{project}-{environment}-{region_short}-{az_short}-{subnet_num}-3
    always_created: true
    description: 'Private subnet for isolated tier workloads (CIDR: {iso_cidr})'
    smart_defaults:
      vpc_id: '{config_id}'
      cidr_block: '{iso_cidr}'
      availability_zone: '{az}'
      map_public_ip_on_launch: false
      tags:
        Name: '{iso_sub_name}'
        Project: '{project_name}'
        Environment: prod
        Tier: isolated
        AZ: '{az}'
  rta-{tier}-{project}-{environment}-{region_short}-1-1:
    type: aws:ec2:RouteTableAssociation
    name: rta-{tier}-{project}-{environment}-{region_short}-1-1
    always_created: true
    description: Associates a route table with a subnet for traffic routing
    smart_defaults:
      subnet_id: '{id}'
      route_table_id: '{id}'
  rta-{tier}-{project}-{environment}-{region_short}-1-2:
    type: aws:ec2:RouteTableAssociation
    name: rta-{tier}-{project}-{environment}-{region_short}-1-2
    always_created: true
    description: Associates a route table with a subnet for traffic routing
    smart_defaults:
      subnet_id: '{id}'
      route_table_id: '{id}'
  rta-{tier}-{project}-{environment}-{region_short}-1-3:
    type: aws:ec2:RouteTableAssociation
    name: rta-{tier}-{project}-{environment}-{region_short}-1-3
    always_created: true
    description: Associates a route table with a subnet for traffic routing
    smart_defaults:
      subnet_id: '{id}'
      route_table_id: '{id}'
  vpce-rds-{project}-{environment}-{region_short}-if:
    type: aws:ec2:VpcEndpoint
    name: vpce-rds-{project}-{environment}-{region_short}-if
    description: RDS Interface VPC Endpoint for private RDS service access
    conditional:
      field: enable_rds_endpoint
    smart_defaults:
      vpc_id: '{config_id}'
      service_name: com.amazonaws.{region}.rds
      vpc_endpoint_type: Interface
      subnet_ids: '{private_subnet_ids}'
      security_group_ids:
      - '{id}'
      private_dns_enabled: true
      tags:
        Name: '{rds_svc_name}'
        Project: '{project_name}'
        Environment: prod
  s3-{purpose}-{project}-{environment}-{region_short}:
    type: aws:s3:Bucket
    name: s3-{purpose}-{project}-{environment}-{region_short}
    description: S3 bucket for VPC Flow Logs storage
    conditional:
      field: enable_flow_logs
    smart_defaults:
      bucket: '{bucket_name}'
      force_destroy: true
      tags:
        Name: '{bucket_name}'
        Project: '{project_name}'
        Environment: prod
        Purpose: VPC Flow Logs
  s3-{purpose}-{project}-{environment}-{region_short}-lifecycle:
    type: aws:s3:BucketLifecycleConfigurationV2
    name: s3-{purpose}-{project}-{environment}-{region_short}-lifecycle
    description: S3 bucket lifecycle rules for automatic log retention and deletion
    conditional:
      field: enable_flow_logs
    smart_defaults:
      bucket: '{id}'
      rules:
      - status: Enabled
  fl-{scope}-{project}-{environment}-{region_short}-{traffic}:
    type: aws:ec2:FlowLog
    name: fl-{scope}-{project}-{environment}-{region_short}-{traffic}
    description: VPC Flow Logs capturing ALL network traffic to S3
    conditional:
      field: enable_flow_logs
    smart_defaults:
      vpc_id: '{config_id}'
      traffic_type: ALL
      log_destination_type: s3
      log_destination: '{arn}'
      max_aggregation_interval: 600
      destination_options:
        file_format: plain-text
        hive_compatible_partitions: false
        per_hour_partition: false
      tags:
        Name: '{flow_name}'
        Project: '{project_name}'
        Environment: prod
  route-00000-{project}-{environment}-{region_short}-{target}-1:
    type: aws:ec2:Route
    name: route-00000-{project}-{environment}-{region_short}-{target}-1
    description: Route directing 0.0.0.0/0 traffic to NAT Gateway
    conditional: &id001
      field: enable_nat_gateway
    smart_defaults:
      route_table_id: '{id}'
      destination_cidr_block: 0.0.0.0/0
      nat_gateway_id: '{id}'
  route-00000-{project}-{environment}-{region_short}-{target}-2:
    type: aws:ec2:Route
    name: route-00000-{project}-{environment}-{region_short}-{target}-2
    description: Route directing 0.0.0.0/0 traffic to NAT Gateway
    conditional: *id001
    smart_defaults:
      route_table_id: '{id}'
      destination_cidr_block: 0.0.0.0/0
      nat_gateway_id: '{id}'
  route-00000-{project}-{environment}-{region_short}-{target}-3:
    type: aws:ec2:Route
    name: route-00000-{project}-{environment}-{region_short}-{target}-3
    description: Route directing 0.0.0.0/0 traffic to NAT Gateway
    conditional: *id001
    smart_defaults:
      route_table_id: '{id}'
      destination_cidr_block: 0.0.0.0/0
      nat_gateway_id: '{id}'
  vpce-{service}-{project}-{environment}-{region_short}-if:
    type: aws:ec2:VpcEndpoint
    name: vpce-{service}-{project}-{environment}-{region_short}-if
    description: '{SVC} Interface VPC Endpoint for private {SVC} service access'
    conditional:
      field: enable_ssm_endpoints
    smart_defaults:
      vpc_id: '{config_id}'
      service_name: com.amazonaws.{region}.{svc}
      vpc_endpoint_type: Interface
      subnet_ids: '{private_subnet_ids}'
      security_group_ids:
      - '{id}'
      private_dns_enabled: true
      tags:
        Name: '{svc_name}'
        Project: '{project_name}'
        Environment: prod
  eip-{purpose}-{project}-{environment}-{region_short}-{az_short}-1:
    type: aws:ec2:Eip
    name: eip-{purpose}-{project}-{environment}-{region_short}-{az_short}-1
    description: Elastic IP address for NAT Gateway attachment
    conditional: &id002
      field: enable_nat_gateway
    smart_defaults:
      domain: vpc
      tags:
        Name: '{nat_eip_name}'
        Project: '{project_name}'
        Environment: prod
        AZ: '{az}'
  eip-{purpose}-{project}-{environment}-{region_short}-{az_short}-2:
    type: aws:ec2:Eip
    name: eip-{purpose}-{project}-{environment}-{region_short}-{az_short}-2
