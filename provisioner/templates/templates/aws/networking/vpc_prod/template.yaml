configuration:
  properties:
    use_custom_cidr:
      type: boolean
      default: false
      title: Use Custom CIDR
      description: Enable to specify a custom IPv4 CIDR block for the VPC
      order: 9
      group: Network Configuration
      cost_impact: $0/month
      resource_category: Vpc
    vpc_cidr:
      type: string
      default: random
      title: VPC CIDR Block
      description: IPv4 CIDR block for the VPC (e.g., 10.0.0.0/16, 172.16.0.0/16, 192.168.0.0/16)
      order: 10
      group: Network Configuration
      isEssential: true
      resource_category: Vpc
      conditional:
        field: use_custom_cidr
    enable_dns_support:
      type: boolean
      default: true
      title: Enable DNS Support
      description: Enable DNS resolution in the VPC
      order: 11
      group: Network Configuration
    enable_dns_hostnames:
      type: boolean
      default: true
      title: Enable DNS Hostnames
      description: Enable DNS hostnames for instances
      order: 12
      group: Network Configuration
      resource_category: Vpc
    enable_isolated_tier:
      type: boolean
      default: true
      title: Enable Isolated Database Tier
      description: Creates isolated subnet with no internet access for databases (best practice for production)
      architecture_decision: true
      smart_default_enabled: true
      section: Network Configuration
      resources_impacted:
        - isolatedsub-{project}-{environment}-{region_short}-{az_short}-1
        - isolatedsub-{project}-{environment}-{region_short}-{az_short}-2
        - isolatedsub-{project}-{environment}-{region_short}-{az_short}-3
        - rt-isolated-{project}-{environment}-{region_short}
      order: 99
      group: Architecture Decisions
      cost_impact: +$0/month (best practice for prod)
    enable_ssh_access:
      type: boolean
      default: false
      title: Enable SSH Security Group
      description: Traditional SSH/RDP key-based access (alternative to SSM Session Manager)
      architecture_decision: true
      smart_default_enabled: false
      foundation: true
      section: Security & Access
      resources_impacted:
        - secg-ssh-{project}-{environment}-{region_short}
      order: 105
      group: Architecture Decisions
      cost_impact: +$0/month
      resource_category: SecurityGroup
    ssh_access_ip:
      type: string
      default: ""
      title: SSH Access Source IP/CIDR
      description: Your public IP address or CIDR block for SSH/RDP access (e.g., 203.0.113.45/32). Required when SSH is enabled.
      placeholder: "203.0.113.45/32"
      required: false
      order: 106
      group: Architecture Decisions
      conditional:
        field: enable_ssh_access
    az_1:
      type: string
      default: ''
      title: Availability Zone 1
      description: First availability zone (auto-selected if empty)
      order: 20
      group: Availability Zones
    az_2:
      type: string
      default: ''
      title: Availability Zone 2
      description: Second availability zone (auto-selected if empty)
      order: 21
      group: Availability Zones
    az_3:
      type: string
      default: ''
      title: Availability Zone 3
      description: Third availability zone (auto-selected if empty)
      order: 22
      group: Availability Zones
    nat_gateway_ha:
      type: boolean
      default: true
      title: NAT Gateway High Availability
      description: "Deploy 3 NAT Gateways (1 per AZ) for high availability. Disabling deploys 1 NAT Gateway to save $64/mo but creates single point of failure. ⚠️ Not recommended for mission-critical workloads."
      architecture_decision: true
      smart_default_enabled: true
      section: Network Configuration
      resources_impacted:
        - natgw-{project}-{environment}-{region_short}-{az_short}-1
        - natgw-{project}-{environment}-{region_short}-{az_short}-2
        - natgw-{project}-{environment}-{region_short}-{az_short}-3
        - eip-natgw-{project}-{environment}-{region_short}-{az_short}-1
        - eip-natgw-{project}-{environment}-{region_short}-{az_short}-2
        - eip-natgw-{project}-{environment}-{region_short}-{az_short}-3
      order: 100
      group: Architecture Decisions
      cost_impact: "3 NAT GWs: $96/mo (default) | 1 NAT GW: $32/mo (saves $64, single point of failure)"
    enable_flow_logs:
      type: boolean
      default: true
      title: Enable VPC Flow Logs
      description: Capture network traffic logs to S3 for security monitoring and compliance (required for most production environments)
      architecture_decision: true
      smart_default_enabled: true
      section: Monitoring & Observability
      resources_impacted:
        - s3-flowlogs-{project}-{environment}-{region_short}
        - fl-{scope}-{project}-{environment}-{region_short}-{traffic}
      order: 101
      group: Architecture Decisions
      cost_impact: +$3/month (included in base)
    flow_log_retention:
      type: integer
      default: 30
      title: Flow Logs Retention (days)
      description: How long to retain flow logs in S3 before auto-deletion
      order: 111
      group: High Availability & Cost
    enable_nacls:
      type: boolean
      default: true
      title: Enable Network ACLs
      description: Subnet-level firewall rules for defense-in-depth security (recommended for production)
      architecture_decision: true
      smart_default_enabled: true
      section: Network Configuration
      resources_impacted:
        - nacl-public-{project}-{environment}-{region_short}
        - nacl-private-{project}-{environment}-{region_short}
        - nacl-isolated-{project}-{environment}-{region_short}
      order: 104
      group: Architecture Decisions
      cost_impact: +$0/month
    enable_rds_endpoint:
      type: boolean
      default: false
      title: Enable RDS VPC Endpoint
      description: Private interface endpoint for RDS API calls (optional for enhanced database security)
      architecture_decision: true
      smart_default_enabled: false
      resources_impacted:
        - vpce-rds-{project}-{environment}-{region_short}
      order: 107
      group: Architecture Decisions
      cost_impact: +$14/month when enabled
    enable_ssm_endpoints:
      type: boolean
      default: true
      title: Enable SSM VPC Endpoints
      description: Private endpoints for AWS Systems Manager - enables secure instance access without bastion hosts or SSH keys (best practice for production)
      architecture_decision: true
      smart_default_enabled: true
      resources_impacted:
        - vpce-ssm-{project}-{environment}-{region_short}
        - vpce-ssmmessages-{project}-{environment}-{region_short}
        - vpce-ec2messages-{project}-{environment}-{region_short}
      order: 102
      group: Architecture Decisions
      cost_impact: +$42/month (included in base)
  required:
  - project_name
  - region
