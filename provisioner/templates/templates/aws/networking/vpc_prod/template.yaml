configuration:
  properties:
    cidr_block:
      type: string
      default: random
      title: VPC CIDR Block
      description: IPv4 CIDR block for the VPC (use 'random' for auto-generated)
      order: 10
      group: Network Configuration
    enable_dns_support:
      type: boolean
      default: true
      title: Enable DNS Support
      description: Enable DNS resolution in the VPC
      order: 11
      group: Network Configuration
    enable_dns_hostnames:
      type: boolean
      default: true
      title: Enable DNS Hostnames
      description: Enable DNS hostnames for instances
      order: 12
      group: Network Configuration
    az_1:
      type: string
      default: ''
      title: Availability Zone 1
      description: First availability zone (auto-selected if empty)
      order: 20
      group: Availability Zones
    az_2:
      type: string
      default: ''
      title: Availability Zone 2
      description: Second availability zone (auto-selected if empty)
      order: 21
      group: Availability Zones
    az_3:
      type: string
      default: ''
      title: Availability Zone 3
      description: Third availability zone (auto-selected if empty)
      order: 22
      group: Availability Zones
    enable_nat_gateway:
      type: boolean
      default: true
      title: Enable NAT Gateway
      description: Creates NAT Gateway(s) for private subnet internet access
      order: 100
      group: High Availability & Cost
      cost_impact: +$96/month
    nat_gateway_count:
      type: integer
      default: 3
      title: NAT Gateway Count
      description: Number of NAT Gateways (1 or 3 for HA)
      order: 101
      group: High Availability & Cost
      cost_impact: +$32-96/month
    enable_flow_logs:
      type: boolean
      default: true
      title: Enable VPC Flow Logs
      description: Capture network traffic logs to S3 for security monitoring
      order: 110
      group: High Availability & Cost
      cost_impact: +$3/month
    flow_log_retention:
      type: integer
      default: 30
      title: Flow Logs Retention (days)
      description: How long to retain flow logs in S3 before auto-deletion
      order: 111
      group: High Availability & Cost
    enable_nacls:
      type: boolean
      default: true
      title: Enable Network ACLs
      description: Create Network ACLs for subnet-level security
      order: 120
      group: Security Settings
      cost_impact: $0/month
    enable_rds_endpoint:
      type: boolean
      default: false
      title: Enable RDS VPC Endpoint
      description: Interface endpoint for RDS API calls
      order: 132
      group: VPC Endpoints
      cost_impact: +$42/month
    enable_ssm_endpoints:
      type: boolean
      default: true
      title: Enable SSM VPC Endpoints
      description: Private endpoints for AWS Systems Manager
      order: 133
      group: VPC Endpoints
      cost_impact: +$126/month
    ssh_access_ip:
      type: string
      default: ''
      title: SSH Access IP (Optional)
      description: Your IP for SSH/RDP access (e.g., 1.2.3.4/32)
      order: 140
      group: Security Settings
  required:
  - project_name
  - region
outputs:
- name: vpc_id
  description: 'Output: vpc_id'
- name: vpc_name
  description: 'Output: vpc_name'
- name: vpc_cidr
  description: 'Output: vpc_cidr'
- name: public_subnet_ids
  description: 'Output: public_subnet_ids'
- name: private_subnet_ids
  description: 'Output: private_subnet_ids'
- name: isolated_subnet_ids
  description: 'Output: isolated_subnet_ids'
- name: web_security_group_id
  description: 'Output: web_security_group_id'
- name: app_security_group_id
  description: 'Output: app_security_group_id'
- name: db_security_group_id
  description: 'Output: db_security_group_id'
- name: access_security_group_id
  description: 'Output: access_security_group_id'
