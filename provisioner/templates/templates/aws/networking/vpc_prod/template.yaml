metadata:
  name: aws-vpc-prod
  title: 3-Tier Enterprise Network
  description: Enterprise-grade networking foundation for production workloads. 3-AZ deployment with public/private/isolated subnets, 3 NAT Gateways for HA, S3-based flow logs with lifecycle policies, Network ACLs, and SSM endpoints.
  category: networking
  version: latest
  author: InnovativeApps
  cloud: aws
  environment: prod
  base_cost: $110/month
  features:
  - 3-AZ Multi-AZ architecture for maximum uptime
  - '3-Tier Subnet design: Public (DMZ), Private (App), Isolated (DB)'
  - Redundant NAT Gateways (one per AZ) to eliminate single points of failure
  - Network ACLs for defense-in-depth subnet-level security (enabled by default)
  - S3-based VPC Flow Logs with 30-day lifecycle retention (enabled by default)
  - SSM VPC Endpoints for secure Systems Manager access (enabled by default, +$42/mo)
  - Private S3 and DynamoDB access via Gateway Endpoints (free)
  - Zero-trust security pattern with strict security group templates
  - 'Optional: RDS VPC Endpoint for database API calls (+$42/mo)'
  tags:
  - vpc
  - networking
  - production
  - ha
  - enterprise
  - multi-az
  deployment_time: 10-15 minutes
  complexity: advanced
  use_cases:
  - Production-grade High Availability Workloads
  - Mission-Critical Applications
  - Strict Network Isolation (3-tier)
  - Redundant Outbound Connectivity
  - Compliance-ready Observability
  - Enterprise Web Applications
  pillars:
  - title: Operational Excellence
    score: excellent
    score_color: '#10b981'
    description: Infrastructure as code deployment with comprehensive monitoring, automated configuration, and enterprise-grade operational visibility
    practices:
    - Infrastructure as Code with Pulumi for repeatable deployments
    - CloudWatch-based VPC Flow Logs for operational visibility
    - Configurable resource naming conventions for easy identification
    - VPC endpoints for centralized service access
    - Automated subnet and routing table configuration across 3 AZs
    - SSM endpoints for secure instance management
  - title: Security
    score: excellent
    score_color: '#10b981'
    description: Defense-in-depth with network segmentation, least-privilege access, and comprehensive audit logging
    practices:
    - Multi-tier security groups (web, app, database, access)
    - Private subnets for application and database tiers
    - VPC Flow Logs to CloudWatch for security monitoring and compliance
    - Isolated tier for maximum security database workloads
    - Network ACLs for additional subnet-level protection
    - VPC endpoints to reduce internet exposure
    - SSM endpoints for secure instance access without bastion hosts
  - title: Reliability
    score: excellent
    score_color: '#10b981'
    description: Multi-AZ architecture with redundant NAT infrastructure and fault-tolerant design for production workloads
    practices:
    - 3 Availability Zones for maximum fault tolerance
    - Redundant internet connectivity via Internet Gateway
    - 3 NAT Gateways (one per AZ) for outbound HA
    - Isolated tier for critical database workloads
    - Multiple subnets per tier across availability zones
    - Automatic failover for NAT routing
  - title: Performance Efficiency
    score: excellent
    score_color: '#10b981'
    description: Optimizes network performance with proper subnet design, multi-AZ distribution, and VPC endpoint acceleration
    practices:
    - Dedicated subnets per tier for traffic isolation
    - 3 NAT Gateways for distributed high-bandwidth outbound connectivity
    - VPC endpoints for direct AWS service access
    - Gateway endpoints for S3 and DynamoDB to reduce latency
    - Interface endpoints for SSM to minimize internet routing
    - Configurable CIDR ranges to avoid IP exhaustion
  - title: Cost Optimization
    score: good
    score_color: '#f59e0b'
    description: Production-grade infrastructure with optimized resource sizing and configurable NAT deployment options
    practices:
    - Gateway VPC endpoints (S3, DynamoDB) are free
    - CloudWatch logs with configurable retention to manage costs
    - Optional single NAT Gateway mode for cost reduction (1 vs 3)
    - Right-sized subnets to minimize IP address waste
    - Configurable interface endpoints to balance cost vs security
  - title: Sustainability
    score: good
    score_color: '#f59e0b'
    description: Balances high availability with efficient resource utilization through smart deployment patterns
    practices:
    - Gateway VPC endpoints eliminate data transfer infrastructure
    - Right-sized network resources to avoid over-provisioning
    - Regional AWS services reduce data travel distances
    - Configurable NAT count for workload-appropriate redundancy
  architecture:
    summary: VPC Production Template
  action_name: aws-vpc-prod
  tier: template
resources:
  vpc-{project}-{environment}-{region_short}-{network_num}:
    type: aws:ec2:Vpc
    name: vpc-{project}-{environment}-{region_short}-{network_num}
    always_created: true
    description: Virtual Private Cloud with CIDR {cidr_block}, DNS support enabled
    smart_defaults:
      cidr_block: '{cidr_block}'
      enable_dns_support: '{computed}'
      enable_dns_hostnames: '{computed}'
      instance_tenancy: '{computed}'
      tags:
        Name: '{vpc_resource_name}'
        Project: '{project_name}'
        Environment: prod
        ManagedBy: Archie
  igw-main-{project}-{environment}-{region_short}:
    type: aws:ec2:InternetGateway
    name: igw-main-{project}-{environment}-{region_short}
    always_created: true
    description: Internet Gateway providing public internet connectivity for the VPC
    smart_defaults:
      vpc_id: '{config_id}'
      tags:
        Name: '{igw_name}'
        Project: '{project_name}'
        Environment: prod
  rt-public-{project}-{environment}-{region_short}:
    type: aws:ec2:RouteTable
    name: rt-public-{project}-{environment}-{region_short}
    always_created: true
    description: Route table for public tier network traffic routing
    smart_defaults:
      vpc_id: '{config_id}'
      tags:
        Name: '{public_rt_name}'
        Project: '{project_name}'
        Environment: prod
        Tier: public
  vpce-s3-{project}-{environment}-{region_short}-gw:
    type: aws:ec2:VpcEndpoint
    name: vpce-s3-{project}-{environment}-{region_short}-gw
    always_created: true
    description: S3 Gateway VPC Endpoint for private S3 service access
    smart_defaults:
      vpc_id: '{config_id}'
      service_name: com.amazonaws.{region}.s3
      vpc_endpoint_type: Gateway
      route_table_ids: '{endpoint_rt_ids}'
      tags:
        Name: '{s3_name}'
        Project: '{project_name}'
        Environment: prod
  vpce-dynamodb-{project}-{environment}-{region_short}-gw:
    type: aws:ec2:VpcEndpoint
    name: vpce-dynamodb-{project}-{environment}-{region_short}-gw
    always_created: true
    description: DYNAMODB Gateway VPC Endpoint for private DYNAMODB service access
    smart_defaults:
      vpc_id: '{config_id}'
      service_name: com.amazonaws.{region}.dynamodb
      vpc_endpoint_type: Gateway
      route_table_ids: '{endpoint_rt_ids}'
      tags:
        Name: '{ddb_name}'
        Project: '{project_name}'
        Environment: prod
  secg-web-{project}-{environment}-{region_short}:
    type: aws:ec2:SecurityGroup
    name: secg-web-{project}-{environment}-{region_short}
    always_created: true
    description: Security group for web tier - allows HTTP/HTTPS traffic
    smart_defaults:
      vpc_id: '{config_id}'
      description: Security group for web tier - allows HTTP/HTTPS traffic
      ingress:
      - protocol: tcp
        from_port: 80
        to_port: 80
        cidr_blocks:
        - 0.0.0.0/0
        description: HTTP from internet
      - protocol: tcp
        from_port: 443
        to_port: 443
        cidr_blocks:
        - 0.0.0.0/0
        description: HTTPS from internet
      egress:
      - protocol: '-1'
        from_port: 0
        to_port: 0
        cidr_blocks:
        - 0.0.0.0/0
        description: Allow all outbound
      tags:
        Name: '{web_sg_name}'
        Project: '{project_name}'
        Environment: prod
        Tier: web
        ManagedBy: Archie
    display_properties:
      - ingress
      - egress
  secg-app-{project}-{environment}-{region_short}:
    type: aws:ec2:SecurityGroup
    name: secg-app-{project}-{environment}-{region_short}
    always_created: true
    description: Security group for application tier
    smart_defaults:
      vpc_id: '{config_id}'
      description: Security group for application tier
      ingress:
      - protocol: tcp
        from_port: 3000
        to_port: 3000
        security_groups:
        - '{security_group_web}'
        description: App traffic from web tier
      - protocol: tcp
        from_port: 8080
        to_port: 8080
        security_groups:
        - '{security_group_web}'
        description: Alt app port from web tier
      egress:
      - protocol: '-1'
        from_port: 0
        to_port: 0
        cidr_blocks:
        - 0.0.0.0/0
        description: Allow all outbound
      tags:
        Name: '{app_sg_name}'
        Project: '{project_name}'
        Environment: prod
        Tier: app
        ManagedBy: Archie
    display_properties:
      - ingress
      - egress
  secg-db-{project}-{environment}-{region_short}:
    type: aws:ec2:SecurityGroup
    name: secg-db-{project}-{environment}-{region_short}
    always_created: true
    description: Security group for database tier
    smart_defaults:
      vpc_id: '{config_id}'
      description: Security group for database tier
      ingress:
      - protocol: tcp
        from_port: 3306
        to_port: 3306
        security_groups:
        - '{security_group_app}'
        description: MySQL from app tier
      - protocol: tcp
        from_port: 5432
        to_port: 5432
        security_groups:
        - '{security_group_app}'
        description: PostgreSQL from app tier
      - protocol: tcp
        from_port: 1433
        to_port: 1433
        security_groups:
        - '{security_group_app}'
        description: SQL Server from app tier
      egress:
      - protocol: '-1'
        from_port: 0
        to_port: 0
        cidr_blocks:
        - 0.0.0.0/0
        description: Allow all outbound
      tags:
        Name: '{db_sg_name}'
        Project: '{project_name}'
        Environment: prod
        Tier: db
        ManagedBy: Archie
    display_properties:
      - ingress
      - egress
  secg-access-{project}-{environment}-{region_short}:
    type: aws:ec2:SecurityGroup
    name: secg-access-{project}-{environment}-{region_short}
    always_created: true
    description: Security group for SSH/RDP access
    smart_defaults:
      vpc_id: '{config_id}'
      description: Security group for SSH/RDP access
      ingress: '{access_sg_ingress}'
      egress:
      - protocol: '-1'
        from_port: 0
        to_port: 0
        cidr_blocks:
        - 0.0.0.0/0
        description: Allow all outbound
      tags:
        Name: '{access_sg_name}'
        Project: '{project_name}'
        Environment: prod
        Tier: access
        ManagedBy: Archie
    display_properties:
      - ingress
      - egress
  route-00000-{project}-{environment}-{region_short}-igw:
    type: aws:ec2:Route
    name: route-00000-{project}-{environment}-{region_short}-igw
    always_created: true
    description: Route directing 0.0.0.0/0 traffic to Internet Gateway
    smart_defaults:
      route_table_id: '{config_id}'
      destination_cidr_block: 0.0.0.0/0
      gateway_id: '{config_id}'
  rt-private-{project}-{environment}-{region_short}-1:
    type: aws:ec2:RouteTable
    name: rt-private-{project}-{environment}-{region_short}-1
    always_created: true
    description: Route table for private tier network traffic routing
    smart_defaults:
      vpc_id: '{config_id}'
      tags:
        Name: '{priv_rt_name}'
        Project: '{project_name}'
        Environment: prod
        Tier: private
        AZ: '{az}'
  rt-private-{project}-{environment}-{region_short}-2:
    type: aws:ec2:RouteTable
    name: rt-private-{project}-{environment}-{region_short}-2
    always_created: true
