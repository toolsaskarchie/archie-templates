        Environment: prod
        AZ: '{az}'
  eip-{purpose}-{project}-{environment}-{region_short}-{az_short}-3:
    type: aws:ec2:Eip
    name: eip-{purpose}-{project}-{environment}-{region_short}-{az_short}-3
    description: Elastic IP address for NAT Gateway attachment
    conditional: *id002
    smart_defaults:
