      tags:
        Name: '{priv_rt_name}'
        Project: '{project_name}'
        Environment: prod
        Tier: private
        AZ: '{az}'
  rt-private-{project}-{environment}-{region_short}-3:
    type: aws:ec2:RouteTable
    name: rt-private-{project}-{environment}-{region_short}-3
    always_created: true
    description: Route table for private tier network traffic routing
    smart_defaults:
      vpc_id: '{config_id}'
      tags:
