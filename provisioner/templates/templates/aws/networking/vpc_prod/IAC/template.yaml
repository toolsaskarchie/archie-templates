# VPC Production Template Metadata

template:
  # Identification
  id: vpc-prod
  name: vpc-prod
  
  # Display Information
  title: Enterprise VPC (Production)
  subtitle: High-availability 3-AZ VPC with 3-tier architecture
  description: |
    Enterprise-grade VPC with 3 availability zones and 3-tier network architecture.
    Includes public, private, and isolated subnets across all AZs with 3 NAT gateways
    for high availability. Ideal for production workloads requiring fault tolerance.
  
  # Classification
  category: Networking
  provider: aws
  tier: template
  complexity: advanced
  
  # Visual
  icon: 🏗️
  
  # Versioning
  version: 1.0.0
  status: stable
  
  # Pricing & Time
  pricing_tier: premium
  estimated_cost: "$105/month"
  deployment_time: 8-12 minutes
  
  # Marketing
  use_cases:
    - Production workloads
    - High-availability applications
    - Multi-tier architectures
    - Enterprise applications
    - Mission-critical systems
  
  features:
    - 3 Availability Zones for high availability
    - 3-tier architecture (public/private/isolated)
    - 3 NAT gateways (one per AZ)
    - Internet gateway
    - Route tables per tier
    - VPC Flow Logs
    - VPC Endpoints (S3/DynamoDB)
  
  outputs:
    - VPC ID
    - Public subnet IDs (3)
    - Private subnet IDs (3)
    - Isolated subnet IDs (3)
  
  # Searchability
  tags:
    - vpc
    - networking
    - production
    - high-availability
    - 3-az
    - 3-tier
    - enterprise
