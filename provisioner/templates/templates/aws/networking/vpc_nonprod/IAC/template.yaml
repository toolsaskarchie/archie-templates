# VPC Simple Non-Prod Template Metadata

template:
  # Identification
  id: vpc-nonprod
  name: vpc-nonprod
  
  # Display Information
  title: VPC Simple Non-Production
  subtitle: 2-AZ VPC for development environments
  description: |
    Creates a simple VPC with 2 availability zones for non-production workloads.
    Includes public and private subnets, NAT gateway, and internet gateway.
    Cost-optimized with a single NAT gateway.
  
  # Classification
  category: Networking
  provider: aws
  tier: template
  complexity: intermediate
  
  # Visual
  icon: 🌐
  
  # Versioning
  version: 1.0.0
  status: stable
  
  # Pricing & Time
  pricing_tier: basic
  estimated_cost: $35 - $45/month
  deployment_time: 5-8 minutes
  
  # Marketing
  use_cases:
    - Development environments
    - Testing infrastructure
    - Non-production workloads
    - Cost-optimized networking
  
  features:
    - 2 Availability Zones
    - Public and private subnets
    - Single NAT gateway (cost optimized)
    - Internet gateway
    - Route tables configured
    - Network ACLs
  
  outputs:
    - VPC ID
    - Public subnet IDs
    - Private subnet IDs
    - NAT gateway ID
    - Internet gateway ID
  
  # Searchability
  tags:
    - vpc
    - networking
    - non-prod
    - development
    - 2-az
