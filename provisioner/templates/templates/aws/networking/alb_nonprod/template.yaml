metadata:
  name: aws-alb-nonprod
  title: Application Load Balancer
  description: Complete web architecture featuring a highly available ALB distributing traffic to EC2 backend instances.
  category: networking
  version: latest
  author: InnovativeApps
  cloud: aws
  environment: nonprod
  base_cost: $45/month
  features:
  - Dedicated Multi-AZ VPC Architecture
  - Automated EC2 Backend fleet provisioning
  - Security Group isolation tiers (ALB vs App)
  - Integrated Health Checks & Target Management
  - HTTPS support with ACM integration
  tags:
  - alb
  - load-balancer
  - ha
  - networking
  - nonprod
  deployment_time: 12-18 minutes
  complexity: intermediate
  pillars:
  - title: Operational Excellence
    score: excellent
    score_color: '#10b981'
    practices:
    - Infrastructure as Code with Pulumi for automated, repeatable deployments
    - Centralized load balancer management and traffic routing
    - Health check monitoring with automatic unhealthy target removal
    - Access logs capture all requests for debugging and analytics
    - CloudWatch metrics provide real-time ALB performance visibility
  - title: Security
    score: excellent
    score_color: '#10b981'
    practices:
    - Security group isolation between ALB and backend instances
    - HTTPS listener support with ACM certificate integration
    - Backend instances only accept traffic from ALB security group
    - Multi-tier security architecture (public ALB, private backends)
    - VPC endpoints enable private AWS service access without internet exposure
  - title: Reliability
    score: excellent
    score_color: '#10b981'
    practices:
    - Multi-AZ deployment ensures high availability across availability zones
    - Automated health checks remove unhealthy targets from rotation
    - Multiple backend instances provide redundancy and failover
    - ALB automatically scales to handle traffic spikes
    - Cross-zone load balancing distributes traffic evenly
  - title: Performance Efficiency
    score: excellent
    score_color: '#10b981'
    practices:
    - Elastic Load Balancing distributes traffic efficiently across targets
    - Connection multiplexing reduces backend connection overhead
    - HTTP/2 and WebSocket support for modern application protocols
    - Session stickiness routes repeat requests to same backend
    - Target group health checks ensure only healthy instances receive traffic
  - title: Cost Optimization
    score: good
    score_color: '#f59e0b'
    practices:
    - ALB pricing based on hours used and data processed (~$20-30/month base)
    - Shared ALB can serve multiple applications reducing infrastructure duplication
    - Health checks prevent wasted requests to unhealthy instances
    - Target-based routing enables efficient resource utilization
    - VPC endpoints eliminate NAT gateway costs for AWS service access
  - title: Sustainability
    score: good
    score_color: '#f59e0b'
    practices:
    - AWS-managed service optimized for energy efficiency
    - Elastic scaling prevents over-provisioning of infrastructure
    - Multi-AZ design maximizes resource utilization across zones
    - Health checks reduce wasteful traffic to unhealthy targets
    - Efficient traffic distribution minimizes redundant processing
  architecture:
    summary: AWS ALB Non-Production Template
  action_name: aws-alb-nonprod
  tier: template
  use_cases:
  - Development and testing environments
  - Staging infrastructure
  - Non-production workloads
resources:
  alb_aws_name:
    type: aws:lb:LoadBalancer
    name: alb_aws_name
    always_created: true
    description: LoadBalancer resource
    smart_defaults:
      load_balancer_type: application
      subnets: '{public_subnet_ids}'
      security_groups:
      - '{alb_sg_id}'
      internal: false
      tags:
        Name: '{alb_aws_name}'
  tg_name:
    type: aws:lb:TargetGroup
    name: tg_name
    always_created: true
    description: TargetGroup resource
    smart_defaults:
      port: 80
      protocol: '{config_target_protocol}'
      vpc_id: <vpc_id>
      target_type: instance
      health_check:
        enabled: true
        path: /
        interval: 30
        timeout: 5
        healthy_threshold: 2
        unhealthy_threshold: 2
      tags:
        Name: '{tg_name}'
  secg-backend-{project}-{environment}-{region_short}:
    type: aws:ec2:SecurityGroup
    name: secg-backend-{project}-{environment}-{region_short}
    always_created: true
    description: Security group for backend instances
    smart_defaults:
      vpc_id: <vpc_id>
      description: Security group for backend instances
      ingress:
      - protocol: tcp
        from_port: '{target_port}'
        to_port: '{target_port}'
        source_security_group_id: '{alb_sg_id}'
        description: Traffic from ALB
      egress:
      - protocol: '-1'
        from_port: 0
        to_port: 0
        cidr_blocks:
        - 0.0.0.0/0
      tags:
        Name: '{sg_name}'
  '{project_name}-alb-to-target':
    type: aws:ec2:SecurityGroupRule
    name: '{project_name}-alb-to-target'
    always_created: true
    description: SecurityGroupRule resource
    smart_defaults:
      type: ingress
      security_group_id: '{config_id}'
      protocol: tcp
      from_port: 80
      to_port: 80
      source_security_group_id: '{config_id}'
      description: Allow traffic from ALB
  '{project_name}-http':
    type: aws:lb:Listener
    name: '{project_name}-http'
    always_created: true
    description: Listener resource
    smart_defaults:
      load_balancer_arn: '{config_arn}'
      port: 80
      protocol: HTTP
      default_actions:
      - type: forward
        target_group_arn: '{arn}'
  '{project_name}-attachment-':
    type: aws:lb:TargetGroupAttachment
    name: '{project_name}-attachment-'
    always_created: true
    description: TargetGroupAttachment resource
    smart_defaults:
      target_group_arn: '{config_arn}'
      target_id: '{instance_id}'
      port: 80
  '{project_name}-https':
    type: aws:lb:Listener
    name: '{project_name}-https'
    always_created: true
    description: Listener resource
    smart_defaults:
      load_balancer_arn: '{config_arn}'
      port: 443
      protocol: HTTPS
      certificate_arn: <certificate_arn>
      default_actions:
      - type: forward
        target_group_arn: '{arn}'
  role-{service}-{project}-{environment}-{region_short}:
    type: aws:iam:Role
    name: role-{service}-{project}-{environment}-{region_short}
    description: Role resource
    conditional:
      field: enable_ssm
    smart_defaults:
      assume_role_policy: '{json_config}'
      managed_policy_arns:
      - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      tags:
        Name: '{role_name}'
  '{namer_iam_profile}':
    type: aws:iam:InstanceProfile
    name: '{namer_iam_profile}'
    description: InstanceProfile resource
    conditional:
      field: enable_ssm
    smart_defaults:
      role: '{name}'
      tags:
        Name: '{profile_name}'
  ec2-{preset}-{project}-{environment}-{region_short}:
    type: aws:ec2:Instance
    name: ec2-{preset}-{project}-{environment}-{region_short}
    always_created: true
    description: Instance resource
    smart_defaults:
      instance_type: '{config_instance_type}'
      ami: '{config_id}'
      subnet_id: '{config_subnet_id}'
      vpc_security_group_ids: '{base_security_groups}'
      iam_instance_profile: '{config_name}'
      key_name: '{config_key_name}'
      user_data: '{config_user_data}'
      tags:
        Name: '{name_final}'
        ManagedBy: Archie
  secg-access-{project}-{environment}-{region_short}:
    type: aws:ec2:SecurityGroup
    name: secg-access-{project}-{environment}-{region_short}
    description: Management access security group (SSH/RDP)
    conditional:
      field: enable_ssh
    smart_defaults:
      vpc_id: '{config_id}'
      description: Management access security group (SSH/RDP)
      ingress: '{access_sg_ingress}'
      egress:
      - protocol: '-1'
        from_port: 0
        to_port: 0
        cidr_blocks:
        - 0.0.0.0/0
        description: Allow all outbound
      tags:
        Name: '{access_sg_name}'
        Tier: management
  '{project_name}--rule-{idx}':
    type: aws:ec2:SecurityGroupRule
    name: '{project_name}--rule-{idx}'
    always_created: true
    description: SecurityGroupRule resource
    smart_defaults:
      type: ingress
      security_group_id: '{access_sg_id}'
      protocol: tcp
      from_port: '{remote_port}'
      to_port: '{remote_port}'
      cidr_blocks:
      - '{cidr_ip}'
      description: '{remote_proto} from {cidr_ip}'
  vpc-{project}-{environment}-{region_short}-{network_num}:
    type: aws:ec2:Vpc
    name: vpc-{project}-{environment}-{region_short}-{network_num}
    always_created: true
    description: Virtual Private Cloud with CIDR {config_custom_cidr_block}, DNS support enabled
    smart_defaults:
      cidr_block: '{config_custom_cidr_block}'
      enable_dns_support: '{config_enable_dns_support}'
      enable_dns_hostnames: '{config_enable_dns_hostnames}'
      instance_tenancy: '{config_instance_tenancy}'
      tags:
        Name: '{vpc_name}'
  igw-main-{project}-{environment}-{region_short}:
    type: aws:ec2:InternetGateway
    name: igw-main-{project}-{environment}-{region_short}
    always_created: true
    description: Internet Gateway providing public internet connectivity for the VPC
    smart_defaults:
      vpc_id: '{config_id}'
      tags:
        Name: '{igw_name}'
  rt-public-{project}-{environment}-{region_short}:
    type: aws:ec2:RouteTable
    name: rt-public-{project}-{environment}-{region_short}
    always_created: true
    description: Route table for public tier network traffic routing
    smart_defaults:
      vpc_id: '{config_id}'
      tags:
        Name: '{public_rt_name}'
        Tier: public
  rt-private-{project}-{environment}-{region_short}:
    type: aws:ec2:RouteTable
    name: rt-private-{project}-{environment}-{region_short}
    always_created: true
    description: Route table for private tier network traffic routing
    smart_defaults:
      vpc_id: '{config_id}'
      tags:
        Name: '{private_rt_name}'
        Tier: private
  vpce-s3-{project}-{environment}-{region_short}-gw:
    type: aws:ec2:VpcEndpoint
    name: vpce-s3-{project}-{environment}-{region_short}-gw
    always_created: true
    description: S3 Gateway VPC Endpoint for private S3 service access
    smart_defaults:
      vpc_id: '{config_id}'
      service_name: com.amazonaws.{config_region}.s3
      vpc_endpoint_type: Gateway
      tags:
        Name: '{s3_endpoint_name}'
  vpce-dynamodb-{project}-{environment}-{region_short}-gw:
    type: aws:ec2:VpcEndpoint
    name: vpce-dynamodb-{project}-{environment}-{region_short}-gw
    always_created: true
    description: DYNAMODB Gateway VPC Endpoint for private DYNAMODB service access
    smart_defaults:
      vpc_id: '{config_id}'
      service_name: com.amazonaws.{config_region}.dynamodb
      vpc_endpoint_type: Gateway
      tags:
        Name: '{dynamodb_endpoint_name}'
  secg-web-{project}-{environment}-{region_short}:
    type: aws:ec2:SecurityGroup
    name: secg-web-{project}-{environment}-{region_short}
    always_created: true
    description: Security group for web tier (HTTP/HTTPS)
    smart_defaults:
      vpc_id: '{config_id}'
      description: Security group for web tier (HTTP/HTTPS)
      ingress:
      - protocol: tcp
        from_port: 80
        to_port: 80
        cidr_blocks:
        - 0.0.0.0/0
        description: HTTP from internet
      - protocol: tcp
        from_port: 443
        to_port: 443
        cidr_blocks:
        - 0.0.0.0/0
        description: HTTPS from internet
      egress:
      - protocol: '-1'
        from_port: 0
        to_port: 0
        cidr_blocks:
        - 0.0.0.0/0
        description: Allow all outbound
      tags:
        Name: '{web_sg_name}'
        Tier: web
  secg-app-{project}-{environment}-{region_short}:
    type: aws:ec2:SecurityGroup
    name: secg-app-{project}-{environment}-{region_short}
    always_created: true
    description: Security group for application tier
    smart_defaults:
      vpc_id: '{config_id}'
      description: Security group for application tier
      ingress:
      - protocol: tcp
        from_port: 3000
        to_port: 3000
        security_groups:
        - '{security_group_web}'
        description: App traffic from web tier
      - protocol: tcp
        from_port: 8080
        to_port: 8080
        security_groups:
        - '{security_group_web}'
        description: Alt app port from web tier
      egress:
      - protocol: '-1'
        from_port: 0
        to_port: 0
        cidr_blocks:
        - 0.0.0.0/0
        description: Allow all outbound
      tags:
        Name: '{app_sg_name}'
        Tier: app
  secg-db-{project}-{environment}-{region_short}:
    type: aws:ec2:SecurityGroup
    name: secg-db-{project}-{environment}-{region_short}
    always_created: true
    description: Security group for database tier
    smart_defaults:
      vpc_id: '{config_id}'
      description: Security group for database tier
      ingress:
      - protocol: tcp
        from_port: 3306
        to_port: 3306
        security_groups:
        - '{security_group_app}'
        description: MySQL from app tier
      - protocol: tcp
        from_port: 5432
        to_port: 5432
        security_groups:
        - '{security_group_app}'
        description: PostgreSQL from app tier
      - protocol: tcp
        from_port: 1433
        to_port: 1433
        security_groups:
        - '{security_group_app}'
        description: SQL Server from app tier
      egress:
      - protocol: '-1'
        from_port: 0
        to_port: 0
        cidr_blocks:
        - 0.0.0.0/0
        description: Allow all outbound
  pubsub-{project}-{environment}-{region_short}-{az_short}-{subnet_num}:
    type: aws:ec2:Subnet
    name: pubsub-{project}-{environment}-{region_short}-{az_short}-{subnet_num}
    always_created: true
    description: 'Public subnet for public tier workloads (CIDR: {public_cidr})'
    smart_defaults:
      vpc_id: '{config_id}'
      cidr_block: '{public_cidr}'
      availability_zone: '{config_region}a'
      map_public_ip_on_launch: true
      tags:
        Name: '{public_subnet_name}'
        Tier: public
  privsub-{project}-{environment}-{region_short}-{az_short}-{subnet_num}:
    type: aws:ec2:Subnet
    name: privsub-{project}-{environment}-{region_short}-{az_short}-{subnet_num}
    always_created: true
    description: 'Private subnet for private tier workloads (CIDR: {private_cidr})'
    smart_defaults:
      vpc_id: '{config_id}'
      cidr_block: '{private_cidr}'
      availability_zone: '{config_region}a'
      map_public_ip_on_launch: false
      tags:
        Name: '{private_subnet_name}'
        Tier: private
  route-00000-{project}-{environment}-{region_short}-igw:
    type: aws:ec2:Route
    name: route-00000-{project}-{environment}-{region_short}-igw
    always_created: true
    description: Route directing 0.0.0.0/0 traffic to Internet Gateway
    smart_defaults:
      route_table_id: '{id}'
      destination_cidr_block: 0.0.0.0/0
      gateway_id: '{config_id}'
  rta-public-{project}-{environment}-{region_short}-1:
    type: aws:ec2:RouteTableAssociation
    name: rta-public-{project}-{environment}-{region_short}-1
    always_created: true
    description: Associates a route table with a subnet for traffic routing
    smart_defaults:
      subnet_id: '{id}'
      route_table_id: '{id}'
  rta-private-{project}-{environment}-{region_short}-1:
    type: aws:ec2:RouteTableAssociation
    name: rta-private-{project}-{environment}-{region_short}-1
    always_created: true
    description: Associates a route table with a subnet for traffic routing
    smart_defaults:
      subnet_id: '{id}'
      route_table_id: '{id}'
  rt-isolated-{project}-{environment}-{region_short}:
    type: aws:ec2:RouteTable
    name: rt-isolated-{project}-{environment}-{region_short}
    description: Route table for isolated tier network traffic routing
    conditional:
      field: enable_isolated_tier
    smart_defaults:
      vpc_id: '{config_id}'
      tags:
        Name: '{isolated_rt_name}'
        Tier: isolated
  isolatedsub-{project}-{environment}-{region_short}-{az_short}-{subnet_num}:
    type: aws:ec2:Subnet
    name: isolatedsub-{project}-{environment}-{region_short}-{az_short}-{subnet_num}
    description: 'Private subnet for isolated tier workloads (CIDR: {isolated_cidr})'
    conditional:
      field: enable_isolated_tier
    smart_defaults:
      vpc_id: '{config_id}'
      cidr_block: '{isolated_cidr}'
      availability_zone: '{config_region}a'
      map_public_ip_on_launch: false
      tags:
        Name: '{isolated_subnet_name}'
        Tier: isolated
  eip-{purpose}-{project}-{environment}-{region_short}-{az_short}:
    type: aws:ec2:Eip
    name: eip-{purpose}-{project}-{environment}-{region_short}-{az_short}
    description: Elastic IP address for NAT Gateway attachment
    conditional:
      field: enable_nat_gateway
    smart_defaults:
      domain: vpc
      tags:
        Name: '{eip_name}'
  nat-gw-{project}-{environment}-{region_short}-{az_short}:
    type: aws:ec2:NatGateway
    name: nat-gw-{project}-{environment}-{region_short}-{az_short}
    description: NAT Gateway providing outbound internet access for private subnets
    conditional:
      field: enable_nat_gateway
    smart_defaults:
      subnet_id: '{id}'
      allocation_id: '{id}'
      tags:
        Name: '{nat_name}'
  route-00000-{project}-{environment}-{region_short}-nat:
    type: aws:ec2:Route
    name: route-00000-{project}-{environment}-{region_short}-nat
    always_created: true
    description: Route directing 0.0.0.0/0 traffic to NAT Gateway
    smart_defaults:
      route_table_id: '{id}'
      destination_cidr_block: 0.0.0.0/0
      nat_gateway_id: '{config_id}'
  rta-isolated-{project}-{environment}-{region_short}-1:
    type: aws:ec2:RouteTableAssociation
    name: rta-isolated-{project}-{environment}-{region_short}-1
    description: Associates a route table with a subnet for traffic routing
    conditional:
      field: enable_isolated_tier
    smart_defaults:
      subnet_id: '{id}'
      route_table_id: '{id}'
  vpce-rds-{project}-{environment}-{region_short}-if:
    type: aws:ec2:VpcEndpoint
    name: vpce-rds-{project}-{environment}-{region_short}-if
    description: RDS Interface VPC Endpoint for private RDS service access
    conditional:
      field: enable_rds_endpoint
    smart_defaults:
      vpc_id: '{config_id}'
      service_name: com.amazonaws.{config_region}.rds
      vpc_endpoint_type: Interface
      subnet_ids:
      - '{id}'
      security_group_ids:
      - '{id}'
      private_dns_enabled: true
      tags:
        Name: '{rds_endpoint_name}'
  vpce-ssm-{project}-{environment}-{region_short}-if:
    type: aws:ec2:VpcEndpoint
    name: vpce-ssm-{project}-{environment}-{region_short}-if
    description: SSM Interface VPC Endpoint for private SSM service access
    conditional:
      field: enable_ssm_endpoints
    smart_defaults:
      vpc_id: '{config_id}'
      service_name: com.amazonaws.{config_region}.ssm
      vpc_endpoint_type: Interface
      subnet_ids:
      - '{id}'
      private_dns_enabled: true
      tags:
        Name: '{ssm_endpoint_name}'
  vpce-ssmmessages-{project}-{environment}-{region_short}-if:
    type: aws:ec2:VpcEndpoint
    name: vpce-ssmmessages-{project}-{environment}-{region_short}-if
    description: SSMMESSAGES Interface VPC Endpoint for private SSMMESSAGES service access
    conditional:
      field: enable_ssm_endpoints
    smart_defaults:
      vpc_id: '{config_id}'
      service_name: com.amazonaws.{config_region}.ssmmessages
      vpc_endpoint_type: Interface
      subnet_ids:
      - '{id}'
      private_dns_enabled: true
      tags:
        Name: '{ssm_messages_endpoint_name}'
  vpce-ec2messages-{project}-{environment}-{region_short}-if:
    type: aws:ec2:VpcEndpoint
    name: vpce-ec2messages-{project}-{environment}-{region_short}-if
    description: EC2MESSAGES Interface VPC Endpoint for private EC2MESSAGES service access
    conditional:
      field: enable_ssm_endpoints
    smart_defaults:
      vpc_id: '{config_id}'
      service_name: com.amazonaws.{config_region}.ec2messages
      vpc_endpoint_type: Interface
      subnet_ids:
      - '{id}'
      private_dns_enabled: true
      tags:
        Name: '{ec2_messages_endpoint_name}'
  s3-{purpose}-{project}-{environment}-{region_short}:
    type: aws:s3:Bucket
    name: s3-{purpose}-{project}-{environment}-{region_short}
    description: S3 bucket for VPC Flow Logs storage
    conditional:
      field: enable_flow_logs
    smart_defaults:
      bucket: '{bucket_name}'
      force_destroy: true
      tags:
        Name: '{bucket_name}'
        Purpose: VPC Flow Logs
  '{bucket_name}-lifecycle':
    type: aws:s3:BucketLifecycleConfigurationV2
    name: '{bucket_name}-lifecycle'
    description: S3 bucket lifecycle rules for automatic log retention and deletion
    conditional:
      field: enable_flow_logs
    smart_defaults:
      bucket: '{config_id}'
      rules:
      - id: delete-old-flow-logs
        status: Enabled
  fl-{scope}-{project}-{environment}-{region_short}-{traffic}:
    type: aws:ec2:FlowLog
    name: fl-{scope}-{project}-{environment}-{region_short}-{traffic}
    description: VPC Flow Logs capturing ALL network traffic to S3
    conditional:
      field: enable_flow_logs
    smart_defaults:
      vpc_id: '{config_id}'
      traffic_type: ALL
      log_destination_type: s3
      log_destination: '{computed}'
      max_aggregation_interval: 600
      tags:
        Name: '{flow_log_name}'
configuration:
  properties:
    project_name:
      type: string
      title: Project Name
      description: Unique name for this project (used in resource naming)
      group: Essentials
      isEssential: true
      order: 1
    region:
      type: string
      title: AWS Region
      description: AWS region to deploy into
      default: us-east-1
      enum:
      - us-east-1
      - us-east-2
      - us-west-1
      - us-west-2
      - eu-west-1
      - eu-central-1
      - ap-southeast-1
      group: Essentials
      isEssential: true
      order: 2
    alb_name:
      type: string
      title: ALB Name
      description: Unique name for the load balancer
      placeholder: Auto-generated
      group: Load Balancer
      isEssential: true
      order: 10
    internal:
      type: boolean
      title: Internal Load Balancer
      description: Whether the load balancer is internal-only (not internet-facing)
      default: false
      group: Load Balancer
      order: 11
    enable_https:
      type: boolean
      title: Enable HTTPS (SSL)
      description: Enable secure listener on port 443
      default: false
      group: Load Balancer
      isEssential: true
      order: 12
    certificate_arn:
      type: string
      title: ACM Certificate ARN
      description: ARN of existing ACM certificate for HTTPS
      placeholder: arn:aws:acm:...
      visibleIf:
        enable_https: true
      group: Load Balancer
      order: 13
    target_port:
      type: number
      title: Backend Port
      description: Port on the EC2 instances to route traffic to
      default: 80
      group: Load Balancer
      order: 14
    ec2_instance_count:
      type: number
      title: Instance Count
      description: Number of backend EC2 instances
      default: 2
      minimum: 1
      maximum: 10
      group: Compute
      isEssential: true
      order: 20
    ec2_instance_type:
      type: string
      title: Instance Type
      description: EC2 instance size for backend targets
      default: t3.micro
      enum:
      - t3.micro
      - t3.small
      - t3.medium
      - t3.large
      - t3.xlarge
      group: Compute
      order: 21
    vpc_mode:
      type: string
      title: VPC Mode
      description: Create a new VPC or use an existing one
      default: new
      enum:
      - new
      - existing
      group: Networking
      isEssential: true
      order: 30
    vpc_id:
      type: string
      title: Existing VPC ID
      description: ID of an existing VPC to deploy into
      placeholder: vpc-0abc123def456
      visibleIf:
        vpc_mode: existing
      group: Networking
      order: 31
    vpc_cidr:
      type: string
      title: VPC CIDR Block
      description: CIDR block for the new VPC (leave empty for auto-generated)
      placeholder: 10.0.0.0/16
