metadata:
  name: aws-archie-role
  title: Archie Cross-Account Role
  description: Secure, managed IAM role for connecting your AWS account to Archie. Implements the principle of least privilege using restricted read-only permissions and STS External ID verification. The industry-standard approach for cross-account infrastructure management.
  category: security
  version: latest
  author: InnovativeApps
  tags:
  - iam
  - role
  - security
  - connection
  - managed
  features:
  - Secure Cross-Account Trust Policy
  - Mandatory STS External ID Verification
  - Restricted Read-Only permissions for discovery
  - Automated Customer Managed Policy creation
  - Managed via Pulumi Infrastructure-as-Code
  - No long-term credentials or access keys required
  estimated_cost: $0.00/month (IAM is free)
  complexity: intermediate
  deployment_time: 1-2 minutes
  marketplace_group: aws-security-group
  action_name: aws-archie-role
  environment: prod
  cloud: aws
  tier: template
  use_cases:
  - Production workloads
  - Mission-critical applications
  - Enterprise-grade infrastructure
resources:
  policy:
    type: aws:iam:Policy
    name: policy
    always_created: true
    description: IAM policy - policy
    smart_defaults:
      name: archie-policy
      tags:
        Name: archie-policy-{environment}
        ManagedBy: Archie
  '{project}':
    type: aws:iam:Role
    name: '{project}'
    always_created: true
    description: IAM role - {project}
    smart_defaults:
      name: archie-{project}
      tags:
        Name: archie-{project}-{environment}
        ManagedBy: Archie
  generated-resource:
    type: aws:iam:Policy
    name: generated-resource
    always_created: true
    description: Policy resource - generated-resource
    smart_defaults: {}
  role-{project}-{environment}:
    type: aws:iam:Role
    name: role-{project}-{environment}
    always_created: true
    description: IAM role - role-{project}-{environment}
    smart_defaults:
      tags:
        Name: archie-role-{project}-{environment}
        Environment: '{environment}'
        ManagedBy: Archie
configuration:
  properties:
    role_name:
      type: string
      title: Role Name
      description: Custom role name (optional, will be auto-generated if not provided)
      group: General Settings
      order: 1
    archie_account_id:
      type: string
      title: Archie Account Id
      description: Archie's AWS account ID that will assume this role
      group: General Settings
      order: 2
    external_id:
      type: string
      title: External Id
      description: External ID for additional security when assuming the role
      group: General Settings
      order: 3
    essentials_header:
      type: separator
      title: Template Essentials
      group: Essentials
      isEssential: true
      order: 0
    project_name:
      type: string
      title: Project Name
      description: Unique name for this deployment (lowercase, no spaces)
      default: archie-role
      group: Essentials
      isEssential: true
      order: 1
    externalId:
      type: string
      title: External ID
      description: Unique security identifier generated by Archie
      default: f727e356-8035-4aa6-b507-25a1e5656b56
      readOnly: true
      group: Essentials
      isEssential: true
      order: 2
    archieAccountId:
      type: string
      title: Archie Account ID
      description: The AWS Account ID of the Archie platform
      default: '416851285955'
      readOnly: true
      group: Essentials
      isEssential: true
      order: 3
    security_banner:
      type: info
      title: Secure Cross-Account Trust
      description: The External ID and Account ID are used to establish a secure trust relationship. This prevents "confused deputy" attacks by ensuring Archie only assumes this role when specifically authorized for your unique integration.
      group: Essentials
      isEssential: true
      order: 4
    policy_preview:
      type: info
      title: ReadOnly Policy (Included)
      description: Archie deployments begin with Read-Only permissions. You will need to manually elevate this role's permissions in your AWS Console after the connection is established to enable infrastructure creation.
      group: Essentials
      isEssential: true
      is_essential: true
      order: 5
    policy_document:
      type: syntax
      title: Policy Document
      description: JSON representation of the ReadOnly IAM policy
      default: "{\n  \"Version\": \"2012-10-17\",\n  \"Statement\": [\n    {\n      \"Effect\": \"Allow\",\n      \"Action\": [\n        \"ec2:Describe*\",\n        \"s3:List*\",\n        \"s3:Get*\",\n        \"rds:Describe*\",\n        \"elasticloadbalancing:Describe*\",\n        \"autoscaling:Describe*\",\n        \"cloudwatch:Describe*\",\n        \"cloudwatch:Get*\",\n        \"cloudwatch:List*\",\n        \"logs:Describe*\",\n        \"logs:Get*\",\n        \"logs:List*\",\n        \"iam:List*\",\n        \"iam:Get*\",\n        \"sns:List*\",\n        \"sns:Get*\",\n        \"sqs:List*\",\n        \"sqs:Get*\",\n        \"route53:List*\",\n        \"route53:Get*\"\n      ],\n      \"Resource\": \"*\"\n    }\n  ]\n}"
      group: Essentials
      isEssential: true
      is_essential: true
      order: 6
  required:
  - project_name
