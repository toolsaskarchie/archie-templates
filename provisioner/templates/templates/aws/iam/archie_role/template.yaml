metadata:
  name: aws-archie-role
  title: Archie Cross-Account Role
  description: Secure, managed IAM role for connecting your AWS account to Archie. Implements the principle of least privilege using restricted read-only permissions and STS External ID verification.
  category: security
  version: latest
  author: InnovativeApps
  cloud: aws
  environment: all
  base_cost: $0.00/month
  tags:
  - iam
  - role
  - security
  - connection
  - managed
  features:
  - Secure Cross-Account Trust Policy
  - Mandatory STS External ID Verification
  - Restricted Read-Only permissions for discovery
  - Automated Customer Managed Policy creation
  - No long-term credentials or access keys required
  deployment_time: 1-2 minutes
  complexity: low
  pillars:
  - title: Operational Excellence
    score: excellent
    score_color: '#10b981'
    description: Fully automated IAM provisioning with infrastructure as code
    practices:
    - Infrastructure as Code for repeatable role deployments
    - Automated policy lifecycle management via Pulumi
    - Standard tagging for governance and resource tracking
    - Consistent naming conventions for cross-account roles
    - One-click deployment eliminates manual IAM configuration
  - title: Security
    score: excellent
    score_color: '#10b981'
    description: Industry-standard cross-account trust with least privilege
    practices:
    - STS External ID prevents confused deputy attacks
    - Restricted read-only permissions follow least privilege principle
    - Cross-account trust eliminates long-term access key exposure
    - Customer Managed Policy for granular permission control
    - No root or admin-level permissions granted
  - title: Reliability
    score: excellent
    score_color: '#10b981'
    description: IAM is a globally resilient AWS service with no downtime
    practices:
    - IAM is a global service with built-in multi-region redundancy
    - Role assumption is stateless and inherently reliable
    - No infrastructure dependencies that could cause failures
    - Automated deployment reduces human error in configuration
    - External ID validation prevents unauthorized access attempts
  - title: Performance Efficiency
    score: excellent
    score_color: '#10b981'
    description: Zero-overhead identity federation with instant provisioning
    practices:
    - IAM role assumption adds no latency to API operations
    - No compute resources required for credential management
    - STS tokens are cached and reused efficiently
    - Read-only scoped permissions minimize API call overhead
    - Deploys in under 2 minutes with no warm-up required
  - title: Cost Optimization
    score: excellent
    score_color: '#10b981'
    description: IAM roles and policies are completely free
    practices:
    - IAM roles and policies incur zero AWS charges
    - Eliminates need for bastion hosts or VPN infrastructure
    - No compute or storage costs for credential management
    - STS temporary credentials are free to generate
    - Replaces costly long-term credential rotation processes
  - title: Sustainability
    score: excellent
    score_color: '#10b981'
    description: Serverless identity service with minimal resource footprint
    practices:
    - No compute resources provisioned or running
    - Leverages shared AWS IAM infrastructure globally
    - Zero energy consumption for credential storage
    - Eliminates need for dedicated identity management servers
    - Stateless role assumption minimizes resource utilization
  architecture:
    summary: Archie Cross-Account Role Template
  action_name: aws-archie-role
  tier: template
  use_cases:
  - Production workloads
  - Mission-critical applications
  - Enterprise-grade infrastructure
resources:
  '{project_name}-policy':
    type: aws:iam:Policy
    name: '{project_name}-policy'
    always_created: true
    description: Policy resource
    smart_defaults:
      name: pol-archierole-{config_project_name}-{environment}-{region}
      description: Restricted ReadOnly policy for Archie connection
      policy: '{json_config}'
      tags: '{tags}'
  '{project_name}':
    type: aws:iam:Role
    name: '{project_name}'
    always_created: true
    description: Role resource
    smart_defaults:
      name: role-archie-{config_project_name}-{environment}-{region}
      assume_role_policy: '{json_config}'
      managed_policy_arns:
      - '{arn}'
      tags: '{tags}'
      opts: '{computed}'
configuration:
  properties:
    role_name:
      type: string
      title: Role Name
      description: Custom role name (optional, will be auto-generated if not provided)
      group: General Settings
      order: 1
    archie_account_id:
      type: string
      title: Archie Account Id
      description: Archie's AWS account ID that will assume this role
      group: General Settings
      order: 2
    external_id:
      type: string
      title: External Id
      description: External ID for additional security when assuming the role
      group: General Settings
      order: 3
    essentials_header:
      type: separator
      title: Template Essentials
      group: Essentials
      isEssential: true
      order: 0
    project_name:
      type: string
      title: Project Name
      description: Unique name for this deployment (lowercase, no spaces)
      default: archie-role
      group: Essentials
      isEssential: true
      order: 1
    externalId:
      type: string
      title: External ID
      description: Unique security identifier generated by Archie
      default: f727e356-8035-4aa6-b507-25a1e5656b56
      readOnly: true
      group: Essentials
      isEssential: true
      order: 2
    archieAccountId:
      type: string
      title: Archie Account ID
      description: The AWS Account ID of the Archie platform
      default: '416851285955'
      readOnly: true
      group: Essentials
      isEssential: true
      order: 3
    security_banner:
      type: info
      title: Secure Cross-Account Trust
      description: The External ID and Account ID are used to establish a secure trust relationship. This prevents "confused deputy" attacks by ensuring Archie only assumes this role when specifically authorized for your unique integration.
      group: Essentials
      isEssential: true
      order: 4
    policy_preview:
      type: info
      title: ReadOnly Policy (Included)
      description: Archie deployments begin with Read-Only permissions. You will need to manually elevate this role's permissions in your AWS Console after the connection is established to enable infrastructure creation.
      group: Essentials
      isEssential: true
      is_essential: true
      order: 5
    policy_document:
      type: syntax
      title: Policy Document
      description: JSON representation of the ReadOnly IAM policy
      default: "{\n  \"Version\": \"2012-10-17\",\n  \"Statement\": [\n    {\n      \"Effect\": \"Allow\",\n      \"Action\": [\n        \"ec2:Describe*\",\n        \"s3:List*\",\n        \"s3:Get*\",\n        \"rds:Describe*\",\n        \"elasticloadbalancing:Describe*\",\n        \"autoscaling:Describe*\",\n        \"cloudwatch:Describe*\",\n        \"cloudwatch:Get*\",\n        \"cloudwatch:List*\",\n        \"logs:Describe*\",\n        \"logs:Get*\",\n        \"logs:List*\",\n        \"iam:List*\",\n        \"iam:Get*\",\n        \"sns:List*\",\n        \"sns:Get*\",\n        \"sqs:List*\",\n        \"sqs:Get*\",\n        \"route53:List*\",\n        \"route53:Get*\"\n      ],\n      \"Resource\": \"*\"\n    }\n  ]\n}"
      group: Essentials
      isEssential: true
      is_essential: true
      order: 6
  required:
  - project_name
outputs:
- name: role_arn
  description: 'Output: role_arn'
- name: role_name
  description: 'Output: role_name'
- name: external_id
  description: 'Output: external_id'
