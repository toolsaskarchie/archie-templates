metadata:
  name: gcp-compute-nonprod
  title: Compute Engine Instance
  description: Standard virtual machine instance in Google Cloud Platform for development and testing.
  category: compute
  version: latest
  author: InnovativeApps
  cloud: gcp
  environment: nonprod
  base_cost: $30/month
  tags:
  - gcp
  - compute
  - vm
  complexity: low
  deployment_time: 2-5 minutes
  marketplace_group: gcp-compute-group
  action_name: gcp-compute-nonprod
  tier: template
  use_cases:
  - Development and testing environments
  - Staging infrastructure
  - Non-production workloads
resources:
  '{instance_name}-allow-ssh':
    type: gcp:compute:Firewall
    name: '{instance_name}-allow-ssh'
    always_created: true
    description: gcp:compute:Firewall resource
    smart_defaults:
      name: '{instance_name}-allow-ssh'
      network: '{config_network}'
      project: '{config_project}'
      source_ranges: '{config_allowed_ssh_sources}'
      target_tags: []
      allows: []
      description: Allow SSH access to {instance_name}
  '{config_instance_name}':
    type: gcp:compute:Instance
    name: '{config_instance_name}'
    always_created: true
    description: gcp:compute:Instance resource
    smart_defaults:
      machine_type: '{config_machine_type}'
      zone: '{config_zone}'
      project: '{config_project}'
      boot_disk: {}
      network_interfaces: []
      tags: '{config_computed_network_tags}'
      labels: '{config_resource_labels}'
      allow_stopping_for_update: true
  '{instance_name}-allow-http':
    type: gcp:compute:Firewall
    name: '{instance_name}-allow-http'
    always_created: true
    description: gcp:compute:Firewall resource
    conditional:
      field: enable_http
    smart_defaults:
      name: '{instance_name}-allow-http'
      network: '{config_network}'
      project: '{config_project}'
      source_ranges: '{config_allowed_http_sources}'
      target_tags:
      - http-server
      allows: []
      description: Allow HTTP access to {instance_name}
  '{instance_name}-allow-https':
    type: gcp:compute:Firewall
    name: '{instance_name}-allow-https'
    always_created: true
    description: gcp:compute:Firewall resource
    conditional:
      field: enable_https
    smart_defaults:
      name: '{instance_name}-allow-https'
      network: '{config_network}'
      project: '{config_project}'
      source_ranges: '{config_allowed_http_sources}'
      target_tags:
      - https-server
      allows: []
      description: Allow HTTPS access to {instance_name}
configuration:
  properties:
    resource_labels:
      type: string
      title: Resource Labels
      description: Get resource labels
      group: General Settings
      order: 1
    computed_network_tags:
      type: string
      title: Computed Network Tags
      description: Get computed network tags
      group: General Settings
      order: 2
