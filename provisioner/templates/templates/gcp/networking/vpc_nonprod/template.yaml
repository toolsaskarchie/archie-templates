metadata:
  name: gcp-vpc-nonprod
  title: VPC Network
  description: Complete VPC network for GCP non-production environments with public/private subnets and Cloud NAT.
  category: networking
  version: latest
  author: InnovativeApps
  cloud: gcp
  environment: nonprod
  base_cost: $5/month
  tags:
  - vpc
  - networking
  - gcp
  - nonprod
  - nat
  complexity: intermediate
  deployment_time: 3-5 minutes
  marketplace_group: gcp-vpc-group
  pillars:
  - title: Operational Excellence
    score: excellent
    score_color: '#10b981'
    description: Fully automated VPC provisioning with consistent naming and labeling.
    practices:
    - Infrastructure as Code with Pulumi for repeatable deployments
    - Standardized naming conventions via GCP naming utilities
    - Automated subnet CIDR calculation for consistent addressing
    - Cloud Router and NAT configuration managed as code
    - Configurable firewall rules for operational flexibility
  - title: Security
    score: excellent
    score_color: '#10b981'
    description: Network segmentation with firewall rules and private subnets.
    practices:
    - Public and private subnet isolation for defense in depth
    - Firewall rules scoped to specific protocols and ports
    - Private IP Google Access for secure GCP service connectivity
    - Cloud NAT for private subnet egress without public IPs
    - Custom mode VPC prevents auto-created subnets in all regions
  - title: Reliability
    score: good
    score_color: '#f59e0b'
    description: Regional networking with Cloud NAT for resilient egress.
    practices:
    - Regional VPC network spans all zones in the region
    - Cloud NAT provides managed, highly available egress
    - Cloud Router enables dynamic routing for failover
    - Configurable routing mode (regional or global)
  - title: Performance Efficiency
    score: good
    score_color: '#f59e0b'
    description: Optimized network topology for non-production workloads.
    practices:
    - Subnet isolation separates traffic by tier
    - Cloud NAT auto-scales IP allocation for egress
    - Configurable CIDR ranges for right-sized address space
    - Private Google Access for low-latency GCP API calls
  - title: Cost Optimization
    score: good
    score_color: '#f59e0b'
    description: Minimal networking costs with optional Cloud NAT.
    practices:
    - VPC Network and subnets are free resources in GCP
    - Cloud NAT is optional and can be disabled to save costs
    - Single-region deployment avoids cross-region data transfer
    - No redundant NAT gateways for non-production use
  - title: Sustainability
    score: good
    score_color: '#f59e0b'
    description: Right-sized networking with minimal resource overhead.
    practices:
    - No over-provisioned networking resources
    - Managed Cloud NAT eliminates idle VM-based NAT instances
    - Regional deployment reduces cross-region traffic
    - Google Cloud carbon-neutral infrastructure
  architecture:
    summary: GCP VPC Simple Non-Prod Template - Pattern B Implementation
  action_name: gcp-vpc-nonprod
  tier: template
  use_cases:
  - Development and testing environments
  - Staging infrastructure
  - Non-production workloads
resources:
  vpc_name:
    type: gcp:compute:Network
    name: vpc_name
    always_created: true
    description: Network resource
    smart_defaults:
      project: <project>
      auto_create_subnetworks: false
      routing_mode: REGIONAL
      description: VPC network for {config_project_name}
  public_subnet_name:
    type: gcp:compute:Subnetwork
    name: public_subnet_name
    always_created: true
    description: Subnetwork resource
    smart_defaults:
      network: '{config_id}'
      ip_cidr_range: 10.0.1.0/24
      region: '{config_region}'
      project: <project>
      description: Public subnet for internet-facing resources
  private_subnet_name:
    type: gcp:compute:Subnetwork
    name: private_subnet_name
    always_created: true
    description: Subnetwork resource
    smart_defaults:
      network: '{config_id}'
      ip_cidr_range: 10.0.2.0/24
      region: '{config_region}'
      project: <project>
      private_ip_google_access: true
      description: Private subnet for internal workloads
  '{project_name}-router':
    type: gcp:compute:Router
    name: '{project_name}-router'
    description: Router resource
    conditional:
      field: enable_cloud_nat
    smart_defaults:
      network: '{config_id}'
      region: '{config_region}'
      project: <project>
  '{project_name}-nat':
    type: gcp:compute:RouterNat
    name: '{project_name}-nat'
    description: RouterNat resource
    conditional:
      field: enable_cloud_nat
    smart_defaults:
      router: '{config_name}'
      region: '{config_region}'
      project: <project>
      nat_ip_allocate_option: AUTO_ONLY
      source_subnetwork_ip_ranges_to_nat: ALL_SUBNETWORKS_ALL_IP_RANGES
  rule_name:
    type: gcp:compute:Firewall
    name: rule_name
    always_created: true
    description: Firewall resource
    smart_defaults:
      network: '{config_id}'
      project: <project>
      allows: []
      source_ranges: '{computed}'
      description: 'Firewall rule: '
configuration:
  properties:
    project:
      type: string
      title: Project
      description: Get GCP Project ID with robust lookup.
      group: General Settings
      order: 1
    network_name:
      type: string
      title: Network Name
      default: gcp-vpc-nonprod
      order: 2
    routing_mode:
      type: string
      title: Routing Mode
      description: 'GCP Network routing mode: REGIONAL or GLOBAL.'
      group: General Settings
      order: 3
      default: REGIONAL
    auto_create_subnetworks:
      type: boolean
      title: Auto Create Subnetworks
      description: Whether to auto-create subnetworks, defaults to False for precise control.
      group: Network Configuration
      order: 4
      default: false
    public_subnet_cidr:
      type: string
      title: Public Subnet CIDR
      default: 10.0.1.0/24
      order: 5
    private_subnet_cidr:
      type: string
      title: Private Subnet CIDR
      default: 10.0.2.0/24
      order: 6
    enable_cloud_nat:
      type: boolean
      title: Enable Cloud NAT
      description: Provide internet access to private instances
      default: true
      order: 7
    firewall_rules:
      type: string
      title: Firewall Rules
      description: GCP Firewall rules (equivalent to AWS Security Groups).
      group: General Settings
      order: 8
  required:
  - network_name
