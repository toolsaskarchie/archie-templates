metadata:
  name: aws-ec2-prod
  title: EC2 Instance
  description: Production-ready EC2 infrastructure featuring a high-availability VPC across 3 AZs, enhanced CloudWatch monitoring with automated alarms, and encrypted EBS storage. Optimized for mission-critical workloads.
  category: compute
  version: latest
  author: InnovativeApps
  cloud: aws
  environment: prod
  base_cost: $25/month
  tags:
  - ec2
  - compute
  - production
  - high-availability
  - secure
  features:
  - Enterprise-Grade VPC (3 Availability Zones)
  - Enhanced CloudWatch Monitoring & Performance Alarms
  - Encrypted EBS Volumes with Automated Backups
  - Secure Access via AWS Systems Manager (SSM)
  - Pre-configured Security Group Isolation
  use_cases:
  - Production application servers
  - High-availability web clusters
  - Mission-critical workloads
  deployment_time: 8-12 minutes
  complexity: intermediate
  pillars:
  - title: Operational Excellence
    score: excellent
    score_color: '#10b981'
    description: Full monitoring and automation enables consistent operations
    practices:
    - Infrastructure as Code for repeatable production deployments
    - Enhanced CloudWatch monitoring enabled by default
    - SSM integration for auditable instance management without SSH keys
    - Automated tagging for cost allocation and resource tracking
    - EBS-optimized instances for predictable storage performance
  - title: Security
    score: excellent
    score_color: '#10b981'
    description: Production-grade security controls and encryption
    practices:
    - EBS volumes encrypted by default to protect data at rest
    - Strict security groups restricting traffic to necessary ports
    - IAM instance profiles with least-privilege permissions
    - Private subnet placement options for isolation from internet
    - Detailed CloudWatch monitoring for anomaly detection
  - title: Reliability
    score: excellent
    score_color: '#10b981'
    description: High availability architecture design
    practices:
    - Multi-AZ networking foundation when using new VPC mode
    - EBS optimized instances for consistent storage performance
    - Recovery alarms configured for instance status checks
    - Automated health monitoring via enhanced CloudWatch metrics
    - GP3 volumes with consistent baseline IOPS for reliability
  - title: Performance Efficiency
    score: good
    score_color: '#f59e0b'
    description: Optimized compute and networking configuration
    practices:
    - Latest generation instance types (t3/m5) for best price/performance
    - GP3 volumes for predictable storage throughput
    - EBS optimization enabled for dedicated storage bandwidth
    - Configurable instance sizing to match workload requirements
    - VPC tier-based security groups for efficient network routing
  - title: Cost Optimization
    score: good
    score_color: '#f59e0b'
    description: Balances performance needs with cost controls
    practices:
    - Right-sized default instance types to avoid over-provisioning
    - GP3 volumes offer better value than legacy GP2
    - Detailed cost allocation tagging for chargeback visibility
    - SSM eliminates need for bastion hosts saving compute costs
    - Configurable VPC mode to reuse existing networking infrastructure
  - title: Sustainability
    score: good
    score_color: '#f59e0b'
    description: Efficient resource usage reduces environmental impact
    practices:
    - Modern instance generations provide better performance per watt
    - Shared resources (NAT Gateway) reduce infrastructure overhead
    - GP3 volumes eliminate need for over-provisioning for IOPS
    - Right-sizing guidance reduces unnecessary compute waste
    - Encrypted EBS with efficient storage types minimizes footprint
  architecture:
    summary: EC2 Production Template
  action_name: aws-ec2-prod
  tier: template
resources:
  ec2-{preset}-{project}-{environment}-{region_short}:
    type: aws:ec2:Instance
    name: ec2-{preset}-{project}-{environment}-{region_short}
    always_created: true
    description: Instance resource
    smart_defaults:
      ami: '{config_id}'
      instance_type: t3.medium
      subnet_id: ''
      vpc_security_group_ids: '{base_security_groups}'
      iam_instance_profile: '{config_name}'
      key_name: ''
      user_data: ''
      tags:
        Name: '{instance_name}'
      monitoring: true
      ebs_optimized: true
      root_block_device:
        encrypted: true
        volume_size: 20
        volume_type: gp3
  role-{service}-{project}-{environment}-{region_short}:
    type: aws:iam:Role
    name: role-{service}-{project}-{environment}-{region_short}
    description: Role resource
    conditional:
      field: enable_ssm
    smart_defaults:
      assume_role_policy: '{json_config}'
      managed_policy_arns:
      - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      tags:
        Name: '{role_name}'
  '{namer_iam_profile}':
    type: aws:iam:InstanceProfile
    name: '{namer_iam_profile}'
    description: InstanceProfile resource
    conditional:
      field: enable_ssm
    smart_defaults:
      role: '{config_name}'
      tags:
        Name: '{profile_name}'
  '{project_name}-ssh':
    type: aws:ec2:SecurityGroup
    name: '{project_name}-ssh'
    description: SSH access for {instance_name}
    conditional:
      field: ssh_access_ip
    smart_defaults:
      vpc_id: ''
      description: SSH access for {instance_name}
      ingress: '{access_sg_ingress}'
      egress:
      - protocol: '-1'
        from_port: 0
        to_port: 0
        cidr_blocks:
        - 0.0.0.0/0
      tags:
        Name: '{sg_name}'
  '{project_name}-ssh-rule-{idx}':
    type: aws:ec2:SecurityGroupRule
    name: '{project_name}-ssh-rule-{idx}'
    always_created: true
    description: SecurityGroupRule resource
    smart_defaults:
      type: ingress
      security_group_id: '{access_sg_id}'
      protocol: tcp
      from_port: 22
      to_port: 22
      cidr_blocks:
      - '{cidr_ip}'
      description: SSH from {cidr_ip}
  vpc-{project}-{environment}-{region_short}-{network_num}:
    type: aws:ec2:Vpc
    name: vpc-{project}-{environment}-{region_short}-{network_num}
    always_created: true
    description: Virtual Private Cloud with CIDR {cidr_block}, DNS support enabled
    smart_defaults:
      cidr_block: '{cidr_block}'
      enable_dns_support: '{computed}'
      enable_dns_hostnames: '{computed}'
      instance_tenancy: '{computed}'
      tags:
        Name: '{vpc_resource_name}'
        Project: '{project_name}'
        Environment: prod
        ManagedBy: Archie
  igw-main-{project}-{environment}-{region_short}:
    type: aws:ec2:InternetGateway
    name: igw-main-{project}-{environment}-{region_short}
    always_created: true
    description: Internet Gateway providing public internet connectivity for the VPC
    smart_defaults:
      vpc_id: '{config_id}'
      tags:
        Name: '{igw_name}'
        Project: '{project_name}'
        Environment: prod
  rt-public-{project}-{environment}-{region_short}:
    type: aws:ec2:RouteTable
    name: rt-public-{project}-{environment}-{region_short}
    always_created: true
    description: Route table for public tier network traffic routing
    smart_defaults:
      vpc_id: '{config_id}'
      tags:
        Name: '{public_rt_name}'
        Project: '{project_name}'
        Environment: prod
        Tier: public
  vpce-s3-{project}-{environment}-{region_short}-gw:
    type: aws:ec2:VpcEndpoint
    name: vpce-s3-{project}-{environment}-{region_short}-gw
    always_created: true
    description: S3 Gateway VPC Endpoint for private S3 service access
    smart_defaults:
      vpc_id: '{config_id}'
      service_name: com.amazonaws.{region}.s3
      vpc_endpoint_type: Gateway
      route_table_ids: '{endpoint_rt_ids}'
      tags:
        Name: '{s3_name}'
        Project: '{project_name}'
        Environment: prod
  vpce-dynamodb-{project}-{environment}-{region_short}-gw:
    type: aws:ec2:VpcEndpoint
    name: vpce-dynamodb-{project}-{environment}-{region_short}-gw
    always_created: true
    description: DYNAMODB Gateway VPC Endpoint for private DYNAMODB service access
    smart_defaults:
      vpc_id: '{config_id}'
      service_name: com.amazonaws.{region}.dynamodb
      vpc_endpoint_type: Gateway
      route_table_ids: '{endpoint_rt_ids}'
      tags:
        Name: '{ddb_name}'
        Project: '{project_name}'
        Environment: prod
  secg-web-{project}-{environment}-{region_short}:
    type: aws:ec2:SecurityGroup
    name: secg-web-{project}-{environment}-{region_short}
    always_created: true
    description: Security group for web tier - allows HTTP/HTTPS traffic
    smart_defaults:
      vpc_id: '{config_id}'
      description: Security group for web tier - allows HTTP/HTTPS traffic
      ingress:
      - protocol: tcp
        from_port: 80
        to_port: 80
        cidr_blocks:
        - 0.0.0.0/0
      - protocol: tcp
        from_port: 443
        to_port: 443
        cidr_blocks:
        - 0.0.0.0/0
      egress:
      - protocol: '-1'
        from_port: 0
        to_port: 0
        cidr_blocks:
        - 0.0.0.0/0
      tags:
        Name: '{web_sg_name}'
        Project: '{project_name}'
        Environment: prod
        Tier: web
        ManagedBy: Archie
  secg-app-{project}-{environment}-{region_short}:
    type: aws:ec2:SecurityGroup
    name: secg-app-{project}-{environment}-{region_short}
    always_created: true
    description: Security group for application tier
    smart_defaults:
      vpc_id: '{config_id}'
      description: Security group for application tier
      egress:
      - protocol: '-1'
        from_port: 0
        to_port: 0
        cidr_blocks:
        - 0.0.0.0/0
      tags:
        Name: '{app_sg_name}'
        Project: '{project_name}'
        Environment: prod
        Tier: app
        ManagedBy: Archie
  secg-db-{project}-{environment}-{region_short}:
    type: aws:ec2:SecurityGroup
    name: secg-db-{project}-{environment}-{region_short}
    always_created: true
    description: Security group for database tier
    smart_defaults:
      vpc_id: '{config_id}'
      description: Security group for database tier
      egress:
      - protocol: '-1'
        from_port: 0
        to_port: 0
        cidr_blocks:
        - 0.0.0.0/0
      tags:
        Name: '{db_sg_name}'
        Project: '{project_name}'
        Environment: prod
        Tier: db
        ManagedBy: Archie
  secg-access-{project}-{environment}-{region_short}:
    type: aws:ec2:SecurityGroup
    name: secg-access-{project}-{environment}-{region_short}
    always_created: true
    description: Security group for SSH/RDP access
    smart_defaults:
      vpc_id: '{config_id}'
      description: Security group for SSH/RDP access
      ingress: '{access_sg_ingress}'
      egress:
      - protocol: '-1'
        from_port: 0
        to_port: 0
        cidr_blocks:
        - 0.0.0.0/0
      tags:
        Name: '{access_sg_name}'
        Project: '{project_name}'
        Environment: prod
        Tier: access
        ManagedBy: Archie
  route-00000-{project}-{environment}-{region_short}-igw:
    type: aws:ec2:Route
    name: route-00000-{project}-{environment}-{region_short}-igw
    always_created: true
    description: Route directing 0.0.0.0/0 traffic to Internet Gateway
    smart_defaults:
      route_table_id: '{config_id}'
      destination_cidr_block: 0.0.0.0/0
      gateway_id: '{config_id}'
  rt-private-{project}-{environment}-{region_short}-1:
    type: aws:ec2:RouteTable
    name: rt-private-{project}-{environment}-{region_short}-1
    always_created: true
    description: Route table for private tier network traffic routing
    smart_defaults:
      vpc_id: '{config_id}'
      tags:
        Name: '{priv_rt_name}'
        Project: '{project_name}'
        Environment: prod
        Tier: private
        AZ: '{az}'
  rt-private-{project}-{environment}-{region_short}-2:
    type: aws:ec2:RouteTable
    name: rt-private-{project}-{environment}-{region_short}-2
    always_created: true
    description: Route table for private tier network traffic routing
    smart_defaults:
      vpc_id: '{config_id}'
      tags:
        Name: '{priv_rt_name}'
        Project: '{project_name}'
        Environment: prod
        Tier: private
        AZ: '{az}'
  rt-private-{project}-{environment}-{region_short}-3:
    type: aws:ec2:RouteTable
    name: rt-private-{project}-{environment}-{region_short}-3
    always_created: true
    description: Route table for private tier network traffic routing
    smart_defaults:
      vpc_id: '{config_id}'
      tags:
        Name: '{priv_rt_name}'
        Project: '{project_name}'
        Environment: prod
        Tier: private
        AZ: '{az}'
  pubsub-{project}-{environment}-{region_short}-{az_short}-{subnet_num}-1:
    type: aws:ec2:Subnet
    name: pubsub-{project}-{environment}-{region_short}-{az_short}-{subnet_num}-1
    always_created: true
    description: 'Public subnet for public tier workloads (CIDR: {pub_cidr})'
    smart_defaults:
      vpc_id: '{config_id}'
      cidr_block: '{pub_cidr}'
      availability_zone: '{az}'
      map_public_ip_on_launch: true
      tags:
        Name: '{pub_sub_name}'
        Project: '{project_name}'
        Environment: prod
        Tier: public
        AZ: '{az}'
  pubsub-{project}-{environment}-{region_short}-{az_short}-{subnet_num}-2:
    type: aws:ec2:Subnet
    name: pubsub-{project}-{environment}-{region_short}-{az_short}-{subnet_num}-2
    always_created: true
    description: 'Public subnet for public tier workloads (CIDR: {pub_cidr})'
    smart_defaults:
      vpc_id: '{config_id}'
      cidr_block: '{pub_cidr}'
      availability_zone: '{az}'
      map_public_ip_on_launch: true
      tags:
        Name: '{pub_sub_name}'
        Project: '{project_name}'
        Environment: prod
        Tier: public
        AZ: '{az}'
  pubsub-{project}-{environment}-{region_short}-{az_short}-{subnet_num}-3:
    type: aws:ec2:Subnet
    name: pubsub-{project}-{environment}-{region_short}-{az_short}-{subnet_num}-3
    always_created: true
    description: 'Public subnet for public tier workloads (CIDR: {pub_cidr})'
    smart_defaults:
      vpc_id: '{config_id}'
      cidr_block: '{pub_cidr}'
      availability_zone: '{az}'
      map_public_ip_on_launch: true
      tags:
        Name: '{pub_sub_name}'
        Project: '{project_name}'
        Environment: prod
        Tier: public
        AZ: '{az}'
  privsub-{project}-{environment}-{region_short}-{az_short}-{subnet_num}-1:
    type: aws:ec2:Subnet
    name: privsub-{project}-{environment}-{region_short}-{az_short}-{subnet_num}-1
    always_created: true
    description: 'Private subnet for private tier workloads (CIDR: {priv_cidr})'
    smart_defaults:
      vpc_id: '{config_id}'
      cidr_block: '{priv_cidr}'
      availability_zone: '{az}'
      map_public_ip_on_launch: false
      tags:
        Name: '{priv_sub_name}'
        Project: '{project_name}'
        Environment: prod
        Tier: private
        AZ: '{az}'
  privsub-{project}-{environment}-{region_short}-{az_short}-{subnet_num}-2:
    type: aws:ec2:Subnet
    name: privsub-{project}-{environment}-{region_short}-{az_short}-{subnet_num}-2
    always_created: true
    description: 'Private subnet for private tier workloads (CIDR: {priv_cidr})'
    smart_defaults:
      vpc_id: '{config_id}'
      cidr_block: '{priv_cidr}'
      availability_zone: '{az}'
      map_public_ip_on_launch: false
      tags:
        Name: '{priv_sub_name}'
        Project: '{project_name}'
        Environment: prod
        Tier: private
        AZ: '{az}'
  privsub-{project}-{environment}-{region_short}-{az_short}-{subnet_num}-3:
    type: aws:ec2:Subnet
    name: privsub-{project}-{environment}-{region_short}-{az_short}-{subnet_num}-3
    always_created: true
    description: 'Private subnet for private tier workloads (CIDR: {priv_cidr})'
    smart_defaults:
      vpc_id: '{config_id}'
