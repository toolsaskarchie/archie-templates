metadata:
  name: aws-aurora-nonprod
  title: Aurora PostgreSQL Cluster
  description: Cost-optimized Aurora PostgreSQL cluster for development and staging with serverless scaling and automated failover.
  category: database
  version: latest
  author: InnovativeApps
  cloud: aws
  environment: nonprod
  base_cost: $30/month
  features:
  - Serverless v2 scaling support for variable workloads
  - Managed Aurora cluster with automated failover
  - Optional read replicas for load distribution
  - Automated password rotation via AWS Secrets Manager
  - Automated backups with configurable retention
  tags:
  - aws
  - database
  - aurora
  - postgresql
  - mysql
  - nonprod
  - cost-optimized
  deployment_time: 15-20 minutes
  complexity: advanced
  pillars:
  - title: Security
    score: excellent
    score_color: '#10b981'
    description: Enterprise-grade security with encryption, VPC isolation, and secrets management
    practices:
    - Storage encryption at rest enabled by default
    - VPC isolation with dedicated database-tier security groups
    - Password stored and managed via AWS Secrets Manager
    - Private subnet placement prevents public internet exposure
    - SSL/TLS encryption for all client connections in transit
  - title: Reliability
    score: excellent
    score_color: '#10b981'
    description: Aurora's distributed storage engine with automated failover and continuous backups
    practices:
    - Aurora storage replicates data 6 ways across 3 AZs automatically
    - Multi-AZ cluster option with automatic failover under 30 seconds
    - Continuous backups to S3 with point-in-time recovery
    - Global database support for cross-region disaster recovery
    - Automated minor version upgrades for stability patches
  - title: Operational Excellence
    score: good
    score_color: '#f59e0b'
    description: Fully managed cluster with monitoring and automated maintenance
    practices:
    - Infrastructure as Code with Pulumi for repeatable deployments
    - CloudWatch metrics for cluster and instance-level monitoring
    - Optional Performance Insights for query-level diagnostics
    - Automated maintenance windows for patching and upgrades
    - Cluster parameter groups for engine-level tuning
  - title: Performance Efficiency
    score: excellent
    score_color: '#10b981'
    description: Aurora's purpose-built storage engine delivers up to 5x PostgreSQL throughput
    practices:
    - Aurora storage engine provides up to 5x throughput over standard PostgreSQL
    - Serverless v2 scaling adjusts capacity in fine-grained increments
    - Read replicas share the same storage volume with minimal lag
    - Configurable instance types from db.t3 to db.r6g families
    - Parallel query for complex analytical workloads
  - title: Cost Optimization
    score: good
    score_color: '#f59e0b'
    description: Cost-optimized for nonprod with serverless scaling and right-sizing options
    practices:
    - Serverless v2 scales to zero ACUs during idle periods
    - Burstable db.t3 instances for variable development workloads
    - Single-instance default reduces costs for nonprod environments
    - Short backup retention minimizes storage costs
    - Reserved instance pricing available for predictable usage
  - title: Sustainability
    score: good
    score_color: '#f59e0b'
    description: Efficient managed service with serverless scaling and shared storage architecture
    practices:
    - Serverless scaling matches resource consumption to actual demand
    - Graviton-based db.r6g instances available for energy efficiency
    - Shared storage volume eliminates per-replica storage duplication
    - Managed service eliminates idle infrastructure overhead
    - Regional deployment minimizes cross-region data transfer
  architecture:
    summary: Aurora Non-Production Template
  action_name: aws-aurora-nonprod
  tier: template
  use_cases:
  - Development and testing environments
  - Staging infrastructure
  - Non-production workloads
resources:
  '{project_name}-aurora-ingress':
    type: aws:ec2:SecurityGroupRule
    name: '{project_name}-aurora-ingress'
    always_created: true
    description: SecurityGroupRule resource
    smart_defaults:
      type: ingress
      security_group_id: '{config_id}'
      protocol: tcp
      from_port: '{config_port}'
      to_port: '{config_port}'
      cidr_blocks: '{config_allowed_cidr_blocks}'
      description: Aurora access for {db_identifier} ({config_environment})
  '{project_name}-password':
    type: aws:secretsmanager:Secret
    name: '{project_name}-password'
    always_created: true
    description: Secret resource
    smart_defaults:
      name: secret-db-{config_project}-password-nonprod-{config_region_short}
      description: Master password for {db_identifier}
      recovery_window_in_days: 7
      tags: '{tags}'
  '{project_name}-password-version':
    type: aws:secretsmanager:SecretVersion
    name: '{project_name}-password-version'
    always_created: true
    description: SecretVersion resource
    smart_defaults:
      secret_id: '{config_id}'
      secret_string: '{computed}'
  '{namer_rds}':
    type: aws:rds:Cluster
    name: '{namer_rds}'
    always_created: true
    description: Cluster resource
    smart_defaults:
      engine: '{config_engine}'
      engine_version: '{config_engine_version}'
      cluster_identifier: '{namer_rds}'
      master_username: '{config_db_username}'
      master_password: '{db_password}'
      database_name: '{config_db_name}'
      port: '{config_port}'
      db_subnet_group_name: '{config_name}'
      vpc_security_group_ids:
      - '{sg_id}'
      backup_retention_period: '{config_backup_retention_days}'
      storage_encrypted: '{config_storage_encrypted}'
      availability_zones: '{availability_zones}'
      deletion_protection: '{config_deletion_protection_enabled}'
      skip_final_snapshot: '{config_skip_final_snapshot}'
      tags:
        Name: '{db_identifier}'
  secg-db-{project}-{environment}-{region_short}:
    type: aws:ec2:SecurityGroup
    name: secg-db-{project}-{environment}-{region_short}
    always_created: true
    description: Security group for database tier
    smart_defaults:
      vpc_id: '{config_id}'
      description: Security group for database tier
      ingress:
      - protocol: tcp
        from_port: 3306
        to_port: 3306
        security_groups:
        - '{security_group_app}'
        description: MySQL from app tier
      - protocol: tcp
        from_port: 5432
        to_port: 5432
        security_groups:
        - '{security_group_app}'
        description: PostgreSQL from app tier
      - protocol: tcp
        from_port: 1433
        to_port: 1433
        security_groups:
        - '{security_group_app}'
        description: SQL Server from app tier
      egress:
      - protocol: '-1'
        from_port: 0
        to_port: 0
        cidr_blocks:
        - 0.0.0.0/0
        description: Allow all outbound
  sng-db-{config_project}-main-nonprod-{config_region_short}:
    type: aws:rds:SubnetGroup
    name: sng-db-{config_project}-main-nonprod-{config_region_short}
    always_created: true
    description: SubnetGroup resource
    smart_defaults:
      subnet_ids: '{config_subnet_ids}'
      description: Subnet group for {db_identifier}
      tags:
        Name: '{sng_name}'
  '{db_identifier}-instance-':
    type: aws:rds:ClusterInstance
    name: '{db_identifier}-instance-'
    always_created: true
    description: ClusterInstance resource
    smart_defaults:
      identifier: '{db_identifier}-instance-'
      cluster_identifier: '{config_id}'
      instance_class: '{config_instance_class}'
      engine: '{config_engine}'
      engine_version: '{config_engine_version}'
      publicly_accessible: '{config_publicly_accessible}'
      performance_insights_enabled: '{config_enable_performance_insights}'
      tags:
        Name: '{instance_identifier}'
  vpc-{project}-{environment}-{region_short}-{network_num}:
    type: aws:ec2:Vpc
    name: vpc-{project}-{environment}-{region_short}-{network_num}
    always_created: true
    description: Virtual Private Cloud with CIDR {config_custom_cidr_block}, DNS support enabled
    smart_defaults:
      cidr_block: 10.0.0.0/16
      enable_dns_support: true
      enable_dns_hostnames: true
      instance_tenancy: '{config_instance_tenancy}'
      tags:
        Name: '{vpc_name}'
  igw-main-{project}-{environment}-{region_short}:
    type: aws:ec2:InternetGateway
    name: igw-main-{project}-{environment}-{region_short}
    always_created: true
    description: Internet Gateway providing public internet connectivity for the VPC
    smart_defaults:
      vpc_id: '{config_id}'
      tags:
        Name: '{igw_name}'
  rt-public-{project}-{environment}-{region_short}:
    type: aws:ec2:RouteTable
    name: rt-public-{project}-{environment}-{region_short}
    always_created: true
    description: Route table for public tier network traffic routing
    smart_defaults:
      vpc_id: '{config_id}'
      tags:
        Name: '{public_rt_name}'
        Tier: public
  rt-private-{project}-{environment}-{region_short}:
    type: aws:ec2:RouteTable
    name: rt-private-{project}-{environment}-{region_short}
    always_created: true
    description: Route table for private tier network traffic routing
    smart_defaults:
      vpc_id: '{config_id}'
      tags:
        Name: '{private_rt_name}'
        Tier: private
  vpce-s3-{project}-{environment}-{region_short}-gw:
    type: aws:ec2:VpcEndpoint
    name: vpce-s3-{project}-{environment}-{region_short}-gw
    always_created: true
    description: S3 Gateway VPC Endpoint for private S3 service access
    smart_defaults:
      vpc_id: '{config_id}'
      service_name: com.amazonaws.{config_region}.s3
      vpc_endpoint_type: Gateway
      tags:
        Name: '{s3_endpoint_name}'
  vpce-dynamodb-{project}-{environment}-{region_short}-gw:
    type: aws:ec2:VpcEndpoint
    name: vpce-dynamodb-{project}-{environment}-{region_short}-gw
    always_created: true
    description: DYNAMODB Gateway VPC Endpoint for private DYNAMODB service access
    smart_defaults:
      vpc_id: '{config_id}'
      service_name: com.amazonaws.{config_region}.dynamodb
      vpc_endpoint_type: Gateway
      tags:
        Name: '{dynamodb_endpoint_name}'
  secg-web-{project}-{environment}-{region_short}:
    type: aws:ec2:SecurityGroup
    name: secg-web-{project}-{environment}-{region_short}
    always_created: true
    description: Security group for web tier (HTTP/HTTPS)
    smart_defaults:
      vpc_id: '{config_id}'
      description: Security group for web tier (HTTP/HTTPS)
      ingress:
      - protocol: tcp
        from_port: 80
        to_port: 80
        cidr_blocks:
        - 0.0.0.0/0
        description: HTTP from internet
      - protocol: tcp
        from_port: 443
        to_port: 443
        cidr_blocks:
        - 0.0.0.0/0
        description: HTTPS from internet
      egress:
      - protocol: '-1'
        from_port: 0
        to_port: 0
        cidr_blocks:
        - 0.0.0.0/0
        description: Allow all outbound
      tags:
        Name: '{web_sg_name}'
        Tier: web
  secg-app-{project}-{environment}-{region_short}:
    type: aws:ec2:SecurityGroup
    name: secg-app-{project}-{environment}-{region_short}
    always_created: true
    description: Security group for application tier
    smart_defaults:
      vpc_id: '{config_id}'
      description: Security group for application tier
      ingress:
      - protocol: tcp
        from_port: 3000
        to_port: 3000
        security_groups:
        - '{security_group_web}'
        description: App traffic from web tier
      - protocol: tcp
        from_port: 8080
        to_port: 8080
        security_groups:
        - '{security_group_web}'
        description: Alt app port from web tier
      egress:
      - protocol: '-1'
        from_port: 0
        to_port: 0
        cidr_blocks:
        - 0.0.0.0/0
        description: Allow all outbound
      tags:
        Name: '{app_sg_name}'
        Tier: app
  pubsub-{project}-{environment}-{region_short}-{az_short}-{subnet_num}:
    type: aws:ec2:Subnet
    name: pubsub-{project}-{environment}-{region_short}-{az_short}-{subnet_num}
    always_created: true
    description: 'Public subnet for public tier workloads (CIDR: {public_cidr})'
    smart_defaults:
      vpc_id: '{config_id}'
      cidr_block: '{public_cidr}'
      availability_zone: '{config_region}a'
      map_public_ip_on_launch: true
      tags:
        Name: '{public_subnet_name}'
        Tier: public
  privsub-{project}-{environment}-{region_short}-{az_short}-{subnet_num}:
    type: aws:ec2:Subnet
    name: privsub-{project}-{environment}-{region_short}-{az_short}-{subnet_num}
    always_created: true
    description: 'Private subnet for private tier workloads (CIDR: {private_cidr})'
    smart_defaults:
      vpc_id: '{config_id}'
      cidr_block: '{private_cidr}'
      availability_zone: '{config_region}a'
      map_public_ip_on_launch: false
      tags:
        Name: '{private_subnet_name}'
        Tier: private
  route-00000-{project}-{environment}-{region_short}-igw:
    type: aws:ec2:Route
    name: route-00000-{project}-{environment}-{region_short}-igw
    always_created: true
    description: Route directing 0.0.0.0/0 traffic to Internet Gateway
    smart_defaults:
      route_table_id: '{id}'
      destination_cidr_block: 0.0.0.0/0
      gateway_id: '{config_id}'
  rta-public-{project}-{environment}-{region_short}-1:
    type: aws:ec2:RouteTableAssociation
    name: rta-public-{project}-{environment}-{region_short}-1
    always_created: true
    description: Associates a route table with a subnet for traffic routing
    smart_defaults:
      subnet_id: '{id}'
      route_table_id: '{id}'
  rta-private-{project}-{environment}-{region_short}-1:
    type: aws:ec2:RouteTableAssociation
    name: rta-private-{project}-{environment}-{region_short}-1
    always_created: true
    description: Associates a route table with a subnet for traffic routing
    smart_defaults:
      subnet_id: '{id}'
      route_table_id: '{id}'
  rt-isolated-{project}-{environment}-{region_short}:
    type: aws:ec2:RouteTable
    name: rt-isolated-{project}-{environment}-{region_short}
    description: Route table for isolated tier network traffic routing
    conditional:
      field: enable_isolated_tier
    smart_defaults:
      vpc_id: '{config_id}'
      tags:
        Name: '{isolated_rt_name}'
        Tier: isolated
  secg-access-{project}-{environment}-{region_short}:
    type: aws:ec2:SecurityGroup
    name: secg-access-{project}-{environment}-{region_short}
    description: Management access security group (SSH/RDP)
    conditional:
      field: enable_ssh
    smart_defaults:
      vpc_id: '{config_id}'
      description: Management access security group (SSH/RDP)
      ingress: '{access_sg_ingress}'
      egress:
      - protocol: '-1'
        from_port: 0
        to_port: 0
        cidr_blocks:
        - 0.0.0.0/0
        description: Allow all outbound
      tags:
        Name: '{access_sg_name}'
        Tier: management
  isolatedsub-{project}-{environment}-{region_short}-{az_short}-{subnet_num}:
    type: aws:ec2:Subnet
    name: isolatedsub-{project}-{environment}-{region_short}-{az_short}-{subnet_num}
    description: 'Private subnet for isolated tier workloads (CIDR: {isolated_cidr})'
    conditional:
      field: enable_isolated_tier
    smart_defaults:
      vpc_id: '{config_id}'
      cidr_block: '{isolated_cidr}'
      availability_zone: '{config_region}a'
      map_public_ip_on_launch: false
      tags:
        Name: '{isolated_subnet_name}'
        Tier: isolated
  eip-{purpose}-{project}-{environment}-{region_short}-{az_short}:
    type: aws:ec2:Eip
    name: eip-{purpose}-{project}-{environment}-{region_short}-{az_short}
    description: Elastic IP address for NAT Gateway attachment
    conditional:
      field: enable_nat_gateway
    smart_defaults:
      domain: vpc
      tags:
        Name: '{eip_name}'
  nat-gw-{project}-{environment}-{region_short}-{az_short}:
    type: aws:ec2:NatGateway
    name: nat-gw-{project}-{environment}-{region_short}-{az_short}
    description: NAT Gateway providing outbound internet access for private subnets
    conditional:
      field: enable_nat_gateway
    smart_defaults:
      subnet_id: '{id}'
      allocation_id: '{id}'
      tags:
        Name: '{nat_name}'
  route-00000-{project}-{environment}-{region_short}-nat:
    type: aws:ec2:Route
    name: route-00000-{project}-{environment}-{region_short}-nat
    always_created: true
    description: Route directing 0.0.0.0/0 traffic to NAT Gateway
    smart_defaults:
      route_table_id: '{id}'
      destination_cidr_block: 0.0.0.0/0
      nat_gateway_id: '{config_id}'
  rta-isolated-{project}-{environment}-{region_short}-1:
    type: aws:ec2:RouteTableAssociation
    name: rta-isolated-{project}-{environment}-{region_short}-1
    description: Associates a route table with a subnet for traffic routing
    conditional:
      field: enable_isolated_tier
    smart_defaults:
      subnet_id: '{id}'
      route_table_id: '{id}'
  vpce-rds-{project}-{environment}-{region_short}-if:
    type: aws:ec2:VpcEndpoint
    name: vpce-rds-{project}-{environment}-{region_short}-if
    description: RDS Interface VPC Endpoint for private RDS service access
    conditional:
      field: enable_rds_endpoint
    smart_defaults:
      vpc_id: '{config_id}'
      service_name: com.amazonaws.{config_region}.rds
      vpc_endpoint_type: Interface
      subnet_ids:
      - '{id}'
      security_group_ids:
      - '{id}'
      private_dns_enabled: true
      tags:
        Name: '{rds_endpoint_name}'
  vpce-ssm-{project}-{environment}-{region_short}-if:
    type: aws:ec2:VpcEndpoint
    name: vpce-ssm-{project}-{environment}-{region_short}-if
    description: SSM Interface VPC Endpoint for private SSM service access
    conditional:
      field: enable_ssm_endpoints
    smart_defaults:
      vpc_id: '{config_id}'
      service_name: com.amazonaws.{config_region}.ssm
      vpc_endpoint_type: Interface
      subnet_ids:
      - '{id}'
      private_dns_enabled: true
      tags:
        Name: '{ssm_endpoint_name}'
  vpce-ssmmessages-{project}-{environment}-{region_short}-if:
    type: aws:ec2:VpcEndpoint
    name: vpce-ssmmessages-{project}-{environment}-{region_short}-if
    description: SSMMESSAGES Interface VPC Endpoint for private SSMMESSAGES service access
    conditional:
      field: enable_ssm_endpoints
    smart_defaults:
      vpc_id: '{config_id}'
      service_name: com.amazonaws.{config_region}.ssmmessages
      vpc_endpoint_type: Interface
      subnet_ids:
      - '{id}'
      private_dns_enabled: true
      tags:
        Name: '{ssm_messages_endpoint_name}'
  vpce-ec2messages-{project}-{environment}-{region_short}-if:
    type: aws:ec2:VpcEndpoint
    name: vpce-ec2messages-{project}-{environment}-{region_short}-if
    description: EC2MESSAGES Interface VPC Endpoint for private EC2MESSAGES service access
    conditional:
      field: enable_ssm_endpoints
    smart_defaults:
      vpc_id: '{config_id}'
      service_name: com.amazonaws.{config_region}.ec2messages
      vpc_endpoint_type: Interface
      subnet_ids:
      - '{id}'
      private_dns_enabled: true
      tags:
        Name: '{ec2_messages_endpoint_name}'
  s3-{purpose}-{project}-{environment}-{region_short}:
    type: aws:s3:Bucket
    name: s3-{purpose}-{project}-{environment}-{region_short}
    description: S3 bucket for VPC Flow Logs storage
    conditional:
      field: enable_flow_logs
    smart_defaults:
      bucket: '{bucket_name}'
      force_destroy: true
      tags:
        Name: '{bucket_name}'
        Purpose: VPC Flow Logs
  '{bucket_name}-lifecycle':
    type: aws:s3:BucketLifecycleConfigurationV2
    name: '{bucket_name}-lifecycle'
    description: S3 bucket lifecycle rules for automatic log retention and deletion
    conditional:
      field: enable_flow_logs
    smart_defaults:
      bucket: '{config_id}'
      rules:
      - id: delete-old-flow-logs
        status: Enabled
  fl-{scope}-{project}-{environment}-{region_short}-{traffic}:
    type: aws:ec2:FlowLog
    name: fl-{scope}-{project}-{environment}-{region_short}-{traffic}
    description: VPC Flow Logs capturing ALL network traffic to S3
    conditional:
      field: enable_flow_logs
    smart_defaults:
      vpc_id: '{config_id}'
      traffic_type: ALL
      log_destination_type: s3
      log_destination: '{computed}'
      max_aggregation_interval: 600
      tags:
        Name: '{flow_log_name}'
configuration:
  properties:
    use_custom_cidr:
      type: boolean
      default: false
      title: Use Custom CIDR
      description: Enable to specify a custom IPv4 CIDR block for the VPC
      order: 10
      group: Network Configuration
      cost_impact: $0/month
    custom_cidr_block:
      type: string
      default: 10.0.0.0/16
      title: Custom CIDR Block
      description: Specify custom IPv4 CIDR block (e.g., 10.0.0.0/16, 172.16.0.0/16, 192.168.0.0/16)
      order: 11
      group: Network Configuration
      conditional:
        field: use_custom_cidr
    enable_dns_support:
      type: boolean
      default: true
      title: Enable DNS Support
      description: Enable DNS resolution in the VPC
      order: 12
      group: Network Configuration
    enable_dns_hostnames:
      type: boolean
      default: true
      title: Enable DNS Hostnames
      description: Enable DNS hostnames for instances
      order: 13
      group: Network Configuration
    enable_ssh_access:
      type: boolean
      default: false
      title: Enable SSH Security Group
      description: Traditional SSH/RDP key-based access (alternative to SSM Session Manager)
      architecture_decision: true
      smart_default_enabled: false
      foundation: true
      section: Security & Access
      order: 102
      group: Architecture Decisions
      cost_impact: +$0/month
    ssh_access_ip:
      type: string
      title: Admin Access IP (SSH/RDP)
      description: IP address or CIDR block (required for advanced mode)
      placeholder: e.g. 203.0.113.25/32
      group: Security & Connectivity
      visibleIf:
        ssh_mode: enabled
      isEssential: true
      order: 161
    enable_nat_gateway:
      type: boolean
      default: true
      title: Enable NAT Gateway
      description: Provides outbound internet access for private subnets via NAT Gateway
      architecture_decision: true
      smart_default_enabled: true
      foundation: true
      section: Internet Access
      order: 101
      group: Architecture Decisions
      cost_impact: +$32/month
    enable_isolated_tier:
      type: boolean
      default: false
      title: Enable Isolated Tier
      description: Additional database subnet tier with no internet access for maximum security
      architecture_decision: true
      smart_default_enabled: false
      foundation: true
      section: Network Segmentation
      order: 103
      group: Architecture Decisions
      cost_impact: +$0/month
    enable_flow_logs:
      type: boolean
      title: Enable Flow Logs
      description: Capture IP traffic information
      default: true
      group: Observability
      isEssential: true
      order: 201
    flow_log_retention:
      type: number
      title: Log Retention (Days)
      description: How long to keep flow logs
      default: 7
      group: Observability
      visibleIf:
        enable_flow_logs: true
      order: 203
    enable_rds_endpoint:
      type: boolean
      default: false
      title: Enable RDS VPC Endpoint
      description: Private interface endpoint for secure RDS API access without traversing internet
      architecture_decision: true
      smart_default_enabled: false
      foundation: false
      section: VPC Endpoints
      order: 105
      group: Architecture Decisions
      cost_impact: +$14/month
    enable_ssm_endpoints:
      type: boolean
      title: Enable SSM Endpoints
      description: Interface Endpoints for secure management
      default: true
      help_text: Required for secure instance access without SSH/IGW.
      group: Security & Connectivity
      isEssential: true
      order: 171
    db_header:
      type: separator
      title: Database Configuration
      group: Database Settings
      isEssential: true
      order: 80
    dbName:
      type: string
      title: Database Name
      description: Primary database name
      default: mydb
      group: Database Settings
      isEssential: true
      order: 81
    dbUsername:
      type: string
      title: Master Username
      description: Database administrator username
      default: admin
      group: Database Settings
      isEssential: true
      order: 82
    engineVersion:
      type: string
      title: Engine Version
      description: Version of aurora-postgresql
      default: '8.0'
      group: Database Settings
      order: 83
    instanceClass:
      type: string
      title: Instance Class
      description: Compute and memory capacity
      default: db.t3.micro
      enum:
      - db.t3.micro
      - db.t3.small
      - db.t3.medium
      - db.t3.large
      - db.m5.large
      group: Database Settings
      isEssential: true
      order: 84
    allocatedStorage:
      type: number
