metadata:
  name: gcp-static-website
  title: Demo Static Website
  description: Deploy an Archie-branded congratulations page on Google Cloud Storage - perfect for your first GCP deployment!
  category: website
  cloud: gcp
  version: latest
  author: InnovativeApps
  tags:
  - gcp
  - storage
  - website
  - static
  - free
  base_cost: $0.00/month
  complexity: low
  deployment_time: 2-3 minutes
  marketplace_group: WEBSITES
  pillars:
  - title: Operational Excellence
    score: good
    score_color: '#f59e0b'
    description: Managed hosting with minimal operational overhead.
    practices:
    - Infrastructure as Code with Pulumi for repeatable deployments
    - Automated content upload from versioned source bucket
    - Consistent resource labeling for tracking and organization
    - Force-destroy enabled for clean teardown in non-production
  - title: Security
    score: good
    score_color: '#f59e0b'
    description: Public-read access appropriate for static website hosting.
    practices:
    - Uniform bucket-level access for simplified IAM management
    - IAM binding scoped to objectViewer role only
    - No server-side code execution surface to attack
    - HTTPS access via Cloud Storage public URL
  - title: Reliability
    score: excellent
    score_color: '#10b981'
    description: Cloud Storage provides highly durable and available hosting.
    practices:
    - Google Cloud Storage 99.95% availability SLA
    - 11 nines durability for stored objects
    - Automatic replication across zones within region
    - Embedded fallback content if source bucket is unavailable
  - title: Performance Efficiency
    score: good
    score_color: '#f59e0b'
    description: Serverless static hosting with global Google network.
    practices:
    - Direct Cloud Storage serving with no compute overhead
    - Google global network edge caching for low latency
    - Lightweight HTML/CSS assets for fast page loads
    - No cold start or server provisioning delays
  - title: Cost Optimization
    score: excellent
    score_color: '#10b981'
    description: Near-zero cost for static website hosting on Cloud Storage.
    practices:
    - No compute instances or server costs
    - Pay only for storage and egress bandwidth
    - Free-tier eligible for small sites
    - No idle resources consuming budget
  - title: Sustainability
    score: excellent
    score_color: '#10b981'
    description: Serverless architecture with minimal resource consumption.
    practices:
    - No always-on compute instances
    - Google Cloud carbon-neutral infrastructure
    - Efficient object storage with no over-provisioning
    - Minimal resource footprint for static content delivery
  architecture:
    summary: GCP Static Website Template - Pattern B Implementation
  action_name: gcp-static-website
  environment: prod
  tier: template
  use_cases:
  - Production workloads
  - Mission-critical applications
  - Enterprise-grade infrastructure
resources:
  index-gcp-html:
    type: aws:s3:BucketObject
    name: index-gcp-html
    always_created: true
    description: Archie-branded congratulations page (index-gcp.html)
    smart_defaults:
      key: index-gcp.html
      content_type: text/html
      tags:
        Name: archie-index-gcp-html-{environment}
        ManagedBy: Archie
  styles-css:
    type: aws:s3:BucketObject
    name: styles-css
    always_created: true
    description: Styles with dark/light theme support (styles.css)
    smart_defaults:
      key: styles.css
      content_type: text/css
      tags:
        Name: archie-styles-css-{environment}
        ManagedBy: Archie
  bucket_name:
    type: gcp:storage:Bucket
    name: bucket_name
    always_created: true
    description: Bucket resource
    smart_defaults:
      location: <location>
      project: '{config_project}'
      website: {}
      uniform_bucket_level_access: true
      force_destroy: true
      labels:
        managed-by: archie
  '{project_name}-public-read':
    type: gcp:storage:BucketIAMBinding
    name: '{project_name}-public-read'
    always_created: true
    description: BucketIAMBinding resource
    smart_defaults:
      bucket: '{config_name}'
      role: roles/storage.objectViewer
      members:
      - allUsers
  '{project_name}-':
    type: gcp:storage:BucketObject
    name: '{project_name}-'
    always_created: true
    description: BucketObject resource
    smart_defaults:
      name: '{file_key}'
      bucket: '{config_name}'
      source: '{computed}'
configuration:
  properties:
    bucket_name_prefix:
      type: string
      title: Bucket Name Prefix
      description: Get custom bucket name prefix, defaults to 'archie-gcp'.
      group: General Settings
      order: 1
      default: archie-gcp
    enable_cdn:
      type: boolean
      title: Enable Cdn
      description: Whether to enable Cloud CDN, defaults to False.
      group: General Settings
      order: 2
      default: false
    custom_domain:
      type: string
      title: Custom Domain
      description: Get custom domain if specified.
      group: General Settings
      order: 3
    enable_https:
      type: boolean
      title: Enable Https
      description: Whether to enable HTTPS (requires Load Balancer), defaults to False.
      group: General Settings
      order: 4
      default: false
    index_document:
      type: string
      title: Index Document
      description: Get index document name, defaults to 'index.html'.
      group: General Settings
      order: 5
      default: index.html
    error_document:
      type: string
      title: Error Document
      description: Get error document name if specified.
      group: General Settings
      order: 6
    enable_versioning:
      type: boolean
      title: Enable Versioning
      description: Whether to enable bucket versioning, defaults to False.
      group: General Settings
      order: 7
      default: false
    cors_allowed_origins:
      type: string
      title: Cors Allowed Origins
      description: Get CORS allowed origins list, empty if not specified.
      group: General Settings
      order: 8
    lifecycle_rules:
      type: string
      title: Lifecycle Rules
      description: Get lifecycle rules configuration, empty if not specified.
      group: General Settings
      order: 9
    location:
      type: string
      title: Location
      description: Get bucket location (alias for region).
      group: General Settings
      order: 10
    websiteName:
      type: string
      title: Website Name
      default: my-gcp-site
outputs:
- name: website_url
  description: 'Output: website_url'
- name: bucket_name
  description: 'Output: bucket_name'
